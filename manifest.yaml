- id: CZ/eSbirka
  country: CZ
  name: e-Sbírka - Czech Collection of Laws
  data_types:
  - legislation
  auth: none
  status: blocked
  priority: 1
  preferred_for:
  - legislation
  blocked_reason: memory_and_data_model
  url: https://www.e-sbirka.cz
  notes: 'Issue #144: OOM on 8GB VPS during fragment loading. Data model requires
    1.6GB+ of files (503MB fragments + 1.1GB version-fragments). Even with ijson streaming
    to SQLite, VPS runs out of memory. Fragment lookup also incorrect - acts use version_id
    to find fragments via 003PravniAktZneniFragment.json.gz (1.1GB). 45K+ acts. CC
    BY 4.0. Needs either 16GB+ RAM VPS or complete re-architecture to process on disk.'
