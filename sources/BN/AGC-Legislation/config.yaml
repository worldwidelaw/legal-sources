source:
  id: BN/AGC-Legislation
  name: Brunei Attorney Generals Chambers Legislation
  country: BN
  url: https://www.agc.gov.bn/AGC%20Site%20Pages/Laws%20of%20Brunei.aspx
  description: >
    Consolidated Laws of Brunei from the Attorney General's Chambers.
    ~220 chapters with principal acts, subsidiary legislation, orders,
    and regulations. Full text extracted from PDFs.

data_model:
  types:
    - legislation
  update_strategy: upsert
  dedup_key:
    - doc_id

auth:
  type: none

rate_limit:
  requests_per_second: 1
  burst: 2

schema:
  required_fields:
    - _id
    - _source
    - _type
    - _fetched_at
    - title
    - text
    - url
  key_fields:
    - name: doc_id
      type: string
      required: true
    - name: chapter
      type: string
      required: false
    - name: pdf_url
      type: string
      required: false

schedule:
  full_refresh: quarterly
  update_check: monthly
