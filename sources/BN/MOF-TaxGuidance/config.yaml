source:
  id: BN/MOF-TaxGuidance
  name: Brunei Ministry of Finance Tax Guidance
  country: BN
  url: https://www.mofe.gov.bn
  data_types:
    - doctrine
  auth: none
  description: >
    Brunei MOFE tax guidance: income tax public rulings, relevant acts,
    tax amendments, international taxation (ADTA/TIEA/AEOI/CRS), forms,
    and FAQ pages. ~70 PDFs + 100 pages/posts via WordPress REST API.

schema:
  key_fields:
    - wp_id
    - content_type
  record_type: doctrine

fetcher:
  method: api
  rate_limit: 1.5
  notes: >
    WordPress REST API: /wp-json/wp/v2/media (PDFs), /posts, /pages.
    PDFs hosted at mofe.gov.bn/wp-content/uploads/. No auth required.
