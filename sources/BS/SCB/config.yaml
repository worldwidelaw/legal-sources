source:
  id: BS/SCB
  name: Securities Commission of the Bahamas Enforcement
  country: BS
  url: https://www.scb.gov.bs/enforcement/
  description: >
    Enforcement actions from the Securities Commission of the Bahamas.
    Four categories: Judgments & Rulings, Disciplinary Decisions,
    Settlements, and Supervisory Matters. ~29 PDF documents (2000-2025).

data_model:
  types:
    - doctrine
  update_strategy: upsert
  dedup_key:
    - doc_id

auth:
  type: none

rate_limit:
  requests_per_second: 1
  burst: 2

schema:
  required_fields:
    - _id
    - _source
    - _type
    - _fetched_at
    - title
    - text
    - url
  key_fields:
    - name: doc_id
      type: string
      required: true
    - name: category
      type: string
      required: false
    - name: year
      type: string
      required: false
    - name: file_url
      type: string
      required: false

schedule:
  full_refresh: monthly
  update_check: weekly
