source:
  id: BS/SupremeCourt
  name: Bahamas Supreme Court Judgments
  country: BS
  url: https://courts.bs/judgments/
  description: >
    Supreme Court judgments from courts.bs. WordPress site with year-filtered
    listing pages and PDF downloads. Covers 2000-present with ~2,500-3,000
    judgments. Includes Supreme Court and Magistrates Court decisions.

data_model:
  types:
    - case_law
  update_strategy: upsert
  dedup_key:
    - doc_id

auth:
  type: none

rate_limit:
  requests_per_second: 1
  burst: 2

schema:
  required_fields:
    - _id
    - _source
    - _type
    - _fetched_at
    - title
    - text
    - url
  key_fields:
    - name: doc_id
      type: string
      required: true
    - name: judge
      type: string
      required: false
    - name: decision_date
      type: string
      required: false
    - name: case_number
      type: string
      required: false
    - name: file_url
      type: string
      required: false

schedule:
  full_refresh: monthly
  update_check: weekly
