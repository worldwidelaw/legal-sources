fetcher:
  api_type: html_scrape
  base_url: https://laws.bahamas.gov.bs
  rate_limit: 2.0
schema:
  key_fields:
  - name: _id
    required: true
    type: string
  - name: title
    required: true
    type: string
  - name: text
    required: true
    type: string
  - name: date
    required: false
    type: date
  - name: year
    required: false
    type: string
  - name: act_number
    required: false
    type: string
  - name: url
    required: true
    type: string
source:
  auth: none
  country: BS
  data_types:
  - legislation
  description: 'Official consolidated laws of The Bahamas from the iLAWS platform. Principal and amending acts from 1864 to present, organized alphabetically. Full text extracted from PDF documents served
    by the site.

    '
  format: html+pdf
  id: BS/BahamasLegislation
  language: en
  name: Bahamas Legislation Online
  url: https://laws.bahamas.gov.bs/
