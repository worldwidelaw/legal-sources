fetch:
  base_url: https://www.ccpc.ie/business
  endpoint: /wp-json/wp/v2/posts
  method: wp_rest_api
  per_page: 100
  rate_limit:
    delay_seconds: 1.0
schema:
  key_fields:
  - name: _id
    required: true
    type: string
  - name: title
    required: true
    type: string
  - name: date
    required: false
    type: date
  - name: text
    required: true
    type: string
  - name: url
    required: true
    type: string
source:
  auth: none
  country: IE
  data_types:
  - doctrine
  id: IE/CCPC
  license: public_domain
  name: Irish Competition Authority (CCPC)
  url: https://www.ccpc.ie
