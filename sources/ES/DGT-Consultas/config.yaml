api:
  auth: session-based (cookies + X-Requested-With header)
  base_url: https://petete.tributos.hacienda.gob.es
  endpoints:
    document: /consultas/do/document
    form: /consultas/do/form
    main: /consultas/
    search: /consultas/do/search
  format: HTML
  rate_limit: 30 requests/minute
notes: '- PETETE is the official DGT doctrine database

  - Two tabs: tab=1 (consultas generales), tab=2 (consultas vinculantes)

  - Document endpoint requires X-Requested-With: XMLHttpRequest header

  - Session cookie (JSESSIONID) must be obtained by visiting main page first

  - 20 results per search page

  - Date format in API: DD/MM/YYYY, ranges use ".." separator

  '
schedule:
  bootstrap: manual
  update: weekly
schema:
  date_field: date
  full_text_field: text
  key_fields:
  - name: _id
    required: true
    type: string
  - name: num_consulta
    required: false
    type: string
  - name: date
    required: false
    type: date
  - name: title
    required: true
    type: string
  - name: text
    required: true
    type: string
  optional_fields:
  - organo
  - normativa
  - descripcion_hechos
  - cuestion_planteada
source:
  country: ES
  data_types:
  - doctrine
  description: 'Binding tax rulings (consultas vinculantes) and general consultations

    from the Spanish Directorate General of Taxes (Direccion General de

    Tributos). The PETETE database contains 100,000+ rulings from 1997

    to present, covering all areas of Spanish tax law. These rulings are

    binding on the Tax Administration.

    '
  id: ES/DGT-Consultas
  jurisdiction: ES
  language: es
  license: public_domain
  name: Spanish Tax Binding Rulings (Consultas Vinculantes DGT)
  update_frequency: monthly
  url: https://petete.tributos.hacienda.gob.es/consultas/
