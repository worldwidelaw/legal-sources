api:
  base_url: https://kfst.dk
  decision_url_pattern: /konkurrenceforhold/afgoerelser/afgoerelser-paa-konkurrenceomraadet/raads-og-styrelsesafgoerelser/
  sitemap_url: https://kfst.dk/sitemap
  type: sitemap_scraper
auth:
  type: none
rate_limit:
  burst: 3
  requests_per_second: 1
schema:
  key_fields:
  - name: case_number
    required: false
    type: string
  - name: date
    required: false
    type: date
  required_fields:
  - _id
  - _source
  - _type
  - _fetched_at
  - title
  - text
  - date
  - url
source:
  country: DK
  coverage: 2024-present
  data_types:
  - doctrine
  id: DK/KFST
  language: da
  license: public_domain
  name: Danish Competition and Consumer Authority
  name_da: Konkurrence- og Forbrugerstyrelsen
  url: https://kfst.dk
