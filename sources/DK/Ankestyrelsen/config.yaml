source:
  id: DK/Ankestyrelsen
  name: Danish National Appeals Board (Ankestyrelsen Principmeddelelser)
  country: DK
  url: https://ast.dk/afgorelser/principafgorelser
  data_types:
    - doctrine
  description: |
    Binding administrative precedent decisions (principmeddelelser) from the
    Danish National Appeals Board (Ankestyrelsen). Covers social law, employment,
    disability, family, pension, and housing support. ~5,800 decisions from 1976
    to present. Danish language. Free access.

auth:
  type: none

rate_limit:
  requests_per_second: 1
  burst: 3

api:
  type: html_scraping
  base_url: https://www.ast.dk
  format: html
  endpoints:
    sitemap: /sitemap.xml
    decision: /for-myndigheder/principmeddelelser/{year}/{slug}

schema:
  key_fields:
    - name: "_id"
      type: string
      required: true
    - name: title
      type: string
      required: true
    - name: text
      type: string
      required: true
    - name: date
      type: string
      required: false
    - name: categories
      type: array
      required: false

fetch:
  strategy: sitemap_scrape
  sitemap_url: https://www.ast.dk/sitemap.xml
  url_filter: /for-myndigheder/principmeddelelser/
