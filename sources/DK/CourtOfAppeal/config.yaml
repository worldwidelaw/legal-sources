# DK/CourtOfAppeal - Danish Courts Database (Domsdatabasen)
# https://domsdatabasen.dk

source:
  id: DK/CourtOfAppeal
  name: Danish Courts Database (Domsdatabasen)
  country: DK
  country_name: Denmark
  url: https://domsdatabasen.dk
  description: >
    Court decisions from all Danish courts including the Supreme Court (Højesteret),
    High Courts (Østre and Vestre Landsret), district courts (byretter), and the
    Maritime and Commercial High Court. Contains both civil and criminal cases.
  data_types:
    - caselaw
  language: da
  license: Public Domain (Danish Copyright Law §9)

api:
  type: rest
  base_url: https://domsdatabasen.dk/webapi/api
  endpoints:
    rss_feeds: /rssfeeds
    case_search: /Case/rss
    case_detail: /Case/get/{id}
    document: /Case/document/{id}
  auth: none
  rate_limit: 1 request/second

schema:
  key_fields:
    - name: _id
      type: string
      required: true
    - name: ecli
      type: string
      required: false
    - name: court_case_number
      type: string
      required: false
    - name: title
      type: string
      required: true
    - name: text
      type: string
      required: true
    - name: date
      type: date
      required: false
    - name: url
      type: string
      required: true

notes: |
  The Domsdatabasen web API is publicly accessible without authentication.
  Full text is provided as HTML and cleaned to plain text.
  The database was launched in January 2022 and contains cases from 2020 onwards.
  Some documents may be anonymized to protect personal information.
  Uses POST /api/Case/advanced for paginated case discovery (~8,095 cases total).
  Individual case details and documents fetched via GET endpoints.
