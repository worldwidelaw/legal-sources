api:
  auth: none
  endpoints:
    decisions: https://www.kkv.fi/paatokset/
    sitemap: https://www.kkv.fi/sitemap.xml
  rate_limit:
    delay_seconds: 1
    requests_per_second: 1
  type: scraping
schema:
  key_fields:
  - name: decision_id
    required: false
    type: string
  - name: title
    required: true
    type: string
  - name: date
    required: false
    type: date
  - name: url
    required: true
    type: string
  - name: category
    required: false
    type: string
  - name: text
    required: true
    type: string
source:
  country: FI
  data_types:
  - doctrine
  description: Competition, merger, and consumer protection decisions from KKV
  id: FI/FCCA
  name: Finnish Competition and Consumer Authority (KKV)
  url: https://www.kkv.fi
