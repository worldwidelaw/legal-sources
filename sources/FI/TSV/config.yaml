api:
  auth: none
  endpoints:
    detail: https://opendata.finlex.fi/finlex/avoindata/v1/akn/fi/judgment/data-protection-ombudsman-decision/{year}/{number}/fin@
    list: https://opendata.finlex.fi/finlex/avoindata/v1/akn/fi/judgment/data-protection-ombudsman-decision/list
  rate_limit:
    delay_seconds: 1
    requests_per_second: 2
  type: rest
pagination:
  page_size: 10
  type: page
schema:
  key_fields:
  - name: decision_id
    required: false
    type: string
  - name: title
    required: true
    type: string
  - name: date
    required: false
    type: date
  - name: url
    required: true
    type: string
  - name: diary_number
    required: false
    type: string
  - name: text
    required: true
    type: string
source:
  country: FI
  data_types:
  - doctrine
  description: GDPR enforcement decisions from Tietosuojavaltuutetun toimisto via Finlex Open Data API
  id: FI/TSV
  name: Finnish Data Protection Authority (TSV)
  url: https://tietosuoja.fi
