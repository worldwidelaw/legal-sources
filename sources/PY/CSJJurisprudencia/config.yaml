auth: none
country: PY
data_types:
- case_law
id: PY/CSJJurisprudencia
license: Open Government Data (Paraguay)
name: Paraguay Supreme Court Jurisprudence
notes: 'Paraguay Supreme Court and appellate court decisions since 1995. ASP.NET MVC app with DataTables server-side pagination. Full text extracted from PDF documents via PyPDF2. ~70,000 decisions available.
  Requires session-based search flow.

  '
schedule: monthly
schema:
  key_fields:
  - name: _id
    required: true
    type: string
  - name: _source
    required: false
    type: string
  - name: _type
    required: false
    type: string
  - name: title
    required: true
    type: string
  - name: text
    required: true
    type: string
  - name: date
    required: false
    type: date
  - name: url
    required: true
    type: string
  - name: resolution_type
    required: false
    type: string
  - name: resolution_number
    required: false
    type: string
  - name: year
    required: false
    type: string
  - name: chamber
    required: false
    type: string
  - name: subject_matter
    required: false
    type: string
url: https://www.csj.gov.py/jurisprudencia/
