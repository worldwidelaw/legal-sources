source_id: PY/BACN
name: Paraguay Congressional Law Library (BACN)
country: PY
url: https://www.bacn.gov.py/
description: |
  Paraguayan legislation from the Biblioteca y Archivo Central del Congreso
  Nacional (BACN). Full text from bacn.gov.py search API + HTML pages.

data_types:
  - legislation

license: Open Government Data (Paraguay)
language: es

auth:
  type: none

rate_limit:
  requests_per_second: 0.7
  burst: 2

update_frequency: monthly

schema:
  key_fields:
    - name: title
      required: true
      type: string
  date_field: date
  text_field: text
  title_field: title
  url_field: url
