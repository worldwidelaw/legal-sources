source_id: PY/TSJE
country: PY
name: Paraguay Electoral Justice Tribunal (TSJE)
description: >
  Paraguayan Electoral Justice Tribunal decisions, resolutions, sentences,
  and interlocutory orders. Covers 1991-present. Full text extracted from
  PDF documents hosted on tsje.gov.py.
url: https://www.tsje.gov.py/
data_types:
  - case_law
auth: none
license: Government of Paraguay - public domain

api:
  type: html_scraping
  base_url: https://www.tsje.gov.py
  endpoints:
    search: /legislaciones/buscar/
    pdf_static: /static/ups/legislaciones/

schema:
  key_fields:
    - _id
    - title
    - date
    - text
    - document_number
    - document_type
    - url
