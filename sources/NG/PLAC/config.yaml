id: NG/PLAC
name: Nigeria Laws of the Federation (PLAC)
country: NG
url: https://placng.org/lawsofnigeria/
description: >
  Complete 2004 Laws of Nigeria — a searchable compendium of federal legislation
  maintained by the Policy and Legal Advocacy Centre (PLAC). ~413 acts with full
  text in HTML plus ~133 PDF-only acts. Covers all federal legislation.
data_types:
  - legislation
auth:
  type: none
rate_limit:
  requests_per_second: 1
  burst: 1
data_model:
  update_strategy: upsert
  dedup_key:
    - _id
schema:
  key_fields:
    - name: _id
      type: string
      required: true
    - name: _source
      type: string
      required: true
    - name: _type
      type: string
      required: true
    - name: title
      type: string
      required: true
    - name: text
      type: string
      required: true
    - name: date
      type: date
      required: false
    - name: url
      type: string
      required: true
