id: NG/NigeriaLII
name: NigeriaLII (Nigeria Legal Information Institute)
country: NG
url: https://nigerialii.org/
description: >
  Nigerian judgments from NigeriaLII (Peachjam platform by Laws.Africa).
  Supreme Court, Court of Appeal, Federal High Court, High Court decisions.
  Full text from HTML pages in Akoma Ntoso (AKN) format.
data_types:
  - case_law
auth:
  type: none
rate_limit:
  requests_per_second: 0.2
  burst: 1
data_model:
  update_strategy: upsert
  dedup_key:
    - _id
schema:
  key_fields:
    - name: _id
      type: string
      required: true
    - name: _source
      type: string
      required: true
    - name: _type
      type: string
      required: true
    - name: title
      type: string
      required: true
    - name: text
      type: string
      required: true
    - name: date
      type: date
      required: false
    - name: url
      type: string
      required: true
