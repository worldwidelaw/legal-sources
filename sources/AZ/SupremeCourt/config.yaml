# AZ/SupremeCourt - Azerbaijan Supreme Court
# Source: https://sc.supremecourt.gov.az/decision-search/
# Method: JSON API + HTML full text extraction

source_id: AZ/SupremeCourt
country: AZ
name: Azerbaijan Supreme Court
data_types:
  - caselaw

api:
  base_url: https://sc.supremecourt.gov.az
  search_endpoint: /decision-search/
  detail_endpoint: /decision-search/show/

# Rate limiting
rate_limit:
  requests_per_second: 0.5  # 1 request every 2 seconds

schema:
  key_fields:
    - work_no
    - date
