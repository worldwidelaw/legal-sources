source_id: "RW/Amategeko"
country: RW
name: "Rwanda Official Laws Portal (amategeko.gov.rw)"
url: "https://www.amategeko.gov.rw/"
data_types:
  - legislation
auth: none
format: json_api
schedule: weekly
notes: >
  Official portal of Rwandan laws operated by the Rwanda Law Reform Commission (RLRC).
  REST JSON API at apis.amategeko.gov.rw/v1/site/. Documents are PDF files;
  full text extracted via pdfplumber. Trilingual: English, Kinyarwanda, French.
  Sections: 1.1 (legislation in force), 1.2 (historical legislation).
schema:
  key_fields:
    - _id
    - title
    - text
    - date
    - url
    - document_code
    - category
    - sub_category
    - language
