source:
  id: UK/TPR
  name: UK Pensions Regulator
  country: UK
  url: https://www.thepensionsregulator.gov.uk
  language: en
  data_types:
    - doctrine
  description: >
    TPR publications including codes of practice, regulatory guidance,
    enforcement activity reports, scheme management guidance, and
    consultation papers covering UK pension scheme regulation.
  license: Open Government Licence v3.0
  method: Sitemap parsing + HTML extraction
  auth: none

schema:
  key_fields:
    - _id
    - title
    - date
    - text
    - document_type
    - url

fetcher:
  rate_limit: 1.5
  timeout: 60
  max_retries: 3
  sample_count: 15
