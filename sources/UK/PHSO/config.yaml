api:
  base_url: https://api.ombudsman.org.uk/dpp
  detail_endpoint: /decision
  list_endpoint: /decisions
  page_size: 10
  rate_limit: 1.0
schema:
  key_fields:
  - name: _id
    required: true
    type: string
  - name: _source
    required: false
    type: string
  - name: _type
    required: false
    type: string
  - name: _fetched_at
    required: false
    type: string
  - name: title
    required: true
    type: string
  - name: text
    required: true
    type: string
  - name: date
    required: false
    type: date
  - name: url
    required: true
    type: string
  - name: complaint_type
    required: false
    type: string
  - name: organisation
    required: false
    type: string
  - name: outcome
    required: false
    type: string
  - name: decision_type
    required: false
    type: string
source:
  auth: none
  country: UK
  data_types:
  - case_law
  description: 'Decisions from the UK Parliamentary and Health Service Ombudsman.

    Covers complaints about UK government departments, NHS hospitals,

    and other public organisations. ~3,100+ decisions from April 2021 onward.

    '
  id: UK/PHSO
  language: en
  license: Open Government Licence v3.0
  name: UK Parliamentary and Health Service Ombudsman (PHSO)
  url: https://decisions.ombudsman.org.uk
