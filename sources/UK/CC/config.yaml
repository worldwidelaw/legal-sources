# ═══════════════════════════════════════════════════════════════════
# Legal Data Hunter — UK Charity Commission (CC) Configuration
# ═══════════════════════════════════════════════════════════════════

source:
  id: "UK/CC"
  country: "UK"
  name: "UK Charity Commission"
  url: "https://www.gov.uk/government/organisations/charity-commission"
  description: |
    Charity Commission regulatory decisions (inquiry reports), guidance,
    and statutory guidance via GOV.UK Content API. ~280 documents with
    full HTML text. No authentication required.

data_types:
  - doctrine

auth:
  type: "none"

rate_limit:
  requests_per_second: 2
  burst: 5

api:
  type: "json_api"
  base_url: "https://www.gov.uk"
  endpoints:
    search:
      path: "/api/search.json"
      method: "GET"
    content:
      path: "/api/content/{path}"
      method: "GET"

data_model:
  type: "doctrine"
  primary_key: "id"
  update_strategy: "upsert"
  versioning: "public_timestamp"

schema:
  key_fields:
    - name: "_id"
      type: "string"
      role: "primary_key"
    - name: "title"
      type: "string"
      role: "content"
    - name: "text"
      type: "string"
      role: "content"
    - name: "date"
      type: "date"
      role: "temporal_key"
    - name: "url"
      type: "string"
      role: "reference"

notes: |
  - Language: English
  - ~80 inquiry decisions, ~80 detailed guides, ~95 guidance, ~24 other
  - GOV.UK Content API (no auth needed)
  - Full text from HTML publications and inline body content
  - Open Government Licence v3.0
