source:
  id: UK/FCA
  name: UK Financial Conduct Authority (FCA)
  country: UK
  url: https://www.fca.org.uk
  data_types:
    - regulatory_decisions
  description: |
    Decision notices and final notices from the UK Financial Conduct Authority.
    Includes enforcement actions, bans, fines, and regulatory decisions against
    firms and individuals in the UK financial services sector.
  license: Open Government Licence v3.0
  language: en
  auth: none

api:
  sitemap_url: https://www.fca.org.uk/sitemap.xml?page=2
  base_url: https://www.fca.org.uk
  rate_limit: 1.0  # seconds between requests

schema:
  key_fields:
    - _id
    - _source
    - _type
    - _fetched_at
    - title
    - text
    - date
    - url
    - notice_type
    - subject_name
