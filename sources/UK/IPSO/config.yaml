# ═══════════════════════════════════════════════════════════════════
# Legal Data Hunter — UK IPSO (Press Standards) Configuration
# ═══════════════════════════════════════════════════════════════════

source:
  id: "UK/IPSO"
  country: "UK"
  name: "UK Press Standards Organisation"
  url: "https://www.ipso.co.uk"
  description: |
    IPSO press complaints adjudications and resolution statements.
    ~6,800 rulings with full text. WordPress site, no auth needed.
    Paginated listing at /rulings/page/{N}/, 24 per page.

data_types:
  - doctrine

auth:
  type: "none"

rate_limit:
  requests_per_second: 1
  burst: 2

api:
  type: "html_scraping"
  base_url: "https://www.ipso.co.uk"

data_model:
  type: "doctrine"
  primary_key: "_id"
  update_strategy: "upsert"

schema:
  key_fields:
    - name: "_id"
      type: "string"
      role: "primary_key"
    - name: "title"
      type: "string"
      role: "content"
    - name: "text"
      type: "string"
      role: "content"
    - name: "date"
      type: "date"
      role: "metadata"
    - name: "url"
      type: "string"
      role: "reference"

notes: |
  - Language: English
  - ~6,800 press complaints rulings
  - Direct HTML scraping (no Cloudflare)
  - Full text with complaint summary, findings, and reasoning
  - 24 rulings per page, ~283 pages
