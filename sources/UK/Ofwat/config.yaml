# ═══════════════════════════════════════════════════════════════════
# World Wide Law — UK Ofwat Config
# ═══════════════════════════════════════════════════════════════════

source:
  id: "UK/Ofwat"
  country: "UK"
  name: "UK Water Services Regulation Authority (Ofwat)"
  url: "https://www.gov.uk/government/organisations/the-water-services-regulation-authority"
  description: |
    Ofwat regulatory documents, reports, guidance, and publications
    via GOV.UK Search API + Content API. ~61 documents.

data_types:
  - doctrine

auth:
  type: "none"

rate_limit:
  requests_per_second: 1
  burst: 3

api:
  type: "json_api"
  base_url: "https://www.gov.uk"
  endpoints:
    search:
      path: "/api/search.json"
      method: "GET"
    content:
      path: "/api/content"
      method: "GET"

data_model:
  type: "doctrine"
  primary_key: "link"
  update_strategy: "upsert"
  versioning: "public_updated_at"

schema:
  key_fields:
    - name: "_id"
      type: "string"
      role: "primary_key"
    - name: "title"
      type: "string"
      role: "content"
    - name: "text"
      type: "string"
      role: "content"
    - name: "date"
      type: "date"
      role: "temporal_key"
    - name: "url"
      type: "string"
      role: "reference"

notes: |
  - Language: English
  - ~61 documents (policy papers, corporate reports, guidance, consultations)
  - GOV.UK Search API for discovery, Content API for full text
  - Open Government Licence v3.0
