api:
  auth: none
  content_endpoint: https://www.gov.uk/api/content
  rate_limit: 10 requests per second
  search_endpoint: https://www.gov.uk/api/search.json
fetch:
  delay_seconds: 0.2
  per_page: 50
  sample_size: 15
schema:
  date_field: date
  key_fields:
  - name: _id
    required: true
    type: string
  - name: title
    required: true
    type: string
  - name: text
    required: true
    type: string
  - name: date
    required: false
    type: date
  - name: document_type
    required: false
    type: string
  - name: description
    required: false
    type: string
source:
  country: UK
  data_types:
  - doctrine
  description: 'UK Trade Remedies Authority publications including anti-dumping decisions, countervailing duty determinations, safeguard measures, investigation notices, guidance, and corporate reports.
    Fetched via GOV.UK Search + Content APIs.

    '
  id: UK/TRA
  language: en
  license: Open Government Licence v3.0
  name: UK Trade Remedies Authority (TRA)
  url: https://www.gov.uk/government/organisations/trade-remedies-authority
