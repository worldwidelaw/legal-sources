endpoints:
  base_url: https://lex.lab.i.ai.gov.uk
  lookup: /legislation/lookup
  search: /legislation/search
  stats: /api/stats
  text: /legislation/text
fetch:
  method: json_api
  notes: 'REST API by UK Government AI Lab (i.AI). No auth required.

    Enumeration via sequential lookup by type/year/number.

    Full text via POST /legislation/text endpoint.

    219K+ Acts and Statutory Instruments available.

    '
  rate_limit: 1.0
schema:
  key_fields:
  - name: legislation_id
    required: false
    type: string
  - name: type
    required: false
    type: string
  - name: year
    required: false
    type: string
  - name: number
    required: false
    type: string
  normalized_fields:
  - _id
  - _source
  - _type
  - _fetched_at
  - title
  - text
  - date
  - url
  - legislation_type
  - year
  - number
  - category
  - status
  - extent
  - description
  - number_of_provisions
source:
  country: UK
  data_type: legislation
  id: UK/LexAPI
  language: en
  license: Open Government Licence v3.0
  name: UK Lex API (i.AI Government Lab)
  url: https://lex.lab.i.ai.gov.uk
