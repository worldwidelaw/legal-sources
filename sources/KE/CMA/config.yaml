source:
  id: "KE/CMA"
  country: "KE"
  name: "Kenya Capital Markets Authority Regulations & Guidelines"
  url: "https://www.cma.or.ke/"
  description: |
    Acts, regulations, guidelines, circulars, policy guidance notes, EAC
    directives, and corporate governance documents from the Kenya Capital
    Markets Authority. Covers securities regulation, collective investment
    schemes, derivatives, crowdfunding, AML/CFT, and corporate governance.

data_types:
  - doctrine

auth:
  type: "none"

rate_limit:
  requests_per_second: 0.5
  burst: 2

api:
  type: "html_scrape"
  base_url: "https://www.cma.or.ke"

data_model:
  type: "doctrine"
  source_nature: "gazette"
  primary_key: "_id"
  update_strategy: "upsert"
  versioning: "none"

schema:
  total_fields: 9
  key_fields:
    - name: "_id"
      description: "Unique document identifier from file ID"
      type: "string"
      role: "primary_key"
      required: true
    - name: "title"
      description: "Document title"
      type: "string"
      role: "content"
      required: true
    - name: "text"
      description: "Full text extracted from PDF"
      type: "string"
      role: "content"
      required: true
    - name: "date"
      description: "Year extracted from title"
      type: "date"
      role: "temporal_key"
      required: false
    - name: "doc_type"
      description: "Document type (act, regulation, guideline, circular, etc.)"
      type: "string"
      role: "content"
      required: false
  secondary_fields:
    - name: "category"
      description: "Source category (acts, regulations, guidelines, circulars, etc.)"
    - name: "url"
      description: "URL to original PDF"

license:
  name: "KE Government Publication"
  url: "https://www.cma.or.ke/"
  commercial_use: true
  attribution_required: false
  share_alike: false
  no_derivatives: false
  notes: "Government regulatory documents published for public compliance."
