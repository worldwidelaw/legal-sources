source:
  id: AD/TribunalConstitucional
  name: "Constitutional Court of Andorra (Tribunal Constitucional)"
  country: AD
  url: https://www.tribunalconstitucional.ad/
  data_types:
    - case_law
  auth: none
  format: json_api
  language: ca
  description: >
    2,273 decisions from the Andorra Constitutional Court (1994-present).
    541 sentencies (judgments) + 1,732 autes (orders). Full text in Catalan
    via Drupal JSON:API. Includes case metadata, rapporteur, BOPA references.

schema:
  key_fields:
    - _id
    - title
    - text
    - date
    - case_number
    - decision_type
    - url

fetcher:
  base_url: "https://www.tribunalconstitucional.ad"
  jsonapi_sentencia: "/jsonapi/node/sentencia"
  jsonapi_aute: "/jsonapi/node/aute"
  page_limit: 50
  rate_limit: 1.0
