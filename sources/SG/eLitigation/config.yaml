id: SG/eLitigation
name: Singapore eLitigation Court Judgments
country: SG
url: https://www.elitigation.sg/gd/
description: >
  Singapore court judgments from the eLitigation portal.
  Supreme Court (High Court, Court of Appeal, SICC) judgments with full text.
  ~10,500 judgments from 2000 to present.
data_types:
  - case_law
auth:
  type: none
rate_limit:
  requests_per_second: 0.5
  burst: 1
data_model:
  update_strategy: upsert
  dedup_key:
    - _id
schema:
  key_fields:
    - name: _id
      type: string
      required: true
    - name: _source
      type: string
      required: true
    - name: _type
      type: string
      required: true
    - name: title
      type: string
      required: true
    - name: text
      type: string
      required: true
    - name: date
      type: date
      required: false
    - name: url
      type: string
      required: true
    - name: citation
      type: string
      required: false
    - name: court
      type: string
      required: false
