id: MX/Puebla-Legislation
name: Puebla State Legislation
country: MX
url: https://www.congresopuebla.gob.mx/index.php?option=com_docman&Itemid=485
description: >
  Consolidated laws, codes, and constitution of the State of Puebla from the
  Congreso del Estado de Puebla DocMan portal. ~146 laws/codes as PDF
  documents with full text extraction via PyPDF2. Full text in Spanish.
data_types:
  - legislation
auth:
  type: none
rate_limit:
  requests_per_second: 0.5
  burst: 1
data_model:
  update_strategy: upsert
  dedup_key:
    - _id
schema:
  key_fields:
    - name: _id
      type: string
      required: true
    - name: _source
      type: string
      required: true
    - name: _type
      type: string
      required: true
    - name: title
      type: string
      required: true
    - name: text
      type: string
      required: true
    - name: date
      type: date
      required: false
    - name: category
      type: string
      required: false
    - name: url
      type: string
      required: true
