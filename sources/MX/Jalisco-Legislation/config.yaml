id: MX/Jalisco-Legislation
name: Jalisco State Legislation
country: MX
url: https://congresoweb.congresojal.gob.mx/BibliotecaVirtual/busquedasleyes/Listado%272.cfm
description: >
  Consolidated laws, codes, and constitution of the State of Jalisco from the
  Congreso de Jalisco Biblioteca Virtual. ~185 laws/codes as PDF documents
  with full text extraction via PyPDF2. Full text in Spanish.
data_types:
  - legislation
auth:
  type: none
rate_limit:
  requests_per_second: 0.5
  burst: 1
data_model:
  update_strategy: upsert
  dedup_key:
    - _id
schema:
  key_fields:
    - name: _id
      type: string
      required: true
    - name: _source
      type: string
      required: true
    - name: _type
      type: string
      required: true
    - name: title
      type: string
      required: true
    - name: text
      type: string
      required: true
    - name: date
      type: date
      required: false
    - name: category
      type: string
      required: false
    - name: url
      type: string
      required: true
