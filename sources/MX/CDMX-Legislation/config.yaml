id: MX/CDMX-Legislation
name: Ciudad de México Legislation
country: MX
url: https://www.congresocdmx.gob.mx/marco-legal-cdmx-107-2.html
description: >
  Consolidated laws and codes of Ciudad de México (Mexico City) from the
  Congreso CDMX Marco Legal page. 178 laws/codes as text PDFs, including
  civil code, penal code, and all CDMX-level legislation. Full text in Spanish.
data_types:
  - legislation
auth:
  type: none
rate_limit:
  requests_per_second: 0.5
  burst: 1
data_model:
  update_strategy: upsert
  dedup_key:
    - _id
schema:
  key_fields:
    - name: _id
      type: string
      required: true
    - name: _source
      type: string
      required: true
    - name: _type
      type: string
      required: true
    - name: title
      type: string
      required: true
    - name: text
      type: string
      required: true
    - name: date
      type: date
      required: false
    - name: url
      type: string
      required: true
