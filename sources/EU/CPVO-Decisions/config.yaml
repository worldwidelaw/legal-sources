source_id: EU/CPVO-Decisions
name: Community Plant Variety Office Board of Appeal
country: EU
url: https://online.plantvarieties.eu/#/caselaw
description: |
  CPVO Board of Appeal decisions from the PVR Case Law database.
  Covers plant variety rights disputes heard by the CPVO Board of Appeal.

data_types:
  - case_law

license: Open Data
language: en

auth:
  type: none

rate_limit:
  requests_per_second: 0.33
  burst: 1

update_frequency: monthly

schema:
  key_fields:
    - name: decision_number
      required: true
      type: string
    - name: title
      required: true
      type: string
  date_field: date
  text_field: text
  title_field: title
  url_field: url
