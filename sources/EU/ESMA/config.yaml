auth:
  type: none
fetch:
  base_url: https://www.esma.europa.eu
  library_url: https://www.esma.europa.eu/databases-library/esma-library
  max_retries: 3
  rate_limit_seconds: 2.0
  timeout_seconds: 120
schema:
  key_fields:
  - name: document_id
    required: false
    type: string
  - name: reference
    required: false
    type: string
  optional_fields:
  - document_type
  - reference
  - section
  - language
  required_fields:
  - _id
  - _source
  - _type
  - _fetched_at
  - title
  - text
  - date
  - url
source:
  country: EU
  data_types:
  - doctrine
  description: EU securities regulator - guidelines, Q&As, decisions, opinions, and technical standards
  id: EU/ESMA
  name: European Securities and Markets Authority (ESMA)
  url: https://www.esma.europa.eu
