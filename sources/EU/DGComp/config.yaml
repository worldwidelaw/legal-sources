# EU/DGComp -- EU Competition Directorate-General (DG COMP)
# European Commission competition decisions - antitrust, cartels, mergers, state aid

source:
  id: EU/DGComp
  name: EU Competition Directorate-General (DG COMP)
  country: EU
  url: https://competition-cases.ec.europa.eu
  description: >
    European Commission competition decisions from the DG COMP Open Data portal.
    Covers antitrust/cartel cases and merger decisions. Data provided as daily-updated
    JSON files with links to decision PDFs for full text extraction.
  data_types:
    - doctrine
  license: Open
  auth: none

schema:
  key_fields:
    - name: "_id"
      type: "string"
      required: true
    - name: "title"
      type: "string"
      required: true
    - name: "text"
      type: "string"
      required: true
    - name: "date"
      type: "date"
      required: false
    - name: "url"
      type: "string"
      required: true

  optional_fields:
    - case_number
    - case_type
    - instrument
    - sectors
    - companies
    - legal_basis
    - decision_types
    - pdf_url

data_model:
  update_strategy: upsert
  dedup_key:
    - _id

rate_limit:
  requests_per_second: 2
  burst: 5
  max_workers: 3

endpoints:
  antitrust: https://compcases-open-data-portal-files-prod.s3.eu-west-1.amazonaws.com/case-data-AT.json
  mergers: https://compcases-open-data-portal-files-prod.s3.eu-west-1.amazonaws.com/case-data-M.json
