auth:
  type: none
fetch:
  base_url: https://www.berec.europa.eu
  items_per_page: 50
  max_retries: 3
  rate_limit_seconds: 2.0
  search_url: https://www.berec.europa.eu/en/search-documents
  timeout_seconds: 120
schema:
  key_fields:
  - name: document_id
    required: false
    type: string
  - name: document_number
    required: false
    type: string
  optional_fields:
  - document_number
  - author
  - document_type
  - language
  required_fields:
  - _id
  - _source
  - _type
  - _fetched_at
  - title
  - text
  - date
  - url
source:
  country: EU
  data_types:
  - doctrine
  description: EU telecom regulatory body - guidelines, opinions, decisions, reports, and regulatory best practices
  id: EU/BEREC
  name: Body of European Regulators for Electronic Communications (BEREC)
  url: https://www.berec.europa.eu
