api:
  auth: none
  endpoints:
    fulltext: https://eur-lex.europa.eu/legal-content/EN/TXT/HTML/?uri=CELEX:{celex}
    sparql: https://publications.europa.eu/webapi/rdf/sparql
  rate_limit:
    delay_seconds: 1
    requests_per_second: 2
  type: multiple
pagination:
  page_size: 500
  type: offset
schema:
  key_fields:
  - name: celex_id
    required: false
    type: string
  - name: title
    required: true
    type: string
  - name: date
    required: false
    type: date
  - name: url
    required: true
    type: string
  - name: tdi_type
    required: false
    type: string
  - name: text
    required: true
    type: string
source:
  country: EU
  data_types:
  - doctrine
  description: EU anti-dumping, countervailing duty, and safeguard decisions published in the Official Journal
  id: EU/TDI
  name: EU Trade Defence Instruments
  url: https://trade.ec.europa.eu/tdi
