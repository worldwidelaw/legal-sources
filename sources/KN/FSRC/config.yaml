# ===================================================================
# KN/FSRC -- St Kitts & Nevis Financial Services Regulatory Commission
# ===================================================================
# PDF downloads from the FSRC Law Library across 19 regulatory categories.
# Full text via PDF extraction.
# ===================================================================

source:
  id: "KN/FSRC"
  country: "KN"
  name: "St Kitts & Nevis FSRC"
  url: "https://www.fsrc.kn/law-library"
  description: |
    Financial Services Regulatory Commission Law Library. PDF legislation
    and regulatory documents across 19 categories including AML, companies,
    insurance, trusts, gaming, and virtual assets.

data_types:
  - doctrine

auth:
  type: "none"

rate_limit:
  requests_per_second: 0.5
  burst: 1
  notes: "2-second delay between requests."

api:
  type: "scraping"
  base_url: "https://www.fsrc.kn"
  endpoints:
    law_library: "/law-library/{category}"
    document: "/law-library/{category}/{id}-{slug}/file"
  response_format: "pdf"

schema:
  total_fields: 9
  key_fields:
    - name: "_id"
      description: "Unique document ID from FSRC"
      type: "string"
      role: "primary_key"
      required: true
    - name: "title"
      description: "Document title"
      type: "string"
      role: "content"
      required: true
    - name: "text"
      description: "Full text extracted from PDF"
      type: "string"
      role: "content"
      required: true
    - name: "category"
      description: "Law library category"
      type: "string"
      role: "metadata"
      required: false
