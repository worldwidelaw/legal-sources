source:
  id: MO/BoletimOficial
  name: Macau Official Gazette (Boletim Oficial)
  country: MO
  url: https://www.bo.dsaj.gov.mo/pt/legis/list/a/
  description: >
    Official gazette of the Macau SAR publishing all legislation, executive orders,
    and administrative regulations. 45,000+ items from 1872-present in Chinese and
    Portuguese. Full text extracted from HTML detail pages on bo.dsaj.gov.mo.

data_model:
  types:
    - legislation
  update_strategy: upsert
  dedup_key:
    - doc_id

auth:
  type: none

rate_limit:
  requests_per_second: 1
  burst: 2

schema:
  required_fields:
    - _id
    - _source
    - _type
    - _fetched_at
    - title
    - text
    - url
  key_fields:
    - name: doc_id
      type: string
      required: true
    - name: doc_ref
      type: string
      required: false
    - name: gazette_info
      type: string
      required: false
    - name: publication_date
      type: string
      required: false

schedule:
  full_refresh: monthly
  update_check: weekly
