source:
  id: MO/AMCM
  name: Macau Monetary Authority (AMCM) Circulars
  country: MO
  url: https://www.amcm.gov.mo/en/research-statistics/policy-and-guidelines
  description: >
    Circulars, guidelines, press releases, and regulatory notices from the
    Autoridade Monetária de Macau (澳門金融管理局). Covers banking, insurance,
    AML/CFT, technology risk, electronic banking, and outsourcing regulation.
    English content via REST API. PDF attachments hosted on cdn.amcm.gov.mo.

data_model:
  types:
    - doctrine
  update_strategy: upsert
  dedup_key:
    - doc_id

auth:
  type: none

rate_limit:
  requests_per_second: 1
  burst: 2

schema:
  required_fields:
    - _id
    - _source
    - _type
    - _fetched_at
    - title
    - text
    - url
  key_fields:
    - name: doc_id
      type: string
      required: true
    - name: category
      type: string
      required: false
    - name: date
      type: string
      required: false

schedule:
  full_refresh: monthly
  update_check: weekly
