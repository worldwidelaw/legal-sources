source:
  id: MO/Courts
  name: Macau Court Decisions (法院裁判)
  country: MO
  url: http://www.court.gov.mo/
  description: >
    Court decisions from Macau SAR judiciary: Court of Final Appeal (TUI),
    Court of Second Instance (TSI), Court of First Instance (TJB), and
    Administrative Court (TA). ~21,000 judgments in Portuguese and/or Chinese.
    Full text extracted from HTML judgment pages.

data_model:
  types:
    - case_law
  update_strategy: upsert
  dedup_key:
    - doc_id

auth:
  type: none

rate_limit:
  requests_per_second: 1
  burst: 2

schema:
  required_fields:
    - _id
    - _source
    - _type
    - _fetched_at
    - title
    - text
    - url
  key_fields:
    - name: doc_id
      type: string
      required: true
    - name: case_number
      type: string
      required: false
    - name: case_type
      type: string
      required: false
    - name: court
      type: string
      required: false
    - name: decision_date
      type: string
      required: false

schedule:
  full_refresh: monthly
  update_check: weekly
