id: MY/AGCLaws
name: Malaysia Laws of Malaysia (AGC Official)
country: MY
url: https://lom.agc.gov.my/
description: >
  Official legislation from Malaysia's Attorney General's Chambers.
  Covers principal acts, amendments, subsidiary legislation (P.U.(A) and P.U.(B)).
  Full text extracted from PDF documents via DataTables JSON API.
data_types:
  - legislation
auth:
  type: none
rate_limit:
  requests_per_second: 2
  burst: 5
data_model:
  update_strategy: upsert
  dedup_key:
    - _id
schema:
  key_fields:
    - name: _id
      type: string
      required: true
    - name: _source
      type: string
      required: true
    - name: _type
      type: string
      required: true
    - name: title
      type: string
      required: true
    - name: text
      type: string
      required: true
    - name: date
      type: date
      required: false
    - name: url
      type: string
      required: true
