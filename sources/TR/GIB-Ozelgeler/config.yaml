source:
  id: TR/GIB-Ozelgeler
  name: Turkish Revenue Administration Tax Rulings (Özelgeler)
  country: TR
  url: https://gib.gov.tr
  data_types:
    - doctrine
  auth: none
  language: tr
  description: >
    Binding tax rulings (özelgeler) issued by the Turkish Revenue
    Administration (Gelir İdaresi Başkanlığı - GİB). Covers all Turkish tax
    laws including income tax, VAT, corporate tax, and stamp duty.
    ~18,000+ rulings from 2007 to present.

schema:
  key_fields:
    - _id
    - num_ozelge
    - date
    - kanun
