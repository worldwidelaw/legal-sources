auth:
  type: none
country: TR
data_types:
- legislation
description: 'Official Turkish legislation database maintained by the Presidency of Turkey. Contains laws (kanunlar), decrees with force of law (KHK), regulations (tüzükler), directives (yönetmelikler),
  and presidential decrees (cumhurbaşkanlığı kararnameleri).

  '
endpoints:
  content_iframe: /anasayfa/MevzuatFihristDetayIframe
  datatable: /Anasayfa/MevzuatDatatable
language: tr
license: Open Government Data
name: Turkish Legislation (Mevzuat Bilgi Sistemi)
rate_limit:
  delay_between_requests: 1.5
  requests_per_second: 1
schema:
  key_fields:
  - name: mevzuat_no
    required: false
    type: string
  - name: mevzuat_tur
    required: false
    type: string
  - name: mevzuat_tertip
    required: false
    type: string
source_id: TR/Mevzuat
url: https://www.mevzuat.gov.tr
