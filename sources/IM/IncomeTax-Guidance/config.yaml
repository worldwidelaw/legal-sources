source:
  id: IM/IncomeTax-Guidance
  country: IM
  name: Isle of Man Income Tax Division Practice Notes & Guidance
  description: |
    Practice notes and guidance notes from the Isle of Man Income Tax Division.
    Covers 0% standard corporate rate, personal income tax (10%/20%), national
    insurance, economic substance, pensions, benefits in kind, and budget updates.
    ~298 PDF documents (236 practice notes + 62 guidance notes). Full text extracted.

  data_types:
    - doctrine

  url: https://www.gov.im/categories/tax-vat-and-your-money/income-tax-and-national-insurance/
  auth: none

  languages:
    - en

schema:
  key_fields:
    - name: text
      type: string
      required: true
    - name: title
      type: string
      required: true
    - name: doc_type
      type: string
      required: false
    - name: reference
      type: string
      required: false

data_model:
  update_strategy: full_replace
  dedup_key:
    - _id

rate_limits:
  requests_per_second: 0.5
  delay_between_requests: 2.0

license:
  type: Open Government Data
  attribution: Isle of Man Government - Income Tax Division
  url: https://www.gov.im
