api:
  base_url: https://www.constcourt.md/ccdoc_search_request_test.php
  format: json+html
  rate_limit: 2
  type: datatables_json
schema:
  key_fields:
  - name: _id
    required: true
    type: string
  - name: doc_number
    required: false
    type: string
  required_fields:
  - _id
  - _source
  - _type
  - _fetched_at
  - title
  - text
  - date
  - url
source:
  country: MD
  data_types:
  - case_law
  id: MD/CurteaConstitutionala
  language: ro
  license: Open Data
  name: Moldova Constitutional Court (Curtea Constituțională)
  notes: '5,721 documents (1995-present): judgments (hotărîri), decisions (decizii), referrals (sesizări), opinions (avize), addresses (adrese). DataTables JSON API for listing, HTML pages for full text.
    Romanian language. No authentication required.

    '
  url: https://www.constcourt.md
