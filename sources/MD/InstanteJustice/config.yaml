id: MD/InstanteJustice
name: Moldova National Courts Portal (Instanțe de judecată)
country: MD
url: https://instante.justice.md
description: >
  Moldova national judicial portal. 1.8M+ court decisions from all Moldovan courts
  (Courts of Appeal, district courts). Full text via PDF download from PIGD system.
  Covers civil, criminal, and contravention cases from all jurisdictions.
data_types:
  - case_law
auth:
  type: none
rate_limit:
  requests_per_second: 0.1
  burst: 1
data_model:
  update_strategy: append_only
  dedup_key:
    - _id
schema:
  key_fields:
    - name: _id
      type: string
      required: true
    - name: _source
      type: string
      required: true
    - name: _type
      type: string
      required: true
    - name: title
      type: string
      required: true
    - name: text
      type: string
      required: true
    - name: date
      type: date
      required: false
    - name: url
      type: string
      required: true
    - name: court
      type: string
      required: false
    - name: case_number
      type: string
      required: false
    - name: case_type
      type: string
      required: false
    - name: judge
      type: string
      required: false
