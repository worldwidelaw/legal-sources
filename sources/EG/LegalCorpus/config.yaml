  format: parquet
  records_count: 2434
  tokens_count: 25054372
  types:
  - legislation
notes: 'Egyptian Legal Corpus dataset from Hugging Face.

  Contains 2,434 Egyptian laws with full Arabic text.

  MIT licensed, freely accessible.

  Hierarchical category taxonomy for document classification.

  '
rate_limit:
  delay_between_requests: 0
  requests_per_second: null
schema:
  key_fields:
  - name: _id
    required: true
    type: string
  - name: law_name
    required: false
    type: string
  - name: title
    required: true
    type: string
  - name: text
    required: true
    type: string
  - name: categories
    required: false
    type: string
  - name: tokens
    required: false
    type: string
source:
  country: EG
  id: EG/LegalCorpus
  language: ar
  license: MIT
  name: Egyptian Legal Corpus (Hugging Face)
  url: https://huggingface.co/datasets/dataflare/egypt-legal-corpus
