    page_size: 25
    type: page_number
  rate_limit:
    requests_per_second: 1
  type: api
schema:
  key_fields:
  - name: _id
    required: true
    type: string
  - name: title
    required: true
    type: string
  - name: text
    required: true
    type: string
  - name: date
    required: false
    type: date
  - name: case_id
    required: false
    type: string
  - name: rule_number
    required: false
    type: string
  - name: court_year
    required: false
    type: string
  - name: case_type
    required: false
    type: string
  - name: disposition
    required: false
    type: string
source:
  auth: none
  country: EG
  data_types:
  - case_law
  domain: sccourt.gov.eg
  id: EG/SCC
  language: ar
  license: Open government data
  name: Egypt Supreme Constitutional Court
  url: https://www.sccourt.gov.eg/
