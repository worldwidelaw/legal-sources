source:
  id: BM/SupremeCourt
  name: Bermuda Supreme Court Judgments
  country: BM
  url: https://www.gov.bm/court-judgments
  description: >
    Supreme Court and Court of Appeal judgments from gov.bm. Covers 2017-present
    with ~100-150 decisions per year. PDF judgments organized by year pages.
    Key for insurance, reinsurance, corporate, and criminal law disputes.

data_model:
  types:
    - case_law
  update_strategy: upsert
  dedup_key:
    - doc_id

auth:
  type: none

rate_limit:
  requests_per_second: 1
  burst: 2

schema:
  required_fields:
    - _id
    - _source
    - _type
    - _fetched_at
    - title
    - text
    - url
  key_fields:
    - name: doc_id
      type: string
      required: true
    - name: citation
      type: string
      required: false
    - name: court
      type: string
      required: false
    - name: decision_date
      type: string
      required: false
    - name: file_url
      type: string
      required: false

schedule:
  full_refresh: monthly
  update_check: weekly
