source:
  id: BM/Legislation
  name: Bermuda Laws Online
  country: BM
  url: https://www.bermudalaws.bm
  description: >
    Consolidated legislation of Bermuda from bermudalaws.bm. SharePoint-based
    portal with ~1,542 consolidated laws published as PDFs by the Attorney
    General's Office. Includes Acts, Regulations, Orders, and Rules.

data_model:
  types:
    - legislation
  update_strategy: upsert
  dedup_key:
    - doc_id

auth:
  type: none

rate_limit:
  requests_per_second: 1
  burst: 2

schema:
  required_fields:
    - _id
    - _source
    - _type
    - _fetched_at
    - title
    - text
    - url
  key_fields:
    - name: doc_id
      type: string
      required: true
    - name: year
      type: string
      required: false
    - name: file_url
      type: string
      required: false

schedule:
  full_refresh: monthly
  update_check: weekly
