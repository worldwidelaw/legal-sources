id: CN/MOC
name: China Ministry of Commerce Trade Regulations (商务部)
country: CN
url: https://ipr.mofcom.gov.cn/law/list.shtml
description: >
  Trade-related laws and regulations from China's Ministry of Commerce
  IP Protection website (ipr.mofcom.gov.cn). 633+ laws covering foreign
  trade, customs, IP protection, anti-unfair competition, and related
  administrative regulations. Full text in Chinese. No auth required.
data_types:
  - legislation
auth:
  type: none
rate_limit:
  requests_per_second: 0.5
  burst: 1
data_model:
  update_strategy: upsert
  dedup_key:
    - _id
schema:
  key_fields:
    - name: _id
      type: string
      required: true
    - name: _source
      type: string
      required: true
    - name: _type
      type: string
      required: true
    - name: title
      type: string
      required: true
    - name: text
      type: string
      required: true
    - name: date
      type: date
      required: false
    - name: url
      type: string
      required: true
