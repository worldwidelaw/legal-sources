id: CN/ChinaLawTranslate
name: China Law Translate (English Translations of Chinese Laws)
country: CN
url: https://www.chinalawtranslate.com/en/
description: >
  English translations of Chinese laws and regulations by the Yale China Law Center.
  Fetched via WordPress REST API (/wp-json/wp/v2/posts). ~165 posts covering
  criminal law, administrative regulations, civil law, internet governance, labor,
  environment, and IP law. Full text in English.
data_types:
  - legislation
auth:
  type: none
rate_limit:
  requests_per_second: 2
  burst: 5
data_model:
  update_strategy: upsert
  dedup_key:
    - _id
schema:
  key_fields:
    - name: _id
      type: string
      required: true
    - name: _source
      type: string
      required: true
    - name: _type
      type: string
      required: true
    - name: title
      type: string
      required: true
    - name: text
      type: string
      required: true
    - name: date
      type: date
      required: false
    - name: url
      type: string
      required: true
