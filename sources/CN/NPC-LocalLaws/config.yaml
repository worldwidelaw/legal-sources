id: CN/NPC-LocalLaws
name: China Local Laws and Regulations (地方性法规)
country: CN
url: https://flk.npc.gov.cn/
description: >
  Provincial and municipal laws and regulations from China's NPC National Laws Database.
  Uses the same API as CN/NPC with flfgCodeId=[230,260,270,290,295,300,305,310]
  to filter for local regulations (地方法规). 26,891+ local regulations covering all 31 provinces, municipalities, and autonomous
  regions. Full text via DOCX download. Chinese language.
data_types:
  - legislation
auth:
  type: none
rate_limit:
  requests_per_second: 0.3
  burst: 1
data_model:
  update_strategy: upsert
  dedup_key:
    - _id
schema:
  key_fields:
    - name: _id
      type: string
      required: true
    - name: _source
      type: string
      required: true
    - name: _type
      type: string
      required: true
    - name: title
      type: string
      required: true
    - name: text
      type: string
      required: true
    - name: date
      type: date
      required: false
    - name: url
      type: string
      required: true
