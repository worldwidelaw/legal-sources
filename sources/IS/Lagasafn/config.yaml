api:
  auth: none
  base_url: https://www.althingi.is/lagasafn
  current_version: 156b
  endpoints:
    versions_list: /zip-skra-af-lagasafni/
    zip_download: /zip/{version}/allt.zip
  rate_limit:
    delay_seconds: 2
    requests_per_minute: 30
  type: bulk_download
data:
  encoding: utf-8
  format: html
  language: isl
  license: Public Domain
schema:
  key_fields:
  - name: law_number
    required: false
    type: string
  - name: year
    required: false
    type: string
  required_fields:
  - title
  - text
  - date
  - url
source:
  country: IS
  id: IS/Lagasafn
  name: Lagasafn - Icelandic Consolidated Legislation
  url: https://www.althingi.is/lagasafn/
