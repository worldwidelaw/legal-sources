id: IS/Landsrettur
name: Icelandic Court of Appeals (Landsréttur)
country: IS
language: isl
data_types:
  - caselaw
license: Public Domain
url: https://www.landsrettur.is/
fetch_method: html_scrape
auth: none
rate_limit: 1.5s

schema:
  key_fields:
    - _id
    - case_number
    - date
  required_fields:
    - _id
    - _source
    - _type
    - _fetched_at
    - title
    - text
    - date
    - url
  optional_fields:
    - court
    - case_number
    - keywords
    - parties
    - abstract
    - language

notes: |
  Landsréttur (the Icelandic Court of Appeals) was established in 2018 and
  publishes its decisions online at landsrettur.is. ~6,000 decisions from
  2018-present.

  Case numbers follow the format N/YYYY (e.g., 102/2025).
  The site uses AJAX pagination for listing decisions.
  Verdict full text is accessible within the decision detail pages.
  robots.txt blocks some paths but the AJAX endpoints are accessible.
  We use a 1.5 second delay between requests to be respectful.
