fetcher:
  method: xml_rss_with_pdf
  pagination:
    param: p
    start: 0
    type: page_param
  params:
    s: publication_date
    tgGroup: operators
    type[0]: publication_type:decision
  rate_limit: 2.0
  rss_endpoint: https://www.bipt.be/operators/search.xml
schema:
  key_fields:
  - name: _id
    required: true
    type: string
  - name: title
    required: true
    type: string
  - name: date
    required: false
    type: date
  - name: decision_type
    required: false
    type: string
  - name: text
    required: true
    type: string
  optional_fields:
  - description
  - themes
  - language
  - pdf_url
  - pdf_size
source:
  auth: none
  country: BE
  data_types:
  - doctrine
  id: BE/BIPT
  languages:
  - fr
  - nl
  license: Open Data - Belgian Federal Government
  name: Belgian Telecom Regulator (BIPT)
  update_frequency: weekly
  url: https://www.bipt.be
