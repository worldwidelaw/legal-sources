fetcher:
  rate_limit: 2.0
  requires:
  - pdfplumber
  - beautifulsoup4
  - requests
  schedule: weekly
  type: html_scraper
notes: 'Data sourced from the official FSMA website.

  Decisions are published as PDFs in French or Dutch.

  The FSMA is Belgium''s financial services regulator, overseeing

  banks, insurance companies, and financial markets.

  '
schema:
  date_field: date
  key_fields:
  - name: _id
    required: true
    type: string
  - name: title
    required: true
    type: string
  - name: date
    required: false
    type: date
  - name: decision_type
    required: false
    type: string
  text_field: text
source:
  country: BE
  data_types:
  - doctrine
  description: 'Administrative sanctions and settlement agreements from the Belgian FSMA.

    Includes settlement agreements (règlements transactionnels / minnelijke schikkingen)

    and sanctions committee decisions.

    '
  id: BE/FSMA
  language:
  - fr
  - nl
  name: Belgian Financial Services and Markets Authority
  url: https://www.fsma.be
