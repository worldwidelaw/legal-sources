endpoints:
  decision: https://www.raadvst-consetat.be/arr.php?nr={nr}&l={lang}
  monthly: https://www.raadvst-consetat.be/?lang={lang}&page=lastmonth_{mm}
notes: 'Belgian Council of State (Conseil d''État / Raad van State)

  - Supreme Administrative Court

  - Handles administrative disputes (urbanisme, fonction publique, marchés publics, etc.)

  - ~5,000+ decisions per year (including aliens cases excluded from public access)

  - Decisions since 1994 available digitally

  - PDF direct access via arr.php endpoint

  - Published decisions in French, Dutch, and German

  '
schema:
  key_fields:
  - name: _id
    required: true
    type: string
  - name: arret_nr
    required: false
    type: string
source:
  auth: none
  country: BE
  data_types:
  - caselaw
  id: BE/ConseilEtat
  license: Open Government Data
  name: Belgian Council of State (Conseil d'État / Raad van State)
  url: https://www.raadvst-consetat.be
