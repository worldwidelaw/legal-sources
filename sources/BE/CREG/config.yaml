id: BE/CREG
name: Belgian Energy Regulator (CREG)
country: BE
url: https://www.creg.be
description: |
  Commission de Régulation de l'Électricité et du Gaz (CREG) - Belgian Federal Energy Regulator.
  Publishes regulatory decisions on electricity and natural gas markets, network tariffs,
  transmission system operation, and energy market oversight.

data_types:
  - doctrine
  - studies
  - notes
  - reports

languages:
  - fr
  - nl
  - en

auth: none
license: Belgian Federal Government Open Data

schema:
  key_fields:
    - _id
    - title
    - date
    - reference_number
    - publication_type

endpoints:
  publications_page: https://www.creg.be/fr/publications
  decisions_filter: https://www.creg.be/fr/publications?f[0]=type_de_publication:15

notes: |
  - HTML scraping of Drupal-based website (no API available)
  - PDFs contain full text of decisions
  - Publications available in FR, NL, and EN (partial)
  - Decisions are categorized by type: Décision, Étude, Note, Rapport, etc.
  - Reference numbers follow pattern: (B)XXXX for decisions, (F)XXXX for studies
