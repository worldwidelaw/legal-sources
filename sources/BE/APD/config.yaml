notes: 'Belgian Data Protection Authority decisions since 2018.

  Decisions published as PDFs in both French and Dutch.

  ~1200 decisions total across both languages (some overlap).

  Decision types: décisions au fond (substantive), classements sans suite (dismissals),

  avertissements (warnings), ordonnances (orders), arrêts (court judgments).

  '
