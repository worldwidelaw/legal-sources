auth:
  type: none
country: BE
data_types:
- caselaw
endpoints:
  content: https://juportal.be/content/{ecli}
  robots: https://juportal.be/robots.txt
  sitemap: https://juportal.just.fgov.be/JUPORTAsitemap/{year}/{month}/{day}/sitemap_{n}.xml
  sitemap_index: https://juportal.just.fgov.be/JUPORTAsitemap/{year}/{month}/{day}/sitemap_index_1.xml
license: Open Government Data
name: Belgian Labour Courts
notes: 'Belgian Labour Courts case law from JUPORTAL.

  Covers all 5 judicial districts for both appellate courts (Cour du Travail)

  and first instance tribunals (Tribunal du Travail).

  Data available from approximately 2017 onwards via ECLI sitemaps.

  '
rate_limit:
  delay_between_requests: 1.5
  requests_per_second: 1
schema:
  key_fields:
  - name: ecli
    required: false
    type: string
  - name: date
    required: false
    type: date
  - name: court
    required: false
    type: string
  - name: language
    required: false
    type: string
source_id: BE/CourTravail
url: https://juportal.be
