source_id: DE/NiedersachsenCaseLaw
name: Niedersachsen State Court Decisions (NI-VORIS Rechtsprechung)
description: Niedersachsen court decisions via HTML scraping (voris.wolterskluwer-online.de)
url: https://voris.wolterskluwer-online.de
country: DE
jurisdiction: Niedersachsen
data_types:
  - case_law

access:
  type: html_scraping
  rate_limit: 0.5/s
  auth: none

schema:
  key_fields:
    - name: _id
      type: string
      required: true
    - name: doc_id
      type: string
      required: true
    - name: title
      type: string
      required: true
    - name: text
      type: string
      required: true
    - name: court
      type: string
      required: false
    - name: case_number
      type: string
      required: false
    - name: ecli
      type: string
      required: false
    - name: date
      type: date
      required: false
    - name: url
      type: string
      required: false
  text_field: text
  date_field: date
  title_field: title

update:
  frequency: weekly
  method: fetch_updates

license:
  type: public_domain
  notes: German official works (§ 5 UrhG) - public domain

notes: |
  Niedersachsen court decisions from the NI-VORIS platform (Wolters Kluwer).
  ~46K decisions from all court branches since 1976.
  HTML scraping - no API available. Search pagination + individual document pages.
  robots.txt disallows /search/ and /node/ but decisions are publicly accessible.
