api:
  base_url: https://de.openlegaldata.io/api
  endpoints:
    cases: /cases/
    courts: /courts/
    laws: /laws/
    states: /states/
  format: json
  pagination:
    page_size: 100
    type: url_based
  rate_limit:
    requests_per_second: 2
  type: rest
data:
  coverage:
    caselaw: 251000+
    legislation: 57000+
  states:
  - Baden-Württemberg
  - Bayern
  - Berlin
  - Brandenburg
  - Bremen
  - Hamburg
  - Hessen
  - Mecklenburg-Vorpommern
  - Niedersachsen
  - Nordrhein-Westfalen
  - Rheinland-Pfalz
  - Saarland
  - Sachsen
  - Sachsen-Anhalt
  - Schleswig-Holstein
  - Thüringen
  types:
  - caselaw
  - legislation
license:
  name: Public Domain / CC0
  notes: German court decisions are public domain (amtliche Werke) under § 5 UrhG
schema:
  key_fields:
  - name: id
    required: false
    type: string
  - name: ecli
    required: false
    type: string
  optional_fields:
  - slug
  - file_number
  - type
  - created_date
  - updated_date
  required_fields:
  - id
  - content
  - court
  - date
source:
  country: DE
  description: 'Comprehensive German legal data platform providing court decisions and

    legislation from all 16 German states (Länder) plus federal courts.

    Free REST API with no authentication required.

    '
  id: DE/OpenLegalData
  name: Open Legal Data (openlegaldata.io)
  url: https://de.openlegaldata.io
