fetcher:
  class: BVerwGFetcher
  methods:
    fetch_all: true
    fetch_updates: true
  module: bootstrap
  rate_limit:
    delay_seconds: 1.5
    requests_per_second: 0.7
notes:
- Uses TOC-based discovery from rii-toc.xml for ~10,000+ decisions
- ZIP files contain structured XML with full decision text
- Supports incremental updates via RSS feed
- Same infrastructure as DE/BGH, DE/BSG, DE/BVerfG
schema:
  date_fields:
  - date
  - _fetched_at
  key_fields:
  - name: _id
    required: true
    type: string
  - name: ecli
    required: false
    type: string
  - name: aktenzeichen
    required: false
    type: string
  text_fields:
  - text
  - headnote
  - tenor
source:
  country: DE
  id: DE/BVerwG
  language: de
  license: Public Domain (§ 5 UrhG - amtliche Werke)
  name: Bundesverwaltungsgericht (BVerwG)
  name_en: German Federal Administrative Court
  type: caselaw
  url: https://www.rechtsprechung-im-internet.de
