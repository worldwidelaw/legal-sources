auth: none
country: DE
data_types:
- caselaw
name: German Federal Patent Court (BPatG)
notes: 'Data sourced from rechtsprechung-im-internet.de (operated by German Federal Ministry of Justice).

  Contains all BPatG decisions from 2010 onwards (~7,000+ decisions).

  ZIP files containing XML with full text are downloaded and parsed.

  Data is public domain under German law (amtliche Werke, § 5 UrhG).

  '
rate_limit: 1.5
schedule: weekly
schema:
  key_fields:
  - name: _id
    required: true
    type: string
  - name: ecli
    required: false
    type: string
  - name: aktenzeichen
    required: false
    type: string
  required_fields:
  - _id
  - _source
  - _type
  - _fetched_at
  - title
  - text
  - date
  - url
source_id: DE/BPatG
url: https://www.rechtsprechung-im-internet.de
