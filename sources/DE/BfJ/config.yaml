source_id: DE/BfJ
name: German Federal Office of Justice (BfJ) - Justice Statistics
description: Justice statistics and reports from the Bundesamt für Justiz
url: https://www.bundesjustizamt.de
country: DE
data_types:
  - doctrine

access:
  type: html_scraping
  rate_limit: 0.5/s
  auth: none

schema:
  key_fields:
    - name: _id
      type: string
      required: true
    - name: title
      type: string
      required: true
    - name: text
      type: string
      required: true
    - name: date
      type: date
      required: false
    - name: url
      type: string
      required: false
    - name: category
      type: string
      required: false
  text_field: text
  date_field: date
  title_field: title

update:
  frequency: monthly
  method: fetch_updates

license:
  type: public_domain
  notes: German official works (§ 5 UrhG) - public domain

notes: |
  Justice statistics published by the Federal Office of Justice (BfJ).
  200+ PDF reports covering extradition, legal aid, hate crime, court caseloads,
  personnel, judicial examinations, criminal justice, telecommunications surveillance, etc.
  PDFs extracted to text via common/pdf_extract.
