source_id: DE/BremenCaseLaw
name: Bremen State Court Decisions
description: Court decisions from four Bremen courts (OLG, OVG, VG, LArbG) via their SixCMS-based decision overview pages
url: https://justiz.de/onlinedienste/rechtsprechung/Entscheidungen-Bremen/index.php
country: DE
jurisdiction: Bremen
data_types:
  - case_law

access:
  type: html_scraping
  rate_limit: 0.5/s
  auth: none

schema:
  key_fields:
    - name: _id
      type: string
      required: true
    - name: doc_id
      type: string
      required: true
    - name: title
      type: string
      required: true
    - name: text
      type: string
      required: true
    - name: court
      type: string
      required: false
    - name: court_code
      type: string
      required: false
    - name: case_number
      type: string
      required: false
    - name: decision_type
      type: string
      required: false
    - name: legal_area
      type: string
      required: false
    - name: normen
      type: string
      required: false
    - name: date
      type: date
      required: false
    - name: url
      type: string
      required: false
  text_field: text
  date_field: date
  title_field: title

update:
  frequency: weekly
  method: fetch_updates

license:
  type: public_domain
  notes: German official works (§ 5 UrhG) - public domain

notes: |
  Bremen state court decisions from four courts:
  - OLG Bremen (~596 decisions)
  - OVG Bremen (~682 decisions)
  - VG Bremen (~696 decisions)
  - LArbG Bremen (~59 decisions)
  Total: ~2,033 decisions. PDFs downloaded and text extracted via pdfplumber.
