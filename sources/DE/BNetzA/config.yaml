  '
name: German Network Agency (Bundesnetzagentur) Decisions
notes: 'The Bundesnetzagentur (Federal Network Agency) is the German regulatory authority for

  electricity, gas, telecommunications, post, and railway markets.


  The decision database (Beschlussdatenbank) contains 19,217 decisions from ruling chambers

  (Beschlusskammern) dating from 1998 to present.


  Chambers: GBK (Grand Ruling Chamber for Energy), BK1-BK11 (specialized ruling chambers)


  Decisions are provided as PDF documents. Full text is extracted using pypdf.

  '
rate_limit:
  delay_seconds: 1.5
