name: German Federal Finance Court (Bundesfinanzhof)
notes: 'rechtsprechung-im-internet.de provides access to decisions from the

  Federal Finance Court (Bundesfinanzhof/BFH) and other supreme federal courts.


  Coverage:

  - 15,000+ decisions in the database

  - Full text available via ZIP XML downloads

  - ECLI identifiers included for case law interoperability


  The BFH is the supreme court for tax matters with senates covering:

  - Income tax and corporate tax

  - VAT and customs duties

  - Property tax and inheritance tax

  - Tax procedure and enforcement

  - Fiscal court organization


  Available formats:

  - HTML (web display)

  - PDF (print-ready)

  - XML (structured data via ZIP downloads)


  The RSS feed provides the most recent decisions (~200+).

  The TOC XML provides complete discovery of all 15,000+ decisions.

  '
