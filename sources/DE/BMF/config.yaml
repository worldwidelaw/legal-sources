name: BMF-Schreiben (German Federal Ministry of Finance Tax Circulars)
notes: 'BMF-Schreiben are administrative instructions (Verwaltungsanweisungen) issued

  by the German Federal Ministry of Finance. They provide binding guidance to

  tax authorities on how to interpret and apply tax law.


  Coverage:

  - 500+ BMF-Schreiben in the archive

  - Full text available via PDF downloads

  - Published in the Bundessteuerblatt (BStBl)


  Tax areas covered:

  - Income tax (Einkommensteuer)

  - Corporate tax (Körperschaftsteuer)

  - VAT (Umsatzsteuer)

  - International tax law

  - Tax procedure (Abgabenordnung)

  - Inheritance and gift tax


  Data is extracted from PDFs using pypdf for text extraction.

  Each document includes GZ (Geschäftszeichen) and DOK reference numbers.

  '
schema:
  date_format: ISO8601
  key_fields:
