source_id: DE/SachsenCaseLaw
name: Sachsen State Court Decisions
description: Saxon administrative court decisions from OVG Entscheidungsweb
url: https://www.justiz.sachsen.de/ovgentschweb/
country: DE
jurisdiction: Sachsen
data_types:
  - case_law

access:
  type: html_scraping
  rate_limit: 0.5/s
  auth: none

schema:
  key_fields:
    - name: _id
      type: string
      required: true
    - name: doc_id
      type: string
      required: true
    - name: title
      type: string
      required: true
    - name: text
      type: string
      required: true
    - name: court
      type: string
      required: false
    - name: case_number
      type: string
      required: false
    - name: decision_type
      type: string
      required: false
    - name: date
      type: date
      required: false
    - name: url
      type: string
      required: false
  text_field: text
  date_field: date
  title_field: title

update:
  frequency: weekly
  method: fetch_updates

license:
  type: public_domain
  notes: German official works (§ 5 UrhG) - public domain

notes: |
  Saxon administrative court decisions from OVG Entscheidungsweb.
  ~7,800 decisions from the Sächsisches Oberverwaltungsgericht (Bautzen).
  Search returns all IDs in a single page, documents have PDF full text.
  ESAMOSplus (ordinary courts, ~3K decisions) uses ASP.NET ViewState and
  is not yet implemented — could be added as a future enhancement.
