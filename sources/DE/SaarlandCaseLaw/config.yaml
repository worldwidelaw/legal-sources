source_id: DE/SaarlandCaseLaw
name: Saarland State Court Decisions
description: Saarland court decisions via jPortal API (recht.saarland.de)
url: https://recht.saarland.de/bssl/
country: DE
jurisdiction: Saarland
data_types:
  - case_law

access:
  type: rest_api
  rate_limit: 0.5/s
  auth: none

schema:
  key_fields:
    - name: _id
      type: string
      required: true
    - name: doc_id
      type: string
      required: true
    - name: title
      type: string
      required: true
    - name: text
      type: string
      required: true
    - name: court
      type: string
      required: false
    - name: case_number
      type: string
      required: false
    - name: ecli
      type: string
      required: false
    - name: date
      type: date
      required: false
    - name: url
      type: string
      required: false
  text_field: text
  date_field: date
  title_field: title

update:
  frequency: weekly
  method: fetch_updates

license:
  type: public_domain
  notes: German official works (§ 5 UrhG) - public domain

notes: |
  Saarland state court decisions from the official Landesrecht portal.
  Uses the juris jPortal REST API (same platform as DE/HessenCaseLaw).
  ~7K court decisions from all court branches.
  API flow: session init → CSRF token → search pagination → document fetch.
