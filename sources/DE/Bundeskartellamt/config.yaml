fetch:
  max_concurrent: 1
  method: html_scrape_pdf
  rate_limit: 1.5
schema:
  document_fields:
  - text
  - title
  - case_number
  - decision_date
  - decision_type
  - procedure_type
  - url
  key_fields:
  - name: _id
    required: true
    type: string
  - name: case_number
    required: false
    type: string
  - name: decision_date
    required: false
    type: date
source:
  country: DE
  data_types:
  - doctrine
  description: 'German Federal Cartel Office decisions including:

    - Kartellverbot (cartel prohibition)

    - Missbrauchsaufsicht (abuse of dominance)

    - Fusionskontrolle (merger control)

    Coverage: 2000-present

    '
  id: DE/Bundeskartellamt
  jurisdiction: national
  language: de
  name: German Federal Cartel Office (Bundeskartellamt)
  url: https://www.bundeskartellamt.de
