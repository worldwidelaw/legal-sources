notes: |
  This source fetches Rote-Hand-Briefe (Red Hand Letters) - urgent safety communications
  about pharmaceuticals. These are official regulatory decisions/warnings from BfArM.

  Documents are primarily available as PDFs. Text is extracted using pdfminer.

  Total archive: ~540+ documents from 2007 to present.
  New documents typically 2-10 per month.

  Access methods:
  - RSS feed for recent entries (20 most recent)
  - HTML pagination for full archive (54+ pages)
  - Direct PDF download for full text extraction
