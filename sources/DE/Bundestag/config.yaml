# German Federal Parliament (Bundestag) Data Source Configuration
# Parliamentary documents from the DIP (Dokumentations- und Informationssystem)

source_id: "DE/Bundestag"
name: "German Federal Parliament (Bundestag)"
country: "DE"
language: "de"
data_types:
  - legislation

# Data endpoints
endpoints:
  # DIP API (includes both Bundestag and Bundesrat data)
  api_base: "https://search.dip.bundestag.de/api/v1"

  # Drucksache (printed documents) endpoints
  drucksache_list: "https://search.dip.bundestag.de/api/v1/drucksache"
  drucksache_text: "https://search.dip.bundestag.de/api/v1/drucksache-text"

  # Portal
  portal: "https://www.bundestag.de"
  dip_portal: "https://dip.bundestag.de"

# Authentication
auth:
  type: "api_key"
  header: "Authorization"
  header_prefix: "ApiKey "
  # Public demo key valid until May 2026
  demo_key: "OSOegLs.PR2lwJ1dwCeje9vTj7FPOt3hvpYKtwKkhw"

# Schema information
schema:
  key_fields:
    - "id"              # DIP document ID
    - "dokumentnummer"  # Document number (e.g., "20/12345")
  date_format: "ISO8601"
  text_field: "text"

# License
license:
  name: "Open Data"
  url: "https://dip.bundestag.de/impressum"
  notes: |
    Parliamentary documents are available as open data through the DIP API.
    The API provides machine-readable access to Bundestag proceedings.

# Fetcher configuration
fetcher:
  rate_limit_ms: 500
  ssl_verify: true
  timeout_s: 60
  max_retries: 3
  # Filter for Bundestag only: f.zuordnung=BT
  default_params:
    f.zuordnung: "BT"

# Notes
notes: |
  The Bundestag is the German federal parliament (lower house).

  The DIP API provides access to ~184,000 Bundestag documents including:
  - Drucksachen (printed materials: bills, motions, reports)
  - Plenarprotokolle (plenary protocols)
  - Vorgänge (legislative proceedings)

  Documents are filtered by zuordnung=BT (Bundestag) to exclude Bundesrat content.

  API documentation: https://dip.bundestag.de/über-dip/hilfe/api
  Public API key valid until May 2026.
