fetch:
  api_url: https://data.rechtspraak.nl/uitspraken/zoeken
  instantie: Centrale Raad van Beroep
  method: rechtspraak_api
  rate_limit_delay: 2.0
schema:
  key_fields:
  - name: _id
    required: true
    type: string
  - name: title
    required: true
    type: string
  - name: date
    required: false
    type: date
  - name: text
    required: true
    type: string
  - name: url
    required: true
    type: string
  - name: ecli
    required: false
    type: string
  - name: court
    required: false
    type: string
  - name: subject
    required: false
    type: string
  - name: procedure
    required: false
    type: string
source:
  auth: none
  country: NL
  data_types:
  - case_law
  id: NL/CRvB
  license: Public Domain (Dutch court decisions)
  name: Dutch Central Appeals Tribunal
  url: https://www.rechtspraak.nl
