api:
  content_url: https://data.rechtspraak.nl/uitspraken/content
  format: XML
  rate_limit_per_second: 10
  search_url: https://data.rechtspraak.nl/uitspraken/zoeken
schema:
  key_fields:
  - name: _id
    required: true
    type: string
  - name: ecli
    required: false
    type: string
  - name: court
    required: false
    type: string
  - name: court_id
    required: false
    type: string
  - name: date
    required: false
    type: date
  - name: case_number
    required: false
    type: string
  - name: procedure
    required: false
    type: string
  - name: legal_area
    required: false
    type: string
  - name: text
    required: true
    type: string
  - name: summary
    required: false
    type: string
  - name: url
    required: true
    type: string
  - name: relations
    required: false
    type: string
  - name: citations
    required: false
    type: string
  - name: publication_date
    required: false
    type: date
source:
  auth: none
  country: NL
  data_types:
  - caselaw
  description: 'Dutch court decisions from Rechtspraak.nl Open Data service.

    Covers all Dutch courts including Supreme Court (Hoge Raad), Courts of Appeal,

    District Courts, and specialized tribunals.

    Data is provided via a RESTful API with XML responses containing full text.

    '
  id: NL/BAILII
  license: CC0 / Public Domain
  name: Dutch Case Law (Rechtspraak.nl)
  url: https://data.rechtspraak.nl
