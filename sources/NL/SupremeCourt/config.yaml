api:
  auth: none
  base_url: https://data.rechtspraak.nl/uitspraken
  content_endpoint: /content
  rate_limit_per_second: 10
  search_endpoint: /zoeken
  type: rest
data:
  coverage: 1999-present
  format: xml
  language: nl
  types:
  - caselaw
  update_frequency: daily
license:
  commercial_use: true
  name: Open Government Data
  url: https://www.rechtspraak.nl/Uitspraken/Paginas/Open-Data.aspx
schema:
  key_fields:
  - name: ecli
    required: false
    type: string
  - name: case_number
    required: false
    type: string
  - name: decision_date
    required: false
    type: date
  - name: subject_area
    required: false
    type: string
  - name: procedure_type
    required: false
    type: string
  - name: text
    required: true
    type: string
source:
  country: NL
  id: NL/SupremeCourt
  name: Dutch Supreme Court (Hoge Raad)
  url: https://www.rechtspraak.nl
