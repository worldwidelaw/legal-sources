fetch:
  full_text_url_pattern: https://zoek.officielebekendmakingen.nl/{identifier}.xml
  method: sru_api
  queries:
  - creator="ministerie van financiën" AND type="ander besluit van algemene strekking"
  - creator="ministerie van financiën" AND type="beleidsregel"
  rate_limit_delay: 1.5
  sru_url: https://zoek.officielebekendmakingen.nl/sru/Search
schema:
  key_fields:
  - name: _id
    required: true
    type: string
  - name: title
    required: true
    type: string
  - name: date
    required: false
    type: date
  - name: text
    required: true
    type: string
  - name: url
    required: true
    type: string
  - name: doc_type
    required: false
    type: string
  - name: subjects
    required: false
    type: string
source:
  auth: none
  country: NL
  data_types:
  - doctrine
  id: NL/Belastingdienst
  license: Public Domain (Dutch government publications)
  name: Dutch Tax Administration (Belastingdienst)
  url: https://zoek.officielebekendmakingen.nl
