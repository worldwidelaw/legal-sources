    required: false
    type: date
  - name: text
    required: true
    type: string
  - name: url
    required: true
    type: string
  - name: ecli
    required: false
    type: string
  - name: court
    required: false
    type: string
  - name: subject
    required: false
    type: string
  - name: procedure
    required: false
    type: string
source:
  auth: none
  country: NL
  data_types:
  - case_law
  id: NL/HR-Belasting
  license: Public Domain (Dutch court decisions)
  name: Dutch Supreme Court - Tax Chamber
