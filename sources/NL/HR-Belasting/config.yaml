source:
  id: NL/HR-Belasting
  name: Dutch Supreme Court - Tax Chamber
  country: NL
  url: https://www.rechtspraak.nl
  data_types:
    - case_law
  auth: none
  license: Public Domain (Dutch court decisions)

schema:
  key_fields:
    - _id
    - title
    - date
    - text
    - url
    - ecli
    - court
    - subject
    - procedure

fetch:
  method: rechtspraak_api
  api_url: https://data.rechtspraak.nl/uitspraken/zoeken
  creator: http://standaarden.overheid.nl/owms/terms/Hoge_Raad_der_Nederlanden
  subject: http://psi.rechtspraak.nl/rechtsgebied#bestuursrecht_belastingrecht
  rate_limit_delay: 2.0
