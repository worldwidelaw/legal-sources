api:
  base_url: https://www.constcourt.ge
  detail_endpoint: /ka/judicial-acts?legal={legal_id}
  list_endpoint: /ka/judicial-acts
  pagination:
    items_per_page: 100
    param: page
    quantity_param: quantity
    type: page_number
  rate_limit:
    delay_between_requests: 2
    requests_per_second: 0.5
  type: html_scraping
schema:
  key_fields:
  - name: legal_id
    required: false
    type: string
  - name: case_number
    required: false
    type: string
  optional_fields:
  - document_type
  - chamber
  - author
  - publication_date
  required_fields:
  - _id
  - _source
  - _type
  - _fetched_at
  - title
  - text
  - date
  - url
source:
  country: GE
  data_types:
  - caselaw
  id: GE/ConstitutionalCourt
  language: ka
  license: public
  name: Georgian Constitutional Court
  update_frequency: daily
  url: https://www.constcourt.ge
