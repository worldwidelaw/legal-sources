source:
  id: GE/ConstitutionalCourt
  name: Georgian Constitutional Court
  url: https://www.constcourt.ge
  country: GE
  language: ka
  data_types:
    - caselaw
  license: public
  update_frequency: daily

api:
  type: html_scraping
  base_url: https://www.constcourt.ge
  list_endpoint: /ka/judicial-acts
  detail_endpoint: /ka/judicial-acts?legal={legal_id}
  pagination:
    type: page_number
    param: page
    items_per_page: 100
    quantity_param: quantity
  rate_limit:
    requests_per_second: 0.5
    delay_between_requests: 2

schema:
  key_fields:
    - legal_id
    - case_number
  required_fields:
    - _id
    - _source
    - _type
    - _fetched_at
    - title
    - text
    - date
    - url
  optional_fields:
    - document_type
    - chamber
    - author
    - publication_date
