# ===================================================================
# CK/PacLII -- Cook Islands Legal Information (PacLII)
# ===================================================================
# HTML scraping of PacLII Cook Islands databases.
# Full text in HTML pages for both case law and legislation.
# ===================================================================

source:
  id: "CK/PacLII"
  country: "CK"
  name: "Cook Islands (PacLII)"
  url: "https://www.paclii.org/ck/"
  description: |
    Cook Islands case law and legislation via PacLII. ~3,200 documents
    across 4 court databases and 4 legislation databases. Full text in HTML.

data_types:
  - case_law
  - legislation

auth:
  type: "none"

rate_limit:
  requests_per_second: 0.5
  burst: 1
  notes: "2-second delay between requests. Browser User-Agent required."

api:
  type: "scraping"
  base_url: "https://www.paclii.org"
  endpoints:
    cases: "/ck/cases/{court}/{year}/"
    legislation: "/ck/legis/{type}/toc-{letter}.html"
  response_format: "html"

schema:
  total_fields: 10
  key_fields:
    - name: "document_id"
      description: "Unique document ID from URL path"
      type: "string"
      role: "primary_key"
      required: true
    - name: "title"
      description: "Document title"
      type: "string"
      role: "content"
      required: true
    - name: "text"
      description: "Full text of the document"
      type: "string"
      role: "content"
      required: true
    - name: "date"
      description: "Decision/enactment date"
      type: "date"
      role: "temporal_key"
      required: false
    - name: "url"
      description: "Document URL on PacLII"
      type: "string"
      role: "reference"
      required: true
