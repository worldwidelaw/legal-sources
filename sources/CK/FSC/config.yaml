# CK/FSC -- Cook Islands Financial Supervisory Commission
source:
  id: "CK/FSC"
  name: "Cook Islands Financial Supervisory Commission"
  url: "https://www.fsc.gov.ck/"
  country: "CK"
  data_types:
    - doctrine
  auth:
    type: none
  license: "Open Government Data"

rate_limit:
  requests_per_second: 1
  burst: 3

schema:
  key_fields:
    - name: _id
      type: string
      required: true
    - name: title
      type: string
      required: true
    - name: text
      type: string
      required: true
    - name: date
      type: string
      required: false
    - name: url
      type: string
      required: true

data_model:
  update_strategy: upsert
  dedup_key:
    - _id
