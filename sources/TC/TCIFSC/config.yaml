source:
  id: "TC/TCIFSC"
  country: "TC"
  name: "Turks and Caicos Islands Financial Services Commission"
  url: "https://www.tcifsc.tc/"
  description: |
    Regulatory advisories, enforcement reports, policies, guidelines,
    and sector-specific legislation from the TCIFSC.
    Covers banking, trust companies, insurance, money transmitters.

data_types:
  - doctrine

auth:
  type: "none"

rate_limit:
  requests_per_second: 0.5
  burst: 2

api:
  type: "html_scrape"
  base_url: "https://www.tcifsc.tc"

data_model:
  type: "doctrine"
  source_nature: "gazette"
  primary_key: "_id"
  update_strategy: "upsert"
  versioning: "none"

schema:
  total_fields: 9
  key_fields:
    - name: "_id"
      description: "Unique document identifier from PDF filename"
      type: "string"
      role: "primary_key"
      required: true
    - name: "title"
      description: "Document title"
      type: "string"
      role: "content"
      required: true
    - name: "text"
      description: "Full text extracted from PDF"
      type: "string"
      role: "content"
      required: true
    - name: "date"
      description: "Year extracted from title"
      type: "date"
      role: "temporal_key"
      required: false
    - name: "doc_type"
      description: "Document type (regulatory_advisory, enforcement_report, guideline, legislation)"
      type: "string"
      role: "content"
      required: false
  secondary_fields:
    - name: "category"
      description: "Source category"
    - name: "url"
      description: "URL to original PDF"

license:
  name: "TCI Government Publication"
  url: "https://www.tcifsc.tc/"
  commercial_use: true
  attribution_required: false
  share_alike: false
  no_derivatives: false
  notes: "Government regulatory documents published for public compliance."
