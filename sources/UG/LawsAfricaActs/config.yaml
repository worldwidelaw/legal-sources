# ===================================================================
# UG/LawsAfricaActs -- Uganda Acts (via ULII / Laws.Africa)
# ===================================================================
# Ugandan legislation from ulii.org (Uganda Legal Information Institute).
# Akoma Ntoso HTML, no auth required. ~625 acts.
# 5-second crawl delay per robots.txt.
# ===================================================================

source:
  id: "UG/LawsAfricaActs"
  country: "UG"
  name: "Uganda Acts (Laws.Africa / ULII)"
  url: "https://ulii.org/en/legislation/"
  description: |
    Ugandan legislation from the Uganda Legal Information Institute (ULII),
    powered by Laws.Africa. Contains principal acts, ordinances, decrees,
    and statutory instruments. Full text in Akoma Ntoso HTML format.
    No authentication required.

data_types:
  - legislation

auth:
  type: "none"

rate_limit:
  requests_per_second: 0.2
  burst: 1

data_model:
  type: "legislation"
  primary_key: "doc_id"
  update_strategy: "upsert"
  dedup_key:
    - "doc_id"

schema:
  total_fields: 6
  key_fields:
    - name: "doc_id"
      description: "Document ID derived from AKN path"
      type: "string"
      role: "primary_key"
      required: true
    - name: "title"
      description: "Act title"
      type: "string"
      role: "content"
      required: true
    - name: "text"
      description: "Full text of the act"
      type: "string"
      role: "content"
      required: true
    - name: "date"
      description: "Assent/commencement date"
      type: "date"
      role: "temporal_key"
      required: false
    - name: "url"
      description: "URL on ulii.org"
      type: "string"
      role: "reference"
      required: true

notes: |
  - ~625 acts via ulii.org paginated listing
  - Full text in Akoma Ntoso HTML (la-akoma-ntoso element)
  - 5-second crawl delay required per robots.txt
  - English language
  - No API key needed (using web scraping, not API)
