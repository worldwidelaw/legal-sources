endpoints:
  base_url: https://kuria-birosag.hu
  decision_patterns:
  - /hu/valhat/
  - /hu/joghat/
  - /hu/onkugy/
  - /hu/nepszavugy/
  - /hu/ejeb/
  - /hu/alkotmbir-hat/
  - /hu/jogegysegi-panasz/
  - /hu/kuriai-dontesek/
  - /hu/gyulhat/
  - /hu/kollvel/
  sitemap: /hu/sitemap.xml
fetch:
  method: sitemap_scrape
  notes: 'Uses XML sitemap to discover decision URLs.

    Full text extracted from HTML body field.

    Uses curl subprocess due to Python SSL compatibility issues.

    '
  rate_limit: 1.5
  user_agent: Legal Data Hunter/1.0 (EU Legal Research)
schema:
  key_fields:
  - name: case_number
    required: false
    type: string
  - name: decision_number
    required: false
    type: string
  normalized_fields:
  - _id
  - _source
  - _type
  - _fetched_at
  - title
  - text
  - date
  - url
  - decision_number
  - case_number
  - decision_type
source:
  country: HU
  data_type: caselaw
  id: HU/FelsoBirosag
  language: hu
  license: Public Domain
  name: Hungarian Supreme Court (Kúria)
  url: https://kuria-birosag.hu
