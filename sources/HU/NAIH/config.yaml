fetch:
  base_url: https://www.naih.hu
  method: html_scraping
  pagination:
    param: start
    step: 50
  rate_limit:
    delay_seconds: 1.5
  sections:
  - label: GDPR Decisions
    path: /hatarozatok-vegzesek
    type: decisions
  - label: Privacy Opinions
    path: /adatvedelmi-allasfoglalasok
    type: opinions
  - label: Recommendations
    path: /adatvedelmi-ajanlasok
    type: recommendations
schema:
  key_fields:
  - name: _id
    required: true
    type: string
  - name: case_number
    required: false
    type: string
  - name: title
    required: true
    type: string
  - name: date
    required: false
    type: date
  - name: text
    required: true
    type: string
  - name: section
    required: false
    type: string
  - name: url
    required: true
    type: string
source:
  auth: none
  country: HU
  data_types:
  - doctrine
  id: HU/NAIH
  license: public_domain
  name: Hungarian Data Protection Authority (NAIH)
  url: https://www.naih.hu
