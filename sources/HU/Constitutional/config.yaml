endpoints:
  gazette_archive: https://alkotmanybirosag.hu/az-alkotmanybirosag-hatarozatai-ab-kozlony/
  media_base: https://media.alkotmanybirosag.hu
  recent_decisions: https://alkotmanybirosag.hu/a-legfrissebb-dontesek/
fetch:
  method: scrape_nextjs
  rate_limit: 1.5
  user_agent: Legal Data Hunter/1.0 (EU Legal Research)
schema:
  key_fields:
  - name: decision_number
    required: false
    type: string
  - name: date
    required: false
    type: date
  normalized_fields:
  - _id
  - _source
  - _type
  - _fetched_at
  - title
  - text
  - date
  - url
  - decision_number
  - decision_type
  - rapporteur
  - summary
  - pdf_url
source:
  country: HU
  data_type: caselaw
  id: HU/Constitutional
  language: hu
  license: Public Domain
  name: Hungarian Constitutional Court (Alkotmánybíróság)
  url: https://alkotmanybirosag.hu
