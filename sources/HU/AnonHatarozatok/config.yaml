endpoints:
  base_url: https://eakta.birosag.hu
  download_rtf: /AnonimizaltHatarozat/DownloadHatarozatMobile?Area=
  search: /AnonimizaltHatarozat/Search?Area=
  session_page: /anonimizalt-hatarozatok
fetch:
  max_results_per_query: 10000
  method: json_api
  notes: 'Uses undocumented ENCO Grid JSON API. Pagination via ResultStartIndex/ResultCount.

    API caps at 10,000 results per query — must partition by court/legal area/date.

    Full text via RTF download, converted with striprtf.

    Session cookie required (get from /anonimizalt-hatarozatok first visit).

    '
  page_size: 100
  rate_limit: 1.5
schema:
  key_fields:
  - name: egyedi_azonosito
    required: false
    type: string
  - name: azonosito
    required: false
    type: string
  normalized_fields:
  - _id
  - _source
  - _type
  - _fetched_at
  - title
  - text
  - date
  - url
  - case_number
  - court
  - collegium
  - legal_area
  - legal_provisions
  - abstract
source:
  country: HU
  data_type: case_law
  id: HU/AnonHatarozatok
  language: hu
  license: Public Domain
  name: Hungarian Anonymized Court Decisions (Anonimizált Határozatok Tára)
  url: https://eakta.birosag.hu/anonimizalt-hatarozatok
