source_id: RU/Sudact
name: "Sudact.ru - Russian Court Decisions"
country: RU
url: https://sudact.ru/
description: >
  Largest open database of Russian court decisions (sudebnye i normativnye akty RF).
  Covers courts of general jurisdiction, arbitration courts, magistrate courts,
  and the Supreme Court across all 85+ Russian federal subjects.
  Aggregates from GAS Pravosudie (sudrf.ru).

data_type: case_law

auth:
  type: none

rate_limit:
  requests_per_second: 1
  burst: 2

data_model:
  update_strategy: append_only
  dedup_key:
    - _id

schema:
  key_fields:
    - name: "_id"
      type: "string"
      required: true
      role: "primary_key"
    - name: "title"
      type: "string"
      required: true
      role: "content"
    - name: "text"
      type: "string"
      required: true
      role: "content"
    - name: "date"
      type: "string"
      required: false
    - name: "court"
      type: "string"
      required: true
    - name: "url"
      type: "string"
      required: true
