auth: none
country: BA
data_types:
- legislation
description: 'Legislation from Republika Srpska (one of the two entities of Bosnia and Herzegovina).

  Fetches consolidated legislation from Paragraf BA, which provides free public access

  to key RS laws, regulations, and decisions originally published in Službeni glasnik

  Republike Srpske (Official Gazette of Republika Srpska).

  '
license: public
name: Republika Srpska Legislation
notes: "- Source provides ~160+ key legislation documents\n- All documents have full text in HTML format\n- Documents are consolidated/precisceni versions with amendments incorporated\n- Covers major laws\
  \ (zakon/zakonik), regulations (uredba), rulebooks (pravilnik),\n  and decisions (odluka)\n- Complements BA/SluzbenGlasnik (state-level) and BA/FBiH (Federation of BiH)\n"
official_gazette: Službeni glasnik Republike Srpske
region: Republika Srpska
schedule:
  bootstrap: manual
  updates: weekly
schema:
  fields:
    _fetched_at:
      description: ISO 8601 timestamp of fetch
      type: datetime
    _id:
      description: Unique document identifier
      type: string
    _source:
      description: Source identifier (BA/RS)
      type: string
    _type:
      description: Document type (legislation)
      type: string
    date:
      description: Publication date in gazette
      type: date
    doc_type:
      description: Document type (zakon, uredba, pravilnik, odluka, etc.)
      type: string
    gazette_number:
      description: Official gazette issue number (e.g., "64/2017")
      type: string
    language:
      description: Language code (sr - Serbian)
      type: string
    text:
      description: Full text of the legislation
      type: string
    title:
      description: Document title
      type: string
    url:
      description: Link to original document
      type: string
  key_fields:
  - name: _id
    required: true
    type: string
  - name: gazette_number
    required: false
    type: string
  - name: slug
    required: false
    type: string
source_id: BA/RS
url: https://www.paragraf.ba/besplatni-propisi-republike-srpske.html
