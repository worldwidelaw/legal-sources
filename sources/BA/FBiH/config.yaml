    gazette_number: string
    language: string
    law_number: string
    text: string
    title: string
    url: string
    year: integer
  key_fields:
  - name: _id
    required: true
    type: string
  - name: gazette_number
    required: false
    type: string
  - name: year
    required: false
    type: string
source_id: BA/FBiH
