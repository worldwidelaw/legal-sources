auth:
  type: none
country: BA
coverage:
  estimated_documents: 250
  start_year: 2019
  update_frequency: weekly
data_types:
- legislation
description: 'Legislation from the Federation of Bosnia and Herzegovina (FBiH),

  one of the two entities of Bosnia and Herzegovina. Full text of laws

  is available via the FBiH Government website (fbihvlada.gov.ba).


  The FBiH has its own Parliament (Dom naroda and Predstavnički dom)

  that adopts entity-level legislation. This source provides federal

  FBiH laws published in the Official Gazette (Službene novine FBiH).


  Note: This complements BA/SluzbenGlasnik (state-level) and BA/Brcko (district).

  Canton-level legislation requires separate sources.

  '
entity: FBiH
name: Federation of BiH Official Gazette (Službene novine FBiH)
notes: '- Full text is available via FBiH Government website (free access)

  - The official gazette (sluzbenilist.ba) requires subscription for FBiH content

  - Chronological registers available from 2019 onwards

  - Content is in Bosnian, Croatian, and Serbian variants

  - FBiH has 10 cantons with own legislation (not covered here)

  '
rate_limit:
  delay_seconds: 1.5
  requests_per_minute: 30
schema:
  fields:
    _fetched_at: datetime
    _id: string
    _source: string
    _type: string
