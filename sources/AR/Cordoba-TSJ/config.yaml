# ===================================================================
# AR/Cordoba-TSJ -- Córdoba Tribunal Superior de Justicia
# ===================================================================
# Uses the SAIJ public JSON API with tribunal + jurisdiction filters
# + PDF text extraction. ~4,000+ decisions.
# ===================================================================

source:
  id: "AR/Cordoba-TSJ"
  country: "AR"
  name: "Córdoba Tribunal Superior de Justicia"
  url: "https://www.saij.gob.ar"
  description: |
    Córdoba province Superior Court decisions via the SAIJ
    public JSON API. Covers civil, criminal, labor, and
    administrative law from Córdoba's highest provincial court.

data_types:
  - case_law

auth:
  type: "none"

rate_limit:
  requests_per_second: 2
  burst: 5

api:
  type: "rest"
  base_url: "https://www.saij.gob.ar"
  endpoints:
    search: "/busqueda"
    document: "/view-document"
  pagination:
    offset_param: "o"
    page_size_param: "p"
    max_page_size: 100

data_model:
  type: "caselaw"
  primary_key: "uuid"
  update_strategy: "upsert"

schema:
  total_fields: 15
  key_fields:
    - name: "uuid"
      description: "SAIJ unique document identifier"
      type: "string"
      role: "primary_key"
      required: true
    - name: "title"
      description: "Case title (caratula)"
      type: "string"
      role: "content"
      required: true
    - name: "text"
      description: "Full text of the decision or summary"
      type: "string"
      role: "content"
      required: true
    - name: "date"
      description: "Decision date"
      type: "date"
      role: "temporal_key"
      required: false
    - name: "tribunal"
      description: "Court name"
      type: "string"
      role: "classification"
      required: false
    - name: "url"
      description: "Direct URL to the document"
      type: "string"
      role: "reference"
      required: true

notes: |
  - Uses SAIJ API with tribunal + jurisdiction filters for TSJ Córdoba
  - Filters: Jurisdicción/Local/Córdoba + Tribunal/TRIBUNAL SUPERIOR DE JUSTICIA
  - ~4,000+ decisions with full text via PDF extraction (pdfplumber)
  - Language: Spanish
