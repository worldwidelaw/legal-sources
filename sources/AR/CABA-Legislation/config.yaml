source:
  id: AR/CABA-Legislation
  name: "Ciudad Autónoma de Buenos Aires Legislation (CEDOM)"
  country: AR
  url: https://boletinoficial.buenosaires.gob.ar/normativa
  data_types:
    - legislation
  auth: none
  format: json+pdf
  language: es
  description: >
    Legislation from Buenos Aires City (CABA) via the Boletín Oficial REST API.
    Covers laws (Leyes) and decrees (Decretos) from 1996 to present.
    Full text extracted from PDF documents served by the API.

schema:
  key_fields:
    - _id
    - title
    - text
    - date
    - norm_type
    - norm_number
    - year
    - issuing_body
    - url

fetcher:
  base_url: "https://api-restboletinoficial.buenosaires.gob.ar"
  rate_limit: 2.0
  api_type: rest_json
