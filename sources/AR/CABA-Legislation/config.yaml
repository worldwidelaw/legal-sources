fetcher:
  api_type: rest_json
  base_url: https://api-restboletinoficial.buenosaires.gob.ar
  rate_limit: 2.0
schema:
  key_fields:
  - name: _id
    required: true
    type: string
  - name: title
    required: true
    type: string
  - name: text
    required: true
    type: string
  - name: date
    required: false
    type: date
  - name: norm_type
    required: false
    type: string
  - name: norm_number
    required: false
    type: string
  - name: year
    required: false
    type: string
  - name: issuing_body
    required: false
    type: string
  - name: url
    required: true
    type: string
source:
  auth: none
  country: AR
  data_types:
  - legislation
  description: 'Legislation from Buenos Aires City (CABA) via the Boletín Oficial REST API. Covers laws (Leyes) and decrees (Decretos) from 1996 to present. Full text extracted from PDF documents served
    by the API.

    '
  format: json+pdf
  id: AR/CABA-Legislation
  language: es
  name: Ciudad Autónoma de Buenos Aires Legislation (CEDOM)
  url: https://boletinoficial.buenosaires.gob.ar/normativa
