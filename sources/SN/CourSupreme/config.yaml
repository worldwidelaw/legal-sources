# ===================================================================
# SN/CourSupreme -- Senegal Supreme Court Decisions (Juricaf)
# ===================================================================
# Senegalese Supreme Court (Cour suprême) decisions from juricaf.org.
# ~7,459 decisions with full text. French language.
# ODbL 1.0 license. No authentication required.
# ===================================================================

source:
  id: "SN/CourSupreme"
  country: "SN"
  name: "Senegal Supreme Court Decisions (Juricaf)"
  url: "https://juricaf.org"
  description: |
    Supreme Court decisions from Senegal via the Juricaf database
    (Association des Hautes Juridictions de Cassation des pays ayant
    en partage l'usage du français - AHJUCAF).
    ~7,459 decisions from the Cour suprême. French language.
    ODbL 1.0 license. No authentication required.

data_types:
  - case_law

auth:
  type: "none"

rate_limit:
  requests_per_second: 0.5
  burst: 1

data_model:
  type: "case_law"
  primary_key: "decision_id"
  update_strategy: "upsert"
  dedup_key:
    - "decision_id"

schema:
  total_fields: 9
  key_fields:
    - name: "decision_id"
      description: "Juricaf decision identifier"
      type: "string"
      role: "primary_key"
      required: true
    - name: "title"
      description: "Decision title"
      type: "string"
      role: "content"
      required: true
    - name: "text"
      description: "Full text of the court decision"
      type: "string"
      role: "content"
      required: true
    - name: "date"
      description: "Decision date (ISO 8601)"
      type: "date"
      role: "temporal_key"
      required: false
    - name: "court"
      description: "Court name"
      type: "string"
      role: "category"
      required: false
    - name: "docket_number"
      description: "Case/docket number"
      type: "string"
      role: "identifier"
      required: false
    - name: "url"
      description: "URL on juricaf.org"
      type: "string"
      role: "reference"
      required: true

notes: |
  - ~7,459 decisions via juricaf.org JSON API + HTML full text
  - JSON search API for listing (500 results/page)
  - Full text extracted from individual decision HTML pages (div#textArret)
  - Dublin Core metadata from HTML meta tags
  - 2-second delay between requests
  - French language
  - ODbL 1.0 license
