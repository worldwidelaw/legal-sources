rate_limit:
  burst: 2
  requests_per_second: 0.5
schema:
  key_fields:
  - name: _id
    required: true
    type: string
  - name: title
    required: true
    type: string
  - name: text
    required: true
    type: string
  - name: date
    required: false
    type: date
  - name: url
    required: true
    type: string
  - name: _type
    required: false
    type: string
  - name: _source
    required: false
    type: string
  - name: _fetched_at
    required: false
    type: string
  - name: norm_type
    required: false
    type: string
  - name: norm_number
    required: false
    type: string
  - name: authority
    required: false
    type: string
  - name: year
    required: false
    type: string
source:
  auth: none
  country: PA
  data_types:
  - legislation
  description: 'Official Panama legislation from the National Assembly''s Legispan platform. Covers laws, executive decrees, resolutions, and other norms from 1903 to present. 57,000+ documents with full
    text via public REST API.

    '
  id: PA/Legispan
  language: es
  license: Government of Panama (open access)
  name: Legispan - Panama National Assembly Legislation
  url: https://legispan.asamblea.gob.pa
