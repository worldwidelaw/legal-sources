source:
  id: GR/NTA
  country: GR
  name: National Transparency Authority (AEAD)
  name_native: Εθνική Αρχή Διαφάνειας
  url: https://aead.gr
  data_url: https://diavgeia.gov.gr/luminapi/opendata
  description: >
    Greek National Transparency Authority decisions. Fetches from the Diavgeia
    transparency portal. Covers administrative acts, audit findings, ethics
    committee decisions. ~2,925 decisions since 2020.
  data_types:
    - doctrine
  auth: none
  license: CC-BY
  coverage:
    start_date: "2020-01-01"
    jurisdictions:
      - GR
  update_frequency: daily
  notes: >
    AEAD oversees transparency, anti-corruption, and public sector audits.
    Data accessed via Diavgeia API using org NATIONAL_TRANSPARENCY_AUTHORITY.

api:
  base_url: https://diavgeia.gov.gr/luminapi
  organization_uid: NATIONAL_TRANSPARENCY_AUTHORITY
  rate_limit: 2.0
  page_size: 50

schema:
  key_fields:
    - ada
    - subject
    - issue_date
    - protocol_number
