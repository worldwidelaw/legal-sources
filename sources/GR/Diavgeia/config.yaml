endpoints:
  decisions: https://diavgeia.gov.gr/luminapi/api/decisions/{ada}
  document: https://diavgeia.gov.gr/doc/{ada}
  organizations: https://diavgeia.gov.gr/luminapi/opendata/organizations
  search: https://diavgeia.gov.gr/luminapi/opendata/search
rate_limit:
  delay_between_requests: 1.0
  requests_per_second: 1
schema:
  key_fields:
  - name: _id
    required: true
    type: string
  - name: title
    required: true
    type: string
  - name: text
    required: true
    type: string
  - name: date
    required: false
    type: date
  - name: url
    required: true
    type: string
  optional_fields:
  - published_date
  - organization_id
  - decision_type
  - thematic_categories
  - extra_fields
  - status
  - document_url
source:
  auth: none
  country: GR
  data_types:
  - doctrine
  description: 'Greek government decisions published under the Diavgeia transparency program. All public sector organizations must publish their decisions online. Contains 71+ million administrative decisions
    since 2010.

    '
  id: GR/Diavgeia
  license: CC-BY
  name: Diavgeia - Greek Government Decisions
  url: https://diavgeia.gov.gr
