source:
  id: GR/Ombudsman
  country: GR
  name: Greek Ombudsman (Synigoros tou Politi)
  name_native: Συνήγορος του Πολίτη
  url: https://www.synigoros.gr
  data_url: https://www.synigoros.gr/api/posts
  description: >
    Greek Ombudsman investigation findings, mediation summaries, special reports,
    and annual reports. Nuxt.js site with JSON API. ~2,154 posts across
    multiple categories: porismata (findings), mediation summaries, special
    reports, annual reports, press releases.
  data_types:
    - doctrine
  auth: none
  license: Public
  coverage:
    start_date: "1998-01-01"
    jurisdictions:
      - GR
  update_frequency: weekly
  notes: >
    Nuxt.js site with REST API. /api/posts returns all 2154 posts.
    /api/posts/{id} for individual post. /api/files/download/{fileId} for PDFs.
    File IDs found in NUXT SSR state, not in API response directly.
    Post descriptions contain HTML summaries. Full text in linked PDFs.
    Category 113 = synopseis-porismata (investigation findings).

api:
  base_url: https://www.synigoros.gr
  posts_endpoint: /api/posts
  post_endpoint: /api/posts/{id}
  files_endpoint: /api/files/download/{fileId}
  categories_endpoint: /api/categories
  rate_limit: 2.0

schema:
  key_fields:
    - id
    - name
    - slug
    - date
