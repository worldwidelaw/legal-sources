auth:
  type: none
data_model:
  dedup_key:
  - _id
  update_strategy: append_only
rate_limit:
  burst: 3
  requests_per_second: 1
schema:
  key_fields:
  - name: _id
    required: true
    type: string
  - name: title
    required: true
    type: string
  - name: text
    required: true
    type: string
  - name: date
    required: false
    type: date
  - name: year
    required: false
    type: string
  - name: decision_type
    required: false
    type: string
  - name: decision_type_en
    required: false
    type: string
  - name: number
    required: false
    type: string
  - name: chamber
    required: false
    type: string
  - name: url
    required: true
    type: string
  - name: pdf_urls
    required: false
    type: string
  required_fields:
  - _id
  - _source
  - _type
  - _fetched_at
  - title
  - text
source:
  country: GR
  coverage:
    languages:
    - el
    start_year: 2016
  data_types:
  - case_law
  description: 'Greece''s supreme audit institution responsible for auditing state finances, public procurement, and pension matters. Publishes decisions (Απόφαση), acts (Πράξη), and advisory opinions (Γνωμοδότηση)
    on public finance law.

    '
  id: GR/CourtOfAudit
  name: Hellenic Court of Audit
  name_local: Ελεγκτικό Συνέδριο
  url: https://www.elsyn.gr
