# Configuration for GR/DPA (Greek Data Protection Authority)
# Hellenic Data Protection Authority (HDPA / Αρχή Προστασίας Δεδομένων)

source:
  id: GR/DPA
  name: Greek Data Protection Authority (HDPA)
  country: GR
  url: https://www.dpa.gr
  description: >
    GDPR enforcement decisions, opinions, and guidelines from the
    Hellenic Data Protection Authority (Αρχή Προστασίας Δεδομένων).
    Includes privacy rulings, fines, and regulatory guidance.

data_model:
  types:
    - doctrine  # DPA decisions are regulatory guidance/doctrine
  update_strategy: append_only
  dedup_key:
    - decision_number
    - year

auth:
  type: none

rate_limit:
  requests_per_second: 1
  burst: 3

schema:
  required_fields:
    - _id
    - _source
    - _type
    - _fetched_at
    - title
    - text
    - date
    - url
  key_fields:
    - name: decision_number
      type: integer
      required: true
    - name: year
      type: integer
      required: true
    - name: category
      type: string
      required: true
    - name: subject_area
      type: string
      required: false
