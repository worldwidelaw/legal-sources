# ===================================================================
# INTL/WIPO-UDRP -- WIPO Domain Name Dispute Decisions (UDRP)
# ===================================================================
# 60,000+ panel decisions on domain name disputes since 1999.
# HTML full text for 2000-2021; PDF for 2022+ (skipped in bootstrap).
# ===================================================================

source:
  id: "INTL/WIPO-UDRP"
  country: "INTL"
  name: "WIPO Domain Name Dispute Decisions (UDRP)"
  url: "https://www.wipo.int/amc/en/domains/search/"
  description: |
    Panel decisions under the Uniform Domain-Name Dispute-Resolution
    Policy (UDRP) administered by the WIPO Arbitration and Mediation
    Center. Covers 60,000+ decisions since 2000 involving domain name
    disputes between trademark holders and domain registrants.

data_types:
  - case_law

auth:
  type: "none"

rate_limit:
  requests_per_second: 0.5
  burst: 1
  delay_seconds: 2

api:
  type: "html_scrape"
  case_url: "https://www.wipo.int/amc/en/domains/search/case.jsp?case_prefix={prefix}&case_year={year}&case_seq={seq}"
  text_url: "https://www.wipo.int/amc/en/domains/search/text.jsp?case={case_number}"

data_model:
  type: "case_law"
  primary_key: "case_number"
  update_strategy: "upsert"

schema:
  total_fields: 12
  key_fields:
    - name: "_id"
      description: "Case number (e.g., D2020-0001)"
      type: "string"
      role: "identifier"
      required: true
    - name: "text"
      description: "Full text of the panel decision"
      type: "string"
      role: "content"
      required: true
    - name: "date"
      description: "Decision date (ISO 8601)"
      type: "date"
      role: "temporal_key"
      required: true
    - name: "domain_names"
      description: "Disputed domain name(s)"
      type: "string"
      role: "content"
      required: true
    - name: "complainant"
      description: "Complainant name"
      type: "string"
      role: "content"
      required: true
    - name: "respondent"
      description: "Respondent name"
      type: "string"
      role: "content"
      required: false
    - name: "decision_result"
      description: "Outcome (Transfer, Denied, etc.)"
      type: "string"
      role: "content"
      required: true

notes: |
  - case.jsp provides structured metadata (parties, domain, date, result)
  - text.jsp redirects to HTML (2000-2021) or PDF (2022+)
  - HTML decisions parsed with BeautifulSoup for clean text extraction
  - PDF decisions skipped (would require PyMuPDF/fitz)
  - Sequential case numbering: D{YEAR}-{SEQ} with 4-digit zero-padded seq
  - ~87% of case numbers have published decisions (rest are terminated/pending)
  - Rate limited to 1 request per 2 seconds
