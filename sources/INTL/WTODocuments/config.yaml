auth:
  type: none
country: INTL
data_model:
  dedup_key:
  - _id
  update_strategy: upsert
data_types:
- case_law
- legislation
description: 'WTO dispute settlement documents including panel reports, Appellate Body reports, arbitration awards, and requests for consultations. 10,000+ documents with full text extracted from PDFs.

  '
id: INTL/WTODocuments
name: WTO Documents Online
rate_limit:
  burst: 2
  requests_per_second: 0.5
schema:
  key_fields:
  - name: _id
    required: true
    type: string
  - name: _source
    required: false
    type: string
  - name: _type
    required: false
    type: string
  - name: title
    required: true
    type: string
  - name: text
    required: true
    type: string
  - name: date
    required: false
    type: date
  - name: url
    required: true
    type: string
  - name: document_symbol
    required: false
    type: string
  - name: document_number
    required: false
    type: string
url: https://docs.wto.org/
