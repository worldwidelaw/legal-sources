  name: African Union Legal Instruments
  country: INTL
  url: https://au.int/en/treaties
  data_types:
    - legislation
  auth: none
  description: >
    African Union treaties, protocols, conventions, and charters.
    ~79 instruments. Drupal 7 site with HTML detail pages and PDF downloads.

