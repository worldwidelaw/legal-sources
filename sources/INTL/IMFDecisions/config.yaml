source:
  id: INTL/IMFDecisions
  name: IMF Selected Decisions & Legal Framework
  country: INTL
  url: https://www.imf.org/en/publications/selected-decisions
  data_types:
    - legislation
  auth: none
  language: en
  description: |
    IMF Executive Board decisions and interpretations on Articles of Agreement.
    ~347 decisions from the 39th edition (2017), accessed via Wayback Machine
    archive of the original DecisionsList/Description pages. Full text HTML.

schema:
  key_fields:
    - _id
    - decision_no
    - title
    - text
    - date
    - article_section

fetch:
  method: wayback_html
  list_url: https://web.archive.org/web/20180322142610/http://www.imf.org:80/external/SelectedDecisions/DecisionsList.aspx
  detail_url_pattern: https://web.archive.org/web/2019/https://www.imf.org/external/SelectedDecisions/Description.aspx?decision={id}
  rate_limit_seconds: 2
