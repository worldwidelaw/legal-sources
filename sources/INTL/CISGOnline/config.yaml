source:
  id: INTL/CISGOnline
  name: "CISG-online (UN Sales Convention Case Law)"
  country: INTL
  url: https://cisg-online.org/
  data_types:
    - case_law
  auth: none
  license: "Free access, pro bono project"
  description: >
    Comprehensive database of court and arbitral tribunal decisions applying
    the UN Convention on Contracts for the International Sale of Goods (CISG).
