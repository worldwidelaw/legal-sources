source:
  id: "INTL/EFTACourt"
  name: "EFTA Court Judgments and Advisory Opinions"
  description: |
    Judgments and advisory opinions from the EFTA Court, which interprets
    the EEA Agreement for Iceland, Liechtenstein, and Norway. ~455 cases
    from 1994 to present. Full text extracted from official PDF documents.
  url: "https://eftacourt.int/cases/"
  country: "INTL"
  language: "EN"
  data_types:
    - case_law
  auth:
    type: none

rate_limit:
  requests_per_second: 1
  burst: 2

api:
  type: "rest"
  base_url: "https://eftacourt.int"

schema:
  key_fields:
    - name: "title"
      type: "string"
      required: true
    - name: "text"
      type: "string"
      required: true
    - name: "date"
      type: "date"
      required: false
    - name: "url"
      type: "string"
      required: true
    - name: "case_number"
      type: "string"
      required: true
    - name: "case_type"
      type: "string"
      required: false
    - name: "parties"
      type: "string"
      required: false

data_model:
  update_strategy: append_only
  dedup_key:
    - _id

license:
  id: "custom-terms"
  name: "EFTA Court Public Records"
  url: "https://eftacourt.int/"
  commercial_use: true
  attribution_required: true
  share_alike: false
  no_derivatives: false
  notes: "Court judgments are public judicial records. No restrictive terms found."
