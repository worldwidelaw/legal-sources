source:
  id: INTL/Basel-Committee
  name: Basel Committee on Banking Supervision Standards
  country: INTL
  url: https://www.bis.org/bcbs/
  data_types:
    - doctrine
  auth: none
  description: >
    Basel III/IV standards, guidelines, and publications from the Basel Committee
    on Banking Supervision (BCBS), published by the Bank for International
    Settlements (BIS). ~795 publications with JSON API and PDF downloads.

schema:
  key_fields:
    - _id
    - title
    - date
    - publication_type

fetch:
  rate_limit: 1.5
  max_retries: 3
  timeout: 60
