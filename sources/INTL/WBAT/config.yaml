source:
  id: "INTL/WBAT"
  name: "World Bank Administrative Tribunal"
  description: |
    Judgments and orders from the World Bank Administrative Tribunal (WBAT).
    Covers employment disputes between the World Bank Group and its staff.
    ~798 decisions from Decision No. 1 (1981) to present.
    Full text extracted from official PDF documents.
  url: "https://tribunal.worldbank.org/"
  country: "INTL"
  language: "EN"
  data_types:
    - case_law
  auth:
    type: none

rate_limit:
  requests_per_second: 1
  burst: 2

api:
  type: "html_scrape"
  base_url: "https://tribunal.worldbank.org"

schema:
  key_fields:
    - name: "title"
      type: "string"
      required: true
    - name: "text"
      type: "string"
      required: true
    - name: "date"
      type: "date"
      required: false
    - name: "url"
      type: "string"
      required: true
    - name: "decision_number"
      type: "string"
      required: false

data_model:
  update_strategy: append_only
  dedup_key:
    - _id

license:
  id: "custom-terms"
  name: "World Bank Administrative Tribunal Public Documents"
  url: "https://tribunal.worldbank.org/"
  commercial_use: true
  attribution_required: true
  share_alike: false
  no_derivatives: false
  notes: "Public tribunal decisions. No restrictive reuse terms found."
