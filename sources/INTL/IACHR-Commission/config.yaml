fetch:
  max_retries: 3
  rate_limit: 1.5
  timeout: 60
schema:
  key_fields:
  - name: _id
    required: true
    type: string
  - name: title
    required: true
    type: string
  - name: date
    required: false
    type: date
  - name: report_number
    required: false
    type: string
  - name: doc_type
    required: false
    type: string
source:
  auth: none
  country: INTL
  data_types:
  - doctrine
  description: 'Reports, admissibility decisions, inadmissibility decisions, friendly settlements, and resolutions from the Inter-American Commission on Human Rights (IACHR). Full text extracted from DOCX
    files hosted on oas.org. ~2,600+ documents spanning 2000-present.

    '
  id: INTL/IACHR-Commission
  name: Inter-American Commission on Human Rights Reports
  url: https://www.oas.org/en/iachr/
