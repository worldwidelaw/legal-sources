fetch:
  base_url: https://www.vatican.va
  delay_seconds: 2
  method: AEM/Sling JSON API (append .N.json to URL paths)
notes: 'Uses the Adobe Experience Manager / Apache Sling JSON API exposed by vatican.va.

  Covers legislative documents from 7 pontificates (Pius XII through Leo XIV):

  encyclicals, motu proprio, apostolic constitutions, apostolic exhortations,

  apostolic letters, and papal bulls. ~1,900 documents with full text.

  '
schema:
  key_fields:
  - name: _id
    required: true
    type: string
  - name: _source
    required: false
    type: string
  - name: _type
    required: false
    type: string
  - name: title
    required: true
    type: string
  - name: text
    required: true
    type: string
  - name: date
    required: false
    type: date
  - name: url
    required: true
    type: string
  - name: pope
    required: false
    type: string
  - name: document_type
    required: false
    type: string
source:
  auth: none
  country: VA
  data_types:
  - legislation
  id: VA/ActaApostolicae
  license: Holy See / Vatican
  name: Vatican Apostolic Documents
  url: https://www.vatican.va/
