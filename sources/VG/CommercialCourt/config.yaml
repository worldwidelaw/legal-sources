source:
  id: VG/CommercialCourt
  name: BVI Commercial Court Judgments
  country: VG
  url: https://judgments.eccourts.org
  description: >
    BVI Commercial Court judgments from the Eastern Caribbean Supreme Court
    WordPress site. The BVI Commercial Court handles major international
    insolvency and corporate disputes. Full text available via WP REST API.
    Category 40 = Territory of the Virgin Islands. Commercial Court cases
    identified by "COM" in case number.

data_model:
  types:
    - case_law
  update_strategy: upsert
  dedup_key:
    - doc_id

auth:
  type: none

rate_limit:
  requests_per_second: 1
  burst: 2

schema:
  required_fields:
    - _id
    - _source
    - _type
    - _fetched_at
    - title
    - text
    - url
  key_fields:
    - name: doc_id
      type: string
      required: true
    - name: case_number
      type: string
      required: false
    - name: court
      type: string
      required: true
    - name: decision_date
      type: string
      required: false

schedule:
  full_refresh: monthly
  update_check: weekly
