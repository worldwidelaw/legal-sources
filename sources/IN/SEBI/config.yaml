fetch:
  max_retries: 3
  rate_limit: 1.5
  timeout: 60
schema:
  key_fields:
  - name: _id
    required: true
    type: string
  - name: title
    required: true
    type: string
  - name: date
    required: false
    type: date
  - name: category
    required: false
    type: string
source:
  auth: none
  country: IN
  data_types:
  - case_law
  - doctrine
  description: 'Enforcement orders and regulatory circulars from SEBI. Uses AJAX listing endpoint with session cookie for pagination, then downloads PDFs and extracts full text via pdfplumber. ~6,385 enforcement
    orders + ~2,762 circulars.

    '
  id: IN/SEBI
  name: Securities and Exchange Board of India - Orders & Circulars
  url: https://www.sebi.gov.in/
