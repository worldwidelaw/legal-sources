fetch:
  max_retries: 3
  rate_limit: 1.5
  timeout: 60
schema:
  key_fields:
  - name: _id
    required: true
    type: string
  - name: title
    required: true
    type: string
  - name: date
    required: false
    type: date
  - name: category
    required: false
    type: string
source:
  auth: none
  country: IN
  data_types:
  - doctrine
  description: 'Regulations, directions, recommendations, and tariff orders from TRAI. Drupal site with HTML pagination and direct PDF downloads. ~350 regulations + ~130 directions + ~340 recommendations
    + ~260 tariff orders.

    '
  id: IN/TRAI
  name: Telecom Regulatory Authority of India - Regulations & Directions
  url: https://www.trai.gov.in/
