source_id: IN/eGazette
name: Gazette of India (egazette.gov.in)
country: IN
url: https://egazette.gov.in/
data_types:
  - legislation

auth:
  type: none

endpoints:
  search: https://archive.org/advancedsearch.php
  metadata: https://archive.org/metadata/{identifier}
  download: https://archive.org/download/{identifier}/{filename}

rate_limit:
  requests_per_second: 1
  delay_between_requests: 1.0

schema:
  key_fields:
    - _id
    - gazette_type
    - date
    - gazette_number

license: Public Domain (Government of India)

notes: |
  Gazette of India — official government notifications, Acts, ordinances,
  rules, appointments, etc. Data sourced from Internet Archive's
  "gazetteofindia" collection (~736K items) maintained by Public.Resource.Org.
  Pre-extracted OCR full text available as _djvu.txt files.
