fetch:
  max_retries: 3
  rate_limit: 2.0
  timeout: 60
schema:
  key_fields:
  - name: _id
    required: true
    type: string
  - name: case_no
    required: false
    type: string
  - name: order_date
    required: false
    type: string
  - name: order_type
    required: false
    type: string
source:
  auth: none
  country: IN
  data_types:
  - case_law
  description: 'Antitrust and combination orders from the Competition Commission of India. Uses DataTables JSON endpoints for order listing and PDF download for full text. ~1,300 antitrust orders + ~1,400
    combination orders.

    '
  id: IN/CCI
  name: Competition Commission of India Orders
  url: https://www.cci.gov.in/
