  rate_limit: 1.0
  timeout: 30
fetch:
  batch_size: 50
  max_sample: 12
  mode: full_catalog
license:
  name: Open Government Data
  notes: Cyprus legislation is publicly available through CyLaw
  url: https://www.cylaw.org/
schema:
  date_fields:
  - date
  - enforced_date
  key_fields:
  - name: _id
    required: true
    type: string
  - name: legis_num
    required: false
    type: string
  - name: official_title
    required: false
    type: string
  required_fields:
  - _id
  - _source
  - _type
  - title
  - text
  - date
source:
  country: CY
  data_types:
  - legislation
  id: CY/CYLAW
  language: el
  name: CY-Law - Cyprus Legislation Database
  url: https://www.cylaw.org
