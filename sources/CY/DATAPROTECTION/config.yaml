# CY/DATAPROTECTION -- Cyprus Data Protection Authority
# Commissioner for Personal Data Protection decisions

source:
  id: "CY/DATAPROTECTION"
  name: "Cyprus Data Protection Authority"
  country: "CY"
  url: "https://www.dataprotection.gov.cy"
  description: "Decisions from the Commissioner for Personal Data Protection of Cyprus"
  language: "ell"  # Greek (with some English)
  data_types:
    - regulatory_decisions

auth:
  type: none

rate_limit:
  requests_per_second: 1
  burst: 3
  delay_between_requests: 1.5

data_model:
  update_strategy: upsert
  dedup_key:
    - "_id"

schema:
  key_fields:
    - name: _id
      required: true
      type: string
    - name: title
      required: true
      type: string
    - name: text
      required: true
      type: string
    - name: date
      required: false
      type: string
    - name: url
      required: true
      type: string
