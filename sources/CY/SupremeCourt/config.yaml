# CY/SupremeCourt - Cyprus Supreme Court Case Law
# Data source: CyLaw (cylaw.org) - Supreme Court Decisions Database
# Coverage: 1961-present (35,485+ decisions as of 2024)

id: CY/SupremeCourt
country: CY
name: Cyprus Supreme Court
data_types:
  - case_law
url: http://www.cylaw.org/apofaseis/aad/
license: Open Access - Cyprus Bar Association

# Rate limiting
rate_limit:
  requests_per_second: 1
  burst: 3

# Schema definition
schema:
  key_fields:
    - name: _id
      type: string
      required: true
    - name: title
      type: string
      required: true
    - name: text
      type: string
      required: true
    - name: date
      type: date
      required: false
    - name: url
      type: string
      required: true
  secondary_fields:
    - name: case_number
      type: string
      required: false
    - name: court
      type: string
      required: false
    - name: plaintiff
      type: string
      required: false
    - name: defendant
      type: string
      required: false
    - name: jurisdiction
      type: string
      required: false
    - name: part
      type: string
      required: false

# Auth
auth:
  type: none
