source:
  id: AG/Legislation
  name: Antigua & Barbuda Laws (OECS)
  country: AG
  url: https://laws.gov.ag/
  description: >
    Official laws of Antigua and Barbuda from the Ministry of Legal Affairs.
    ~1,100 acts organized alphabetically. Full text extracted from PDFs hosted
    on the WordPress site.

data_model:
  types:
    - legislation
  update_strategy: upsert
  dedup_key:
    - doc_id

auth:
  type: none

rate_limit:
  requests_per_second: 1
  burst: 2

schema:
  required_fields:
    - _id
    - _source
    - _type
    - _fetched_at
    - title
    - text
    - url
  key_fields:
    - name: doc_id
      type: string
      required: true
    - name: pdf_url
      type: string
      required: false

schedule:
  full_refresh: quarterly
  update_check: monthly
