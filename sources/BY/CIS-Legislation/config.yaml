auth:
  type: none
country: BY
data_types:
- legislation
name: Belarus Codified Laws (CIS Legislation)
notes: 'Fetches Belarusian codified laws (codes) from cis-legislation.com.

  This is an alternative to pravo.by which is geo-restricted.

  Documents are in English translation.

  Full text is available via /document.fwx?rgn={id}.

  Related to issue #192 - admin confirmed codified laws are sufficient.

  '
rate_limit:
  burst: 2
  requests_per_second: 0.5
schema:
  key_fields:
  - name: rgn
    required: false
    type: string
  required_fields:
  - _id
  - _source
  - _type
  - _fetched_at
  - title
  - text
  - date
  - url
source_id: BY/CIS-Legislation
url: https://cis-legislation.com
