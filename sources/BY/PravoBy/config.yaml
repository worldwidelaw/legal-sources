auth:
  type: none
country: BY
data_types:
- legislation
name: Belarus National Legal Portal (Codes)
notes: 'Fetches all 26 Belarusian codified laws (codes) from pravo.by.

  Full text is available in HTML format via /document/?guid=3871&p0={regnum}.

  The codes page lists all available codes with their registration numbers.

  Related to issue #192 - admin confirmed codified laws are sufficient.

  '
rate_limit:
  burst: 2
  requests_per_second: 0.5
schema:
  key_fields:
  - name: regnum
    required: false
    type: string
  required_fields:
  - _id
  - _source
  - _type
  - _fetched_at
  - title
  - text
  - date
  - url
source_id: BY/PravoBy
url: https://pravo.by
