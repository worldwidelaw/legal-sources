source:
  id: MC/JournalMonaco
  name: Journal de Monaco
  country: MC
  language: fr
  url: https://journaldemonaco.gouv.mc
  data_types:
    - legislation
  update_frequency: weekly
  license: public_domain
  description: >
    Official Gazette of the Principality of Monaco (Journal de Monaco).
    Contains all laws (Lois), sovereign ordinances (Ordonnances Souveraines),
    ministerial decrees (Arrêtés Ministériels), and other legal acts.
    Weekly publication since 1858, available in digital format.

fetch:
  base_url: https://journaldemonaco.gouv.mc
  endpoints:
    years: /Journaux/{year}
    issue: /Journaux/{year}/Journal-{issue_number}
    article: /Journaux/{year}/Journal-{issue_number}/{slug}
  rate_limit:
    requests_per_second: 1
    delay_between_requests: 1.5
  retry:
    max_attempts: 3
    backoff_factor: 2
  categories:
    - Lois
    - Ordonnances Souveraines
    - Ordonnances-Lois
    - Arrêtés Ministériels
    - Décisions Souveraines
    - Décisions Ministérielles
  years:
    start: 2020
    end: 2026

schema:
  key_fields:
    - journal_issue
    - article_slug
  normalized_fields:
    _id: "MC-JDM-{journal_issue}-{article_index}"
    _source: MC/JournalMonaco
    _type: legislation
    title: title
    text: content
    date: publication_date
    url: source_url
    category: category
    journal_issue: journal_issue
