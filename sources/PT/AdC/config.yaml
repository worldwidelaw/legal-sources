source:
  id: PT/AdC
  name: Portuguese Competition Authority (AdC)
  country: PT
  url: https://www.concorrencia.pt
  data_types:
    - doctrine
  auth: none
  schedule: weekly
  description: >
    Competition decisions, communications, and working papers from the Portuguese
    Competition Authority (Autoridade da Concorrência). Covers merger decisions
    (CCENT), antitrust cases (PRC), studies, and press releases. Data accessed
    via Drupal JSON:API at concorrencia.pt/jsonapi.

schema:
  key_fields:
    - _id
    - title
    - text
    - date
    - url
    - doc_type
