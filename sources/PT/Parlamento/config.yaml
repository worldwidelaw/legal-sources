source_id: PT/Parlamento
name: Assembleia da República - Dados Abertos
country: PT
url: https://www.parlamento.pt/Cidadania/Paginas/DadosAbertos.aspx
description: |
  Portuguese Parliament Open Data - legislative initiatives with full text PDFs.
  Covers Legislatures II through XVII (1980-present).
  Includes bills, resolutions, motions, and other parliamentary initiatives.

data_types:
  - legislation

license: Open Government Data
language: pt

auth:
  type: none

rate_limit:
  requests_per_second: 0.3
  burst: 2

update_frequency: weekly

schema:
  key_fields:
    - name: initiative_type
      required: false
      type: string
    - name: initiative_nr
      required: false
      type: string
    - name: legislature
      required: false
      type: string
  date_field: date
  text_field: text
  title_field: title
  url_field: url
