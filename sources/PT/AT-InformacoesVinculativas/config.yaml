source:
  id: PT/AT-InformacoesVinculativas
  country: PT
  name: Portuguese Tax Authority Binding Information
  description: |
    Portuguese Tax Authority (Autoridade Tributária) binding tax information
    (Informações Vinculativas / Fichas Doutrinárias). ~5,637 PDF documents
    covering IRS, IRC, IVA, IMI, IMT, Selo, EBF, and other tax codes.
    WCF service API for catalog, PDFs for full text.

  data_types:
    - doctrine

  url: https://info.portaldasfinancas.gov.pt/pt/informacao_fiscal/informacoes_vinculativas/Pages/default.aspx
  auth: none

  languages:
    - pt

schema:
  key_fields:
    - name: vinculativa_number
      type: string
      required: false
    - name: text
      type: string
      required: true
    - name: title
      type: string
      required: true
    - name: date
      type: date
      required: false
    - name: tax_code
      type: string
      required: true
    - name: article
      type: string
      required: false

data_model:
  update_strategy: append_only
  dedup_key:
    - pdf_url

rate_limits:
  requests_per_second: 1.0
  delay_between_requests: 1.0

license:
  type: Open Government Data
  attribution: Autoridade Tributária e Aduaneira (Portuguese Tax Authority)
  url: https://info.portaldasfinancas.gov.pt/
