# VU/Revenue-TaxGuidance -- Vanuatu Customs & Inland Revenue Legislation and Guidance
source:
  id: "VU/Revenue-TaxGuidance"
  name: "Vanuatu Revenue Guidance"
  url: "https://customsinlandrevenue.gov.vu"
  country: "VU"
  data_types:
    - legislation
    - doctrine
  auth:
    type: none
  license: "Open Government Data"

rate_limit:
  requests_per_second: 0.5
  burst: 2

schema:
  key_fields:
    - name: _id
      type: string
      required: true
    - name: title
      type: string
      required: true
    - name: text
      type: string
      required: true
    - name: date
      type: string
      required: false
    - name: url
      type: string
      required: true

data_model:
  update_strategy: upsert
  dedup_key:
    - _id
