data_model:
  update_strategy: upsert
schema:
  key_fields:
  - name: _id
    required: true
    type: string
  - name: _source
    required: false
    type: string
  - name: _type
    required: false
    type: string
  - name: title
    required: true
    type: string
  - name: text
    required: true
    type: string
  - name: date
    required: false
    type: date
  - name: url
    required: true
    type: string
source:
  auth: none
  country: PH
  data_types:
  - legislation
  - case_law
  description: 'Philippine legislation (Republic Acts, Executive Orders, Presidential Decrees) and Supreme Court decisions from the LawPhil Project, a partnership between the Arellano Law Foundation and
    the Philippine Supreme Court.

    '
  id: PH/LawPhil
  language: en
  license: CC BY-NC 4.0 PH (government works are public domain)
  name: LawPhil Project (Arellano Law Foundation)
  url: https://lawphil.net/
