fetch:
  api_base: https://www.arcom.fr/jsonapi
  page_size: 50
  rate_limit_delay: 1.0
schema:
  key_fields:
  - name: _id
    required: true
    type: string
  - name: _source
    required: false
    type: string
  - name: _type
    required: false
    type: string
  - name: _fetched_at
    required: false
    type: string
  - name: title
    required: true
    type: string
  - name: text
    required: true
    type: string
  - name: date
    required: false
    type: date
  - name: url
    required: true
    type: string
  - name: decision_type
    required: false
    type: string
source:
  auth: none
  country: FR
  data_types:
  - doctrine
  id: FR/CSA
  license: Licence Ouverte (Open Licence 2.0)
  name: French Audiovisual Regulator (ARCOM)
  url: https://www.arcom.fr
