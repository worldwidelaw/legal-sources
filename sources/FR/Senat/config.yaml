api:
  base_url: https://www.senat.fr/akomantoso
  indexes:
  - https://www.senat.fr/akomantoso/depots.xml
  - https://www.senat.fr/akomantoso/adoptions.xml
  type: xml_index
country: FR
coverage:
  document_types:
  - pjl: Projet de loi (Government bills)
  - ppl: Proposition de loi (Private member bills)
  - ppr: Proposition de résolution (Resolution proposals)
  notes: 'All legislative texts deposited or adopted at the French Senate since December 1, 2019 in Akoma Ntoso international standard format.

    '
  start_date: 2019-12-01
data_types:
- legislation
format: xml
language: fr
license:
  commercial_use: true
  name: Licence Ouverte / Open Licence Etalab
  url: https://data.senat.fr/licence/
name: French Senate (Sénat)
rate_limit:
  delay_between_requests: 0.5
  requests_per_second: 2
schema:
  key_fields:
  - name: FRBRthis
    required: false
    type: string
  - name: FRBRuri
    required: false
    type: string
  metadata_fields:
  - FRBRdate
  - FRBRauthor
  - docTitle
  - workflow
  standard: Akoma Ntoso 3.0
  text_field: body/article/alinea/content/p
source_id: FR/Senat
