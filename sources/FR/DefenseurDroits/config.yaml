api:
  base_url: https://juridique.defenseurdesdroits.fr
  format: html
  rate_limit: 2
  type: html_scraping
schema:
  key_fields:
  - name: _id
    required: true
    type: string
  - name: decision_number
    required: false
    type: string
  required_fields:
  - _id
  - _source
  - _type
  - _fetched_at
  - title
  - text
  - date
  - url
source:
  country: FR
  data_types:
  - case_law
  id: FR/DefenseurDroits
  language: fr
  license: Open Data
  name: French Rights Defender (Défenseur des droits)
  notes: 'French ombudsman decisions via PMB library catalog. Covers recommendations, settlements, court observations, reform proposals, and decisions from predecessor bodies (HALDE, etc.). ~15,000+ records
    with full text.

    '
  url: https://juridique.defenseurdesdroits.fr
