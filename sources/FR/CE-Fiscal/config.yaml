api:
  base_url: https://opendata.justice-administrative.fr
  endpoints:
    CE:
      dir: /DCE/
      name: Conseil d'État (Supreme Administrative Court)
      zip_pattern: /DCE/{year}/{month:02d}/CE_{year}{month:02d}.zip
  type: zip_archive
country: FR
coverage:
  notes: 'Fiscal/tax decisions from the Conseil d''État. Filtered from the same open data archives as FR/CouncilState. Identified by fiscal chamber assignment AND/OR fiscal keyword content.

    '
  start_date: 2021-09-30
data_types:
- case_law
fiscal_chambers:
- 8ème chambre
- 3ème et 8ème chambres réunies
- 8ème et 3ème chambres réunies
- 9ème chambre
- 9ème et 10ème chambres réunies
- 10ème et 9ème chambres réunies
format: xml
language: fr
license:
  commercial_use: true
  name: Licence Ouverte / Open Licence
  url: https://www.etalab.gouv.fr/licence-ouverte-open-licence
name: French Council of State - Tax Chamber
rate_limit:
  delay_between_requests: 1.0
  requests_per_second: 1
schema:
  key_fields:
  - name: Numero_ECLI
    required: false
    type: string
  - name: Numero_Dossier
    required: false
    type: string
  metadata_fields:
  - Code_Juridiction
  - Nom_Juridiction
  - Date_Lecture
  - Type_Decision
  - Type_Recours
  - Formation_Jugement
  - Solution
  text_field: Texte_Integral
source_id: FR/CE-Fiscal
