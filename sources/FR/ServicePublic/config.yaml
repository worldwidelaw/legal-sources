# FR/ServicePublic configuration
# Service-Public.fr - Fiches pratiques (Practical guides)
# Administrative doctrine for Individuals, Enterprises, and Associations

name: Service-Public.fr (Fiches pratiques)
source_id: FR/ServicePublic
country: FR
language: fr

data_types:
  - doctrine

# Data source URLs (updated daily)
endpoints:
  particuliers_zip: https://lecomarquage.service-public.gouv.fr/vdd/3.4/part/zip/vosdroits-latest.zip
  entreprises_zip: https://lecomarquage.service-public.gouv.fr/vdd/3.4/pro/zip/vosdroits-latest.zip
  schema_zip: https://echanges.dila.gouv.fr/OPENDATA/SERVICE-PUBLIC_DTD/schema_3.4.zip

# Schema for normalized records
schema:
  key_fields:
    - _id
    - _source
    - _type
    - _fetched_at
    - title
    - text
    - date
    - url
  optional_fields:
    - audience
    - theme
    - subject
    - description
    - doc_type
    - coverage
    - related_docs

