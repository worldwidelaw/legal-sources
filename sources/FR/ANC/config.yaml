fetch:
  rate_limit: 2.0
  user_agent: LegalDataHunter/1.0 (Open Data Research)
schema:
  key_fields:
  - name: document_number
    required: false
    type: string
  - name: version
    required: false
    type: string
  normalized_fields:
  - _id
  - _source
  - _type
  - _fetched_at
  - title
  - text
  - date
  - url
  - detail_url
  - document_number
  - year
  - version
  - doc_type
  - pdf_size
source:
  auth: none
  country: FR
  data_types:
  - legislation
  - doctrine
  description: 'French accounting standards authority (Autorité des Normes Comptables).

    Publishes accounting regulations (règlements) that are homologated by

    ministerial decree and published in the Journal Officiel. Also publishes

    consolidated compilations (recueils) with doctrine annotations.

    '
  id: FR/ANC
  license: Open Licence Etalab
  name: Autorité des Normes Comptables (ANC)
  update_frequency: monthly
  url: https://www.anc.gouv.fr
