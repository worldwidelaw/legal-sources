fetch:
  max_pages: 400
  page_size: 20
  rate_limit_delay: 1.5
schema:
  key_fields:
  - name: _id
    required: true
    type: string
  - name: _source
    required: false
    type: string
  - name: _type
    required: false
    type: string
  - name: _fetched_at
    required: false
    type: string
  - name: title
    required: true
    type: string
  - name: text
    required: true
    type: string
  - name: date
    required: false
    type: date
  - name: url
    required: true
    type: string
  - name: category
    required: false
    type: string
  - name: subcategory
    required: false
    type: string
  - name: document_type
    required: false
    type: string
source:
  auth: none
  country: FR
  data_types:
  - doctrine
  id: FR/ANSM
  license: Open data (French public authority)
  name: French Medicines Agency (ANSM)
  url: https://ansm.sante.fr
