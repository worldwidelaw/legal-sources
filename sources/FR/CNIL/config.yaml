name: CNIL - Commission Nationale de l'Informatique et des Libertés
source_id: FR/CNIL
country: FR
data_types:
  - doctrine
  - case_law  # sanctions are quasi-judicial

url: https://echanges.dila.gouv.fr/OPENDATA/CNIL/
license: Licence Ouverte 2.0
update_frequency: monthly

schema:
  key_fields:
    - _id
    - numero
    - date
  required_fields:
    - _id
    - _source
    - _type
    - _fetched_at
    - title
    - text
    - date

notes: |
  CNIL deliberations include:
  - Sanctions (SAN): enforcement decisions with fines
  - Research authorizations (DR): approvals for health data research
  - Other authorizations: transfer permits, derogations
  - Opinions and recommendations on data protection

  Data coverage: 1979-present (all deliberations since CNIL creation)
  Full archive: ~18MB compressed, updated monthly
  Incremental updates: Daily archives with new/modified decisions
