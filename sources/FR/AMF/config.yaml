api:
  documentation:
  - https://www.amf-france.org/fr/abonnements-flux-rss
  - https://bdif.amf-france.org
  endpoints:
    doctrine: https://www.amf-france.org/fr/flux-rss/display/31
    sanctions: https://www.amf-france.org/fr/flux-rss/display/24
  type: rss
country: FR
coverage:
  document_types:
  - sanctions_decisions
  - transactions
  - doctrine
  - professional_rules
  notes: 'AMF is the French financial regulator. This source covers: 1. Commission des sanctions decisions (financial penalties, enforcement) 2. Regulatory doctrine (positions, recommendations, instructions)
    3. Approved professional rules

    RSS feeds provide recent 200 items each. Full text via PDF extraction. For bulk historical data, see BDIF (bdif.amf-france.org).

    '
data_types:
- caselaw
- doctrine
format: rss_xml
language: fr
license:
  name: Open Data
  notes: AMF decisions and doctrine are public regulatory documents
name: Autorité des Marchés Financiers (AMF)
pdf_extraction: true
rate_limit:
  delay_between_requests: 1.5
  requests_per_second: 1
requires_auth: false
schema:
  key_fields:
  - name: id
    required: false
    type: string
  - name: document_id
    required: false
    type: string
  metadata_fields:
  - title
  - publication_date
  - document_type
  - category
  text_field: text
source_id: FR/AMF
