api:
  auth_header: KeyId
  auth_type: api_key
  documentation:
  - https://api.gouv.fr/les-api/api-judilibre
  - https://github.com/Cour-de-cassation/judilibre-search
  production_url: https://api.piste.gouv.fr/cassation/judilibre/v1.0
  sandbox_url: https://sandbox-api.piste.gouv.fr/cassation/judilibre/v1.0
  type: rest
auth_instructions: 'Register at https://developer.aife.economie.gouv.fr (PISTE portal), subscribe to the Judilibre API, and obtain your API key (KeyId). Copy it to .env file in this directory.

  '
country: FR
coverage:
  courts:
  - Cour de cassation
  - Cours d'appel
  - Tribunaux judiciaires
  notes: 'Judilibre provides access to French judicial case law including decisions from the Court of Cassation and appellate courts. Requires PISTE API registration for access. More comprehensive than
    the DILA/Legifrance archives which only include Court of Cassation decisions.

    '
data_types:
- caselaw
format: json
language: fr
license:
  commercial_use: true
  name: Licence Ouverte / Open Licence
  url: https://www.etalab.gouv.fr/licence-ouverte-open-licence
name: Judilibre (Cour de Cassation)
rate_limit:
  delay_between_requests: 0.5
  requests_per_second: 2
requires_auth: true
schema:
  key_fields:
  - name: id
    required: false
    type: string
  - name: ecli
    required: false
    type: string
  metadata_fields:
  - jurisdiction
  - chamber
  - decision_date
  - publication
  - solution
  - themes
  - files
  text_field: text
source_id: FR/Judilibre
