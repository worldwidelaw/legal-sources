description: 'French Energy Regulatory Commission deliberations and CoRDiS decisions.


  CRE is the French independent administrative authority responsible for regulating

  electricity and gas markets. It publishes regulatory deliberations (délibérations)

  on tariffs, network access, and market rules, as well as quasi-judicial decisions

  from CoRDiS (Comité de règlement des différends et des sanctions) on disputes

  between market participants and sanctions for rule violations.

  '
