source:
  id: GI/SupremeCourt
  name: Gibraltar Supreme Court Judgments
  country: GI
  url: https://www.gibraltarlaws.gov.gi/judgments
  description: >
    Supreme Court, Court of Appeal, Magistrates, and Privy Council judgments
    from gibraltarlaws.gov.gi. Covers 1812-present with ~889 judgments.
    Listing pages by year, detail pages with PDF viewer. Full text extracted
    from PDF downloads.

data_model:
  types:
    - case_law
  update_strategy: upsert
  dedup_key:
    - doc_id

auth:
  type: none

rate_limit:
  requests_per_second: 1
  burst: 2

schema:
  required_fields:
    - _id
    - _source
    - _type
    - _fetched_at
    - title
    - text
    - url
  key_fields:
    - name: doc_id
      type: string
      required: true
    - name: judge
      type: string
      required: false
    - name: court
      type: string
      required: false
    - name: decision_date
      type: string
      required: false
    - name: case_number
      type: string
      required: false
    - name: file_url
      type: string
      required: false

schedule:
  full_refresh: monthly
  update_check: weekly
