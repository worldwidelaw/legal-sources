source:
  id: KR/NTS-TaxLaw
  country: KR
  name: South Korean Tax Law Information System (NTS)
  description: |
    Korean National Tax Service Tax Law Information System (국세법령정보시스템).
    ~291,000 tax doctrine documents including interpretations (pre-rulings,
    inquiry-responses, tax standard consultations) and precedents (objections,
    examination requests, tribunal requests, court cases). Korean language.

  data_types:
    - doctrine

  url: https://taxlaw.nts.go.kr/
  auth: none

  api_base: https://taxlaw.nts.go.kr/action.do

  languages:
    - ko

schema:
  key_fields:
    - name: "_id"
      type: string
      required: true
    - name: text
      type: string
      required: true
    - name: title
      type: string
      required: true
    - name: date
      type: date
      required: true
    - name: document_class
      type: string
      required: true
    - name: reference_number
      type: string
      required: false
    - name: tax_type
      type: string
      required: false

data_model:
  update_strategy: append_only
  dedup_key:
    - ntstDcmId

rate_limits:
  requests_per_second: 1.0
  delay_between_requests: 1.0

license:
  type: Open Government Data
  attribution: National Tax Service (국세청) - Tax Law Information System
  url: https://taxlaw.nts.go.kr/
