id: KR/FTC
name: Korea Fair Trade Commission (KFTC) Decisions
country: KR
url: https://www.ftc.go.kr/
description: >
  Fair Trade Commission decisions via law.go.kr DRF API (target=ftc).
  8,100+ decisions including resolutions, corrective orders, consent decrees.
  Full text via XML/JSON detail endpoint. Covers 2008 onwards.
data_types:
  - case_law
  - doctrine
auth:
  type: none
rate_limit:
  requests_per_second: 1
  burst: 3
data_model:
  update_strategy: upsert
  dedup_key:
    - _id
schema:
  key_fields:
    - name: _id
      type: string
      required: true
    - name: _source
      type: string
      required: true
    - name: _type
      type: string
      required: true
    - name: title
      type: string
      required: true
    - name: text
      type: string
      required: true
    - name: date
      type: date
      required: false
    - name: url
      type: string
      required: true
    - name: case_number
      type: string
      required: false
    - name: decision_number
      type: string
      required: false
    - name: document_type
      type: string
      required: false
