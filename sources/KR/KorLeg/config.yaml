source:
  id: KR/KorLeg
  name: KorLeg South Korean Legal Judgments Dataset
  country: KR
  url: https://zenodo.org/records/14542443
  description: >
    Academic dataset of 85,887 South Korean legal judgments across 5 legal domains
    (Civil, Criminal, IP, Tax, Administrative). From Korea Ministry of Government
    Legislation via Zenodo. Full text in Korean.
  data_types:
    - case_law
  auth: none
  license: CC-BY-4.0

schema:
  key_fields:
    - _id
    - text
    - category

fetch:
  method: bulk_download
  download_url: https://zenodo.org/api/records/14542443/files/KorLeg.xlsx/content
  format: xlsx
  rate_limit:
    requests_per_second: 1
    burst: 1
