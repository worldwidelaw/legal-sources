id: KR/KLRI
name: Korea Legislation Research Institute - English Translations
country: KR
url: https://open.law.go.kr/
description: >
  English translations of Korean statutes via law.go.kr DRF API (target=elaw).
  ~3,000 laws with full English article text. Covers acts, presidential decrees,
  ministerial ordinances. No registration required (mobile endpoint).
data_types:
  - legislation
auth:
  type: none
rate_limit:
  requests_per_second: 1
  burst: 3
data_model:
  update_strategy: upsert
  dedup_key:
    - _id
schema:
  key_fields:
    - name: _id
      type: string
      required: true
    - name: _source
      type: string
      required: true
    - name: _type
      type: string
      required: true
    - name: title
      type: string
      required: true
    - name: text
      type: string
      required: true
    - name: date
      type: date
      required: false
    - name: url
      type: string
      required: true
    - name: law_id
      type: string
      required: false
    - name: language
      type: string
      required: false
