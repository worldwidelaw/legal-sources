fetcher:
  api_type: dspace_rest
  base_url: https://collections.concourt.org.za
  rate_limit: 1.5
schema:
  key_fields:
  - name: _id
    required: true
    type: string
  - name: title
    required: true
    type: string
  - name: text
    required: true
    type: string
  - name: date
    required: false
    type: date
  - name: case_number
    required: false
    type: string
  - name: citation
    required: false
    type: string
  - name: judges
    required: false
    type: string
  - name: url
    required: true
    type: string
source:
  auth: none
  country: ZA
  data_types:
  - case_law
  description: 'Full-text judgments from the Constitutional Court of South Africa via the official DSpace repository REST API. Covers cases from 1994 to present. Pre-extracted text from PDF bitstreams (no
    PDF parsing needed).

    '
  format: json
  id: ZA/ConstitutionalCourt
  language: en
  name: South Africa Constitutional Court Judgments
  url: https://collections.concourt.org.za/
