fetcher:
  base_url: https://www.saflii.org
  courts:
  - code: ZACC
    name: Constitutional Court
  - code: ZASCA
    name: Supreme Court of Appeal
  - code: ZAGPJHC
    name: High Court - Gauteng (Johannesburg)
  - code: ZAWCHC
    name: High Court - Western Cape
  - code: ZAKZDHC
    name: High Court - KwaZulu-Natal
  - code: ZAECGHC
    name: High Court - Eastern Cape
  - code: ZALAC
    name: Labour Appeal Court
  - code: ZALCJHB
    name: Labour Court - Johannesburg
  - code: ZACC
    name: Competition Appeal Court
  - code: ZATC
    name: Tax Court
  rate_limit: 2.0
schema:
  key_fields:
  - name: _id
    required: true
    type: string
  - name: title
    required: true
    type: string
  - name: text
    required: true
    type: string
  - name: date
    required: false
    type: date
  - name: court
    required: false
    type: string
  - name: citation
    required: false
    type: string
  - name: url
    required: true
    type: string
source:
  auth: none
  country: ZA
  data_types:
  - case_law
  description: 'Case law from all South African courts via SAFLII (Southern African Legal Information Institute). Covers Constitutional Court (ZACC), Supreme Court of Appeal (ZASCA), High Courts, Labour
    Courts, Tax Court, Competition Tribunal, and more. Full text HTML with structured metadata.

    '
  format: html
  id: ZA/SAFLII-CaseLaw
  language: en
  name: South Africa SAFLII Case Law (All Courts)
  url: https://www.saflii.org/za/cases/
