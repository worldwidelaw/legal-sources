fetch:
  base_url: https://api.riigikogu.ee
  rate_limit: 1.5
  retry_attempts: 3
  timeout: 60
schema:
  key_fields:
  - name: _id
    required: true
    type: string
  - name: title
    required: true
    type: string
  - name: text
    required: true
    type: string
  - name: date
    required: false
    type: date
  - name: url
    required: true
    type: string
source:
  country: EE
  data_types:
  - legislation
  id: EE/Riigikogu
  language: et
  license: CC BY-SA 3.0
  name: Estonian Parliament (Riigikogu)
  update_frequency: daily
  url: https://api.riigikogu.ee
