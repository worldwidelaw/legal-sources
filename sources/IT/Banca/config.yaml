auth:
  type: none
country: IT
data_model:
  dedup_key:
  - _id
  update_strategy: append_only
data_types:
- doctrine
license: Open Data (Italian public data)
name: Bank of Italy - Supervision
rate_limit:
  burst: 2
  max_workers: 2
  requests_per_second: 0.5
schema:
  key_fields:
  - name: doc_type
    required: false
    type: string
  - name: date
    required: false
    type: date
  - name: text
    required: true
    type: string
source_id: IT/Banca
url: https://www.bancaditalia.it
