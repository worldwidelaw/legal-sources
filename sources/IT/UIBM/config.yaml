# IT/UIBM - Italian Patent and Trademark Office (UIBM)
# Source: https://uibm.mise.gov.it
# Data: Trademark opposition, nullity, and cancellation decisions

name: Italian Patent Office (UIBM)
country: IT
source_id: IT/UIBM
url: https://uibm.mise.gov.it

data_types:
  - doctrine

license: Open Data (Italian public data)

auth:
  type: none

rate_limit:
  requests_per_second: 1
  burst: 3
  max_workers: 3

data_model:
  update_strategy: append_only
  dedup_key:
    - _id

schema:
  key_fields:
    - name: _id
      type: string
      required: true
    - name: title
      type: string
      required: true
    - name: text
      type: string
      required: true
    - name: date
      type: date
      required: false
    - name: url
      type: string
      required: true
    - name: wpn
      type: string
      required: true
