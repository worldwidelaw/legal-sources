fetch:
  max_retries: 3
  rate_limit: 1.5
  timeout: 60
schema:
  key_fields:
  - name: _id
    required: true
    type: string
  - name: title
    required: true
    type: string
  - name: date
    required: false
    type: date
  - name: law_number
    required: false
    type: string
source:
  auth: none
  country: IT
  data_types:
  - legislation
  description: 'Lazio regional laws (leggi regionali) from the Consiglio Regionale del Lazio. ~2,500 laws from 1974 to present with coordinated full text (testo coordinato). Scraped from HTML pages, year-by-year
    pagination.

    '
  id: IT/Lazio-Legislation
  name: Lazio Regional Legislation
  url: https://www.consiglio.regione.lazio.it/
