id: HR/AllCourts
name: Croatian Court Decisions (All Courts - odluke.sudovi.hr)
country: HR
data_types:
  - case_law
url: https://odluke.sudovi.hr
auth: none
license: Open Government Data
api_type: html
rate_limit: 1.0  # 1 request per second to be conservative

schema:
  key_fields:
    - id
    - decision_number
    - court
    - date
  optional_fields:
    - ecli
    - decision_type
    - publication_date
    - legal_field
    - registry_type

notes: |
  Official Croatian court decisions database covering 900K+ decisions from all courts:
  - Vrhovni sud (Supreme Court)
  - Visoki kazneni sud (High Criminal Court)
  - Visoki prekršajni sud (High Misdemeanor Court)
  - Visoki trgovački sud (High Commercial Court)
  - Visoki upravni sud (High Administrative Court)
  - Županijski sud (County Courts)
  - Općinski sud (Municipal Courts)
  - Trgovački sud (Commercial Courts)
  - Upravni sud (Administrative Courts)

  NOTE: Does NOT include Constitutional Court (Ustavni sud) decisions.
  Those are at sljeme.usud.hr using Lotus Notes/Domino (separate source needed).

  Discovery:
  - Paginated search results at /Document/DisplayList?page=N
  - Each result links to /Document/View?id={uuid}
  - Full text HTML rendered server-side (no JavaScript required)
  - Metadata includes EuroVoc, legal index, law references
