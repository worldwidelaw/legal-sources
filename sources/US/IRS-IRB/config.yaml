name: IRS Internal Revenue Bulletins
source_id: US/IRS-IRB
country: US
data_types:
  - doctrine

url: https://www.irs.gov/irb/
license: U.S. Government Work (Public Domain)
update_frequency: weekly

schema:
  key_fields:
    - _id
    - year
    - week
  required_fields:
    - _id
    - _source
    - _type
    - _fetched_at
    - title
    - text
    - date
    - url

notes: |
  IRS Internal Revenue Bulletins contain official tax guidance:
  - Revenue Rulings (interpretations of tax law)
  - Revenue Procedures (administrative procedures)
  - Notices (public guidance)
  - Treasury Decisions (regulations)
  - Announcements

  HTML full text available at /irb/YYYY-WW_IRB from ~2005 to present.
  ~52 bulletins per year × 21+ years = ~1,100+ bulletins.
  Each bulletin contains multiple items with full text.
