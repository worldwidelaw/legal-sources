source:
  id: US/GovInfoUSReports
  name: GovInfo Supreme Court Opinions (US Reports)
  country: US
  url: https://www.govinfo.gov/app/collection/usreports

data:
  types:
    - case_law
  coverage:
    temporal: 1754 to present (Volumes 1-582+)
    estimated_size: 37,000+ opinions
    courts: United States Supreme Court

fetch:
  method: GovInfo wssearch API + PDF download
  search_url: https://www.govinfo.gov/wssearch/search
  detail_url: https://www.govinfo.gov/wssearch/getContentDetail
  content_url: https://www.govinfo.gov/content/pkg
  auth:
    type: none
    note: No API key required for wssearch and direct content
  response_format: JSON (search), PDF (opinions)
  full_text_format: PDF extracted to markdown

schema:
  key_fields:
    - granule_id
    - package_id
    - volume
    - page
  metadata:
    - title
    - date
    - volume
    - page
    - citation
    - term
