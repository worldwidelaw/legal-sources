source_id: US/LA-Legislation
name: Louisiana Revised Statutes (legis.la.gov)
country: US
data_types:
  - legislation
url: https://legis.la.gov/legis/LawSearch.aspx
auth:
  type: none

endpoints:
  toc: https://legis.la.gov/legis/Laws_Toc.aspx?folder={folder_id}
  print: https://legis.la.gov/legis/LawPrint.aspx?d={doc_id}
  law: https://legis.la.gov/legis/Law.aspx?d={doc_id}

rate_limit:
  requests_per_second: 1
  delay_between_requests: 1.0

schema:
  key_fields:
    - _id
    - title
    - date
    - text
    - section_num
    - chapter
    - rs_title
    - rs_title_name

license: Public Domain (government works)

notes: |
  Louisiana Revised Statutes from legis.la.gov.
  54 titles (folders 77-130), ~46,000 sections.
  Full text extracted from LawPrint.aspx HTML endpoint.
  Also includes Civil Code (67), Code of Civil Procedure (68),
  Code of Criminal Procedure (69), Code of Evidence (70),
  Children's Code (71), and Constitution Ancillaries (66).
