source_id: US/IN-Courts
name: Indiana Supreme Court & Court of Appeals
country: US
data_types:
  - case_law
url: https://static.case.law/ind/
auth:
  type: none

endpoints:
  supreme_court: https://static.case.law/ind/
  court_of_appeals: https://static.case.law/ind-app/

rate_limit:
  requests_per_second: 2
  delay_between_requests: 0.5

schema:
  key_fields:
    - _id
    - title
    - date
    - text
    - case_number
    - court
    - citation

license: CC0 1.0 (Public Domain)

notes: |
  Indiana appellate case law from the Harvard Caselaw Access Project (CAP).
  Uses static.case.law bulk JSON endpoint (no API key required).
  Full text in casebody.opinions[].text — no PDF extraction needed.
  Coverage: Indiana Supreme Court (275 vols) + Court of Appeals (182 vols).
