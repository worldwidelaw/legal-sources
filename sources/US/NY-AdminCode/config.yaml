# ===================================================================
# US/NY-AdminCode -- New York Codes Rules and Regulations (NYCRR)
# ===================================================================
# Full text of NYCRR sections via Cornell LII.
# 24 titles (1-23 plus Title 99 Executive Orders) covering all state
# agency regulations.
# No authentication required. Crawl-delay: 10s per robots.txt.
# ===================================================================

source:
  id: "US/NY-AdminCode"
  country: "US"
  name: "New York Codes Rules and Regulations (NYCRR)"
  url: "https://www.law.cornell.edu/regulations/new-york"
  description: |
    New York Codes Rules and Regulations with full text of every regulation
    section, fetched from Cornell LII. Covers all 24 active titles.
    Updated quarterly from official DOS data.

data_types:
  - legislation

auth:
  type: "none"

rate_limit:
  requests_per_second: 0.1
  burst: 1

api:
  type: "html_scraping"
  base_url: "https://www.law.cornell.edu"
  endpoints:
    title_list: "/regulations/new-york"
    title_page: "/regulations/new-york/title-{N}"
    section_page: "/regulations/new-york/{TITLE}-NYCRR-{SECTION}"

data_model:
  type: "legislation"
  primary_key: "section_id"
  update_strategy: "full_replace"
  dedup_key:
    - "section_id"

schema:
  total_fields: 12
  key_fields:
    - name: "section_id"
      description: "Unique section identifier (e.g., 'NYCRR-22-202.8')"
      type: "string"
      role: "primary_key"
      required: true
    - name: "title"
      description: "Section heading with number and name"
      type: "string"
      role: "content"
      required: true
    - name: "text"
      description: "Full text of the regulation section"
      type: "string"
      role: "content"
      required: true
    - name: "title_num"
      description: "NYCRR title number"
      type: "string"
      role: "classification"
      required: true
    - name: "date"
      description: "Date fetched (ISO 8601)"
      type: "date"
      role: "temporal_key"
      required: true

notes: |
  - 24 active titles, thousands of sections
  - HTML scraping from Cornell LII (law.cornell.edu)
  - 10-second crawl delay per robots.txt
  - Official data sourced from NY DOS, updated quarterly
