auth: none
country: US
data_types:
- case_law
fetch:
  courts:
  - ohio
  - ohioctapp
  delay: 2.0
  pdf_base_url: https://storage.courtlistener.com/
  search_url: https://www.courtlistener.com/api/rest/v4/search/
name: Ohio Supreme Court & Appellate Decisions
schema:
  key_fields:
  - name: _id
    required: true
    type: string
  - name: title
    required: true
    type: string
  - name: date
    required: false
    type: date
  - name: text
    required: true
    type: string
  - name: docket_number
    required: false
    type: string
  - name: citation
    required: false
    type: string
  - name: court
    required: false
    type: string
  - name: url
    required: true
    type: string
source_id: US/OH-Courts
url: https://www.supremecourt.ohio.gov/rod/docs/
