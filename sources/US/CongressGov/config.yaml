source:
  id: US/CongressGov
  name: Congress.gov (Congressional Bills)
  country: US
  data_types:
    - legislation
  auth: api_key  # Uses DEMO_KEY from data.gov or custom CONGRESS_API_KEY
  base_url: https://api.congress.gov/v3
  rate_limit: 5000/hour

schema:
  key_fields:
    - congress
    - bill_type
    - bill_number

  required_fields:
    - _id
    - _source
    - _type
    - _fetched_at
    - title
    - text
    - date
    - url

  optional_fields:
    - congress
    - bill_type
    - bill_number
    - sponsor
    - cosponsors_count
    - policy_area
    - origin_chamber
    - latest_action
    - summary

fetch:
  default_congress: 118  # Current Congress (2023-2025)
  bill_types:
    - hr      # House Bills
    - s       # Senate Bills
    - hjres   # House Joint Resolutions
    - sjres   # Senate Joint Resolutions
    - hconres # House Concurrent Resolutions
    - sconres # Senate Concurrent Resolutions
    - hres    # House Simple Resolutions
    - sres    # Senate Simple Resolutions

  pagination:
    limit: 250  # Max allowed by API
    delay_seconds: 0.5  # Be nice to the API
