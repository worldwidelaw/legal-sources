fetch:
  bill_types:
  - hr
  - s
  - hjres
  - sjres
  - hconres
  - sconres
  - hres
  - sres
  default_congress: 118
  pagination:
    delay_seconds: 0.5
    limit: 250
schema:
  key_fields:
  - name: congress
    required: false
    type: string
  - name: bill_type
    required: false
    type: string
  - name: bill_number
    required: false
    type: string
  optional_fields:
  - congress
  - bill_type
  - bill_number
  - sponsor
  - cosponsors_count
  - policy_area
  - origin_chamber
  - latest_action
  - summary
  required_fields:
  - _id
  - _source
  - _type
  - _fetched_at
  - title
  - text
  - date
  - url
source:
  auth: api_key
  base_url: https://api.congress.gov/v3
  country: US
  data_types:
  - legislation
  id: US/CongressGov
  name: Congress.gov (Congressional Bills)
  rate_limit: 5000/hour
