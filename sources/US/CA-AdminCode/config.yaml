# ===================================================================
# US/CA-AdminCode -- California Code of Regulations (CCR)
# ===================================================================
# Full text of California Code of Regulations sections via Cornell LII.
# 27 titles covering all state agency regulations.
# No authentication required. Crawl-delay: 10s per robots.txt.
# ===================================================================

source:
  id: "US/CA-AdminCode"
  country: "US"
  name: "California Code of Regulations (CCR)"
  url: "https://www.law.cornell.edu/regulations/california"
  description: |
    California Code of Regulations with full text of every regulation
    section, fetched from Cornell LII. Covers all 27 active titles.
    Updated quarterly from official OAL data.

data_types:
  - legislation

auth:
  type: "none"

rate_limit:
  requests_per_second: 0.1
  burst: 1

api:
  type: "html_scraping"
  base_url: "https://www.law.cornell.edu"
  endpoints:
    title_list: "/regulations/california"
    title_page: "/regulations/california/title-{N}"
    division_page: "/regulations/california/title-{N}/division-{N}"
    chapter_page: "/regulations/california/title-{N}/division-{N}/chapter-{N}"
    article_page: "/regulations/california/title-{N}/division-{N}/chapter-{N}/article-{N}"
    section_page: "/regulations/california/{TITLE}-CCR-{SECTION}"

data_model:
  type: "legislation"
  primary_key: "section_id"
  update_strategy: "full_replace"
  dedup_key:
    - "section_id"

schema:
  total_fields: 12
  key_fields:
    - name: "section_id"
      description: "Unique section identifier (e.g., 'CCR-1-16')"
      type: "string"
      role: "primary_key"
      required: true
    - name: "title"
      description: "Section heading with number and name"
      type: "string"
      role: "content"
      required: true
    - name: "text"
      description: "Full text of the regulation section"
      type: "string"
      role: "content"
      required: true
    - name: "title_num"
      description: "CCR title number and name"
      type: "string"
      role: "classification"
      required: true
    - name: "date"
      description: "Date fetched (ISO 8601)"
      type: "date"
      role: "temporal_key"
      required: true

notes: |
  - 27 active titles, tens of thousands of sections
  - HTML scraping from Cornell LII (law.cornell.edu)
  - 10-second crawl delay per robots.txt
  - Official data sourced from OAL, updated quarterly
