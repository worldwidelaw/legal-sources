auth:
  type: none
country: US
data_types:
- caselaw
endpoints:
  huggingface: https://huggingface.co/datasets/common-pile/caselaw_access_project
  original: https://case.law/caselaw/
license: CC0 1.0 (Public Domain)
name: Caselaw Access Project (Harvard/HuggingFace)
notes: "Caselaw Access Project - Harvard Law Library + Ravel Law digitization.\n6.7M+ cases from 360 years of U.S. federal and state court decisions.\n\nAvailable via HuggingFace Datasets library using\
  \ streaming mode.\n\nDataset: common-pile/caselaw_access_project\n- Format: Parquet files\n- Size: ~78 GB uncompressed\n- Fields: id, source, added, created, metadata, text\n\nThe 'text' field contains\
  \ full case opinions with court, date, parties, and ruling.\n\nUsage:\n  from datasets import load_dataset\n  ds = load_dataset(\"common-pile/caselaw_access_project\", split=\"train\", streaming=True)\n"
rate_limit:
  delay_between_requests: 0.1
  requests_per_second: 10
schema:
  key_fields:
  - name: _id
    required: true
    type: string
  - name: id
    required: false
    type: string
  - name: source
    required: false
    type: string
  - name: created
    required: false
    type: string
  - name: metadata
    required: false
    type: string
source_id: US/CaselawAccessProject
url: https://huggingface.co/datasets/common-pile/caselaw_access_project
