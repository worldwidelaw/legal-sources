# ===================================================================
# US/DE-Legislation -- Delaware Code (delcode.delaware.gov)
# ===================================================================
# Full text of the Delaware Code scraped from the official Delaware
# Legislature website. HTML pages per chapter/subchapter, parsed into
# individual sections. No authentication required. Public domain.
# ===================================================================

source:
  id: "US/DE-Legislation"
  country: "US"
  name: "Delaware Code (delcode.delaware.gov)"
  url: "https://delcode.delaware.gov/"
  description: |
    Delaware Code with full text of every section, fetched from the
    official delcode.delaware.gov site. Covers all 31 titles.
    Public domain (Delaware government works).

data_types:
  - legislation

auth:
  type: "none"

rate_limit:
  requests_per_second: 0.5
  burst: 1

api:
  type: "html_scraping"
  base_url: "https://delcode.delaware.gov"
  endpoints:
    home: "/"
    title_index: "title{NUM}/index.html"
    chapter: "title{NUM}/c{CHAP}/index.html"
    subchapter: "title{NUM}/c{CHAP}/sc{SC}/index.html"

data_model:
  type: "legislation"
  primary_key: "section_id"
  update_strategy: "full_replace"
  dedup_key:
    - "section_id"

schema:
  total_fields: 11
  key_fields:
    - name: "_id"
      description: "Unique section identifier (e.g., 'T1-101')"
      type: "string"
      role: "primary_key"
      required: true
    - name: "title"
      description: "Section heading with number and name"
      type: "string"
      role: "content"
      required: true
    - name: "text"
      description: "Full text of the statute section"
      type: "string"
      role: "content"
      required: true
    - name: "title_num"
      description: "Title number"
      type: "string"
      role: "classification"
      required: true
    - name: "date"
      description: "Date fetched (ISO 8601)"
      type: "date"
      role: "temporal_key"
      required: true

notes: |
  - 31 titles, hundreds of chapters
  - HTML scraping from delcode.delaware.gov
  - Public domain (Delaware government works)
  - Some chapters have subchapter sub-pages (sc01, sc02, etc.)
  - Sections parsed from SectionHead divs and subsection paragraphs
