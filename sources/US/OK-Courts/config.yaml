source_id: US/OK-Courts
name: Oklahoma Supreme Court & Court of Civil/Criminal Appeals
country: US
jurisdiction: US-OK
data_types:
  - case_law
url: https://www.oscn.net/
auth: none

schema:
  key_fields:
    - _id
    - title
    - date
    - text
    - docket_number
    - citation
    - court
    - url

fetch:
