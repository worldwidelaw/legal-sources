auth:
  type: none
country: US
data_types:
- legislation
endpoints:
  chapter: https://apps.legislature.ky.gov/law/statutes/chapter.aspx?id={chapter_id}
  index: https://apps.legislature.ky.gov/law/statutes/
  statute_pdf: https://apps.legislature.ky.gov/law/statutes/statute.aspx?id={statute_id}
license: Public Domain (government works)
name: Kentucky Revised Statutes (KRS)
notes: 'Kentucky Revised Statutes from apps.legislature.ky.gov.

  548 chapters listed on HTML index, individual sections served as PDFs.

  PDF text extracted via PyPDF2. ~5,000-8,000 sections across 548 chapters.

  '
rate_limit:
  delay_between_requests: 2.0
  requests_per_second: 0.5
schema:
  key_fields:
  - name: _id
    required: true
    type: string
  - name: title
    required: true
    type: string
  - name: date
    required: false
    type: date
  - name: text
    required: true
    type: string
  - name: section_num
    required: false
    type: string
  - name: chapter
    required: false
    type: string
  - name: chapter_title
    required: false
    type: string
  - name: caption
    required: false
    type: string
source_id: US/KY-Legislation
url: https://apps.legislature.ky.gov/law/statutes/
