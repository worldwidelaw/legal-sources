# ===================================================================
# US/TX-AdminCode -- Texas Administrative Code (via Cornell LII)
# ===================================================================
# Full text of all Texas Administrative Code rules scraped from
# Cornell LII (law.cornell.edu). 17 titles, thousands of sections.
# No authentication required. Public domain government data.
# ===================================================================

source:
  id: "US/TX-AdminCode"
  country: "US"
  name: "Texas Administrative Code (Cornell LII)"
  url: "https://www.law.cornell.edu/regulations/texas"
  description: |
    Texas Administrative Code with full text of every rule section,
    fetched from Cornell LII (law.cornell.edu/regulations/texas).
    Covers all active titles of the TAC. Public domain government data.

data_types:
  - legislation

auth:
  type: "none"

rate_limit:
  requests_per_second: 0.5
  burst: 1

api:
  type: "html_scraping"
  base_url: "https://www.law.cornell.edu"
  endpoints:
    title_list: "/regulations/texas"
    section_page: "/regulations/texas/{title}-Tex-Admin-Code-SS-{section}"

data_model:
  type: "legislation"
  primary_key: "section_id"
  update_strategy: "full_replace"
  dedup_key:
    - "section_id"

schema:
  total_fields: 12
  key_fields:
    - name: "section_id"
      description: "Unique section identifier (e.g., 'TAC-1-3-3.1')"
      type: "string"
      role: "primary_key"
      required: true
    - name: "title"
      description: "Section heading with number and name"
      type: "string"
      role: "content"
      required: true
    - name: "text"
      description: "Full text of the administrative rule"
      type: "string"
      role: "content"
      required: true
    - name: "tac_title"
      description: "TAC title number and name"
      type: "string"
      role: "classification"
      required: true
    - name: "chapter"
      description: "Chapter number and name"
      type: "string"
      role: "classification"
      required: true
    - name: "date"
      description: "Date fetched (ISO 8601)"
      type: "date"
      role: "temporal_key"
      required: true

notes: |
  - 17 active titles, thousands of chapters and sections
  - HTML scraping from Cornell LII (law.cornell.edu)
  - Public domain (Texas government administrative rules)
  - Previous source (txrules.elaws.us) defunct as of April 2026
  - Official SOS site migrated to Appian SPA, not scrapeable
