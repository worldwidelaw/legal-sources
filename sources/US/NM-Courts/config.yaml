auth:
  type: none
country: US
data_types:
- case_law
fetch:
  base_url: https://www.courtlistener.com/api/rest/v4
  courts: nm,nmctapp
  delay: 1.5
license: Public Domain (government works)
name: New Mexico State Courts
notes: 'New Mexico appellate opinions via CourtListener search API. ~23K opinions. Full text from PDFs.'
schema:
  key_fields:
  - name: _id
    required: true
    type: string
  - name: title
    required: true
    type: string
  - name: date
    required: false
    type: date
  - name: text
    required: true
    type: string
  - name: case_number
    required: false
    type: string
  - name: court
    required: false
    type: string
  - name: citation
    required: false
    type: string
source_id: US/NM-Courts
url: https://www.nmcourts.gov/
