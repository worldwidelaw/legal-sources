# ===================================================================
# US/DC-Legislation -- District of Columbia Code (code.dccouncil.gov)
# ===================================================================
# Full text of the DC Code from the DC Council's open-source XML repo
# on GitHub (DCCouncil/law-xml-codified). Each section is a standalone
# XML file with structured paragraphs. No authentication required.
# Public domain / open government data.
# ===================================================================

source:
  id: "US/DC-Legislation"
  country: "US"
  name: "District of Columbia Code (code.dccouncil.gov)"
  url: "https://code.dccouncil.gov/"
  description: |
    District of Columbia Code with full text of every section, fetched
    from the DC Council's open-source XML repository on GitHub. Covers
    all 55 titles of the DC Code. Public domain.

data_types:
  - legislation

auth:
  type: "none"

rate_limit:
  requests_per_second: 2
  burst: 5

api:
  type: "xml"
  base_url: "https://raw.githubusercontent.com/DCCouncil/law-xml-codified/publication/2021-10-18"
  endpoints:
    root_index: "us/dc/council/code/index.xml"
    title_index: "us/dc/council/code/titles/{TITLE}/index.xml"
    section: "us/dc/council/code/titles/{TITLE}/sections/{SECTION}.xml"

data_model:
  type: "legislation"
  primary_key: "section_id"
  update_strategy: "full_replace"
  dedup_key:
    - "section_id"

schema:
  total_fields: 11
  key_fields:
    - name: "_id"
      description: "Unique section identifier (e.g., '1-101')"
      type: "string"
      role: "primary_key"
      required: true
    - name: "title"
      description: "Section heading with number and name"
      type: "string"
      role: "content"
      required: true
    - name: "text"
      description: "Full text of the statute section"
      type: "string"
      role: "content"
      required: true
    - name: "title_num"
      description: "Title number"
      type: "string"
      role: "classification"
      required: true
    - name: "date"
      description: "Date fetched (ISO 8601)"
      type: "date"
      role: "temporal_key"
      required: true

notes: |
  - 55 titles, ~24,105 sections
  - Structured XML from GitHub (DCCouncil/law-xml-codified)
  - Public domain (DC government works)
  - Sections parsed from individual XML files with dc-library namespace
