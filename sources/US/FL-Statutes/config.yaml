# ===================================================================
# US/FL-Statutes -- Florida Statutes (Online Sunshine)
# ===================================================================
# All Florida Statutes with full text of every section, scraped from
# the official Online Sunshine site (leg.state.fl.us).
# HTML pages per chapter, parsed into individual sections.
# No authentication required. Public domain.
# ===================================================================

source:
  id: "US/FL-Statutes"
  country: "US"
  name: "Florida Statutes (Online Sunshine)"
  url: "https://www.leg.state.fl.us/statutes/"
  description: |
    Florida statutory chapters with full text of every section, fetched
    from the official Online Sunshine website. Covers all 49 titles
    (chapters 1-1015) of the Florida Statutes. Public domain.

data_types:
  - legislation

auth:
  type: "none"

rate_limit:
  requests_per_second: 0.5
  burst: 1

api:
  type: "html_scraping"
  base_url: "https://www.leg.state.fl.us/statutes"
  endpoints:
    title_index: "index.cfm?App_mode=Display_Index&Title_Request={TITLE}"
    chapter_html: "index.cfm?App_mode=Display_Statute&URL={RANGE}/{CHAP}/{CHAP}.html&StatuteYear=2025"
    chapter_toc: "index.cfm?App_mode=Display_Statute&URL={RANGE}/{CHAP}/{CHAP}ContentsIndex.html&StatuteYear=2025"

data_model:
  type: "legislation"
  primary_key: "section_id"
  update_strategy: "full_replace"
  dedup_key:
    - "section_id"

schema:
  total_fields: 11
  key_fields:
    - name: "section_id"
      description: "Unique section identifier (e.g., '775.082')"
      type: "string"
      role: "primary_key"
      required: true
    - name: "title"
      description: "Section heading with number and name"
      type: "string"
      role: "content"
      required: true
    - name: "text"
      description: "Full text of the statute section"
      type: "string"
      role: "content"
      required: true
    - name: "chapter"
      description: "Chapter number"
      type: "string"
      role: "classification"
      required: true
    - name: "date"
      description: "Date fetched (ISO 8601)"
      type: "date"
      role: "temporal_key"
      required: true

notes: |
  - ~49 titles, hundreds of chapters, thousands of sections
  - HTML scraping from leg.state.fl.us/statutes
  - Public domain (Florida government works)
  - Sections parsed from entire-chapter HTML view
