auth:
  env_var: OPENSTATES_API_KEY
  header: X-API-KEY
  registration_url: https://open.pluralpolicy.com/accounts/profile/
  required: true
  type: api_key
base_url: https://v3.openstates.org/
country: US
coverage:
  data_includes:
  - bills
  - bill versions (full text links)
  - votes
  - legislators
  - committees
  description: All 50 US states plus DC and Puerto Rico
  jurisdictions: 52
language: en
name: Open States (State Legislation)
rate_limits:
  delay_between_requests: 1.0
  requests_per_second: 1
schema:
  date_field: latest_action_date
  key_fields:
  - name: id
    required: false
    type: string
  - name: jurisdiction
    required: false
    type: string
  - name: session
    required: false
    type: string
  - name: identifier
    required: false
    type: string
  text_field: text
source_id: US/OpenStates
type: legislation
