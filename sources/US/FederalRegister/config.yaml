api:
  auth_type: none
  base_url: https://www.federalregister.gov/api/v1
  rate_limit: null
  request_delay: 0.5
endpoints:
  document: /documents/{document_number}.json
  documents: /documents.json
  full_text: /documents/full_text/text/{yyyy}/{mm}/{dd}/{document_number}.txt
fetch:
  max_pages: null
  page_size: 100
  sample_count: 15
schema:
  date_fields:
  - publication_date
  - effective_date
  key_fields:
  - name: _id
    required: true
    type: string
  - name: document_number
    required: false
    type: string
  text_fields:
  - text
  - abstract
source:
  country: US
  description: 'The Federal Register is the daily journal of the United States Government. It contains rules, proposed rules, notices, and presidential documents from federal agencies. Data available from
    1994 to present.

    '
  id: US/FederalRegister
  name: Federal Register
  type: legislation
  url: https://www.federalregister.gov
