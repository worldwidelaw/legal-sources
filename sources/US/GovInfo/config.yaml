data:
  collections:
  - BILLS: Congressional Bills
  - CFR: Code of Federal Regulations
  - PLAW: Public and Private Laws
  - FR: Federal Register
  coverage:
    estimated_size: Millions of documents
    temporal: 1996 to present (varies by collection)
  types:
  - legislation
fetch:
  auth:
    note: No API key required for bulk data
    type: none
  base_url: https://www.govinfo.gov/bulkdata
  full_text_format: XML
  method: Bulk Data Repository
  response_format: XML
schema:
  key_fields:
  - name: collection_code
    required: false
    type: string
  - name: doc_id
    required: false
    type: string
  metadata:
  - title
  - date
  - short_title
  - publisher
  - agency
source:
  bulk_data: https://www.govinfo.gov/bulkdata
  country: US
  id: US/GovInfo
  name: GovInfo (US Federal Legislation)
  url: https://www.govinfo.gov
