api:
  auth_header: Authorization
  auth_prefix: 'Token '
  auth_type: token
  base_url: https://www.courtlistener.com/api/rest/v4
  rate_limit: 5000
  request_delay: 0.75
endpoints:
  clusters: /clusters/
  courts: /courts/
  dockets: /dockets/
  opinions: /opinions/
fetch:
  max_pages: null
  page_size: 20
  sample_count: 15
schema:
  date_fields:
  - date_filed
  - date_created
  - date_modified
  key_fields:
  - name: _id
    required: true
    type: string
  - name: opinion_id
    required: false
    type: string
  - name: cluster_id
    required: false
    type: string
  text_fields:
  - text
  - html_with_citations
source:
  country: US
  description: 'CourtListener is a free legal research platform from the Free Law Project. It provides access to millions of federal and state court opinions, PACER data, oral arguments, and more. The API
    provides structured access to court opinions with full text.

    '
  id: US/CourtListener
  name: CourtListener (Case Law)
  type: caselaw
  url: https://www.courtlistener.com
