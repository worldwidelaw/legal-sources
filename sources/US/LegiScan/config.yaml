auth:
  env_var: LEGISCAN_API_KEY
  type: api_key
fetch:
  min_year: null
  pagination:
    delay_seconds: 1.0
  states: []
rate_limit:
  burst: 2
  requests_per_second: 1
schema:
  key_fields:
  - name: bill_id
    required: false
    type: string
  optional_fields:
  - bill_number
  - state
  - session_id
  - status
  - sponsors
  - subjects
  - committee
  - last_action
  - history
  required_fields:
  - _id
  - _source
  - _type
  - _fetched_at
  - title
  - text
  - date
  - url
source:
  base_url: https://api.legiscan.com
  country: US
  data_types:
  - legislation
  id: US/LegiScan
  name: LegiScan State Legislation API
