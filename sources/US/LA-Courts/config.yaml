source_id: US/LA-Courts
name: Louisiana Supreme Court & Courts of Appeal
country: US
data_types:
  - case_law
url: https://www.lasc.org/
auth:
  type: none

schema:
  key_fields:
    - _id
    - title
    - date
    - text
    - case_number
    - court
    - citation

fetch:
  base_url: https://www.courtlistener.com/api/rest/v4
  courts: la,lactapp
  delay: 1.5

license: Public Domain (government works)

notes: |
  Louisiana appellate opinions via CourtListener search API.
  Supreme Court (la): ~199K opinions from 1813.
  Court of Appeal (lactapp): ~123K opinions from 1926.
  Full text extracted from PDFs using pdfplumber.
