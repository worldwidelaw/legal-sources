auth:
  type: none
country: US
data_types:
- case_law
fetch:
  base_url: https://www.courtlistener.com/api/rest/v4
  courts: la,lactapp
  delay: 1.5
license: Public Domain (government works)
name: Louisiana Supreme Court & Courts of Appeal
notes: 'Louisiana appellate opinions via CourtListener search API.

  Supreme Court (la): ~199K opinions from 1813.

  Court of Appeal (lactapp): ~123K opinions from 1926.

  Full text extracted from PDFs using pdfplumber.

  '
schema:
  key_fields:
  - name: _id
    required: true
    type: string
  - name: title
    required: true
    type: string
  - name: date
    required: false
    type: date
  - name: text
    required: true
    type: string
  - name: case_number
    required: false
    type: string
  - name: court
    required: false
    type: string
  - name: citation
    required: false
    type: string
source_id: US/LA-Courts
url: https://www.lasc.org/
