source_id: US/FCC
name: US Federal Communications Commission Orders and Rulings
country: US
data_types:
  - doctrine
url: https://www.federalregister.gov/agencies/federal-communications-commission
auth: none

schema:
  key_fields:
    - _id
    - title
    - date
    - text
    - document_number
    - document_type
    - docket_ids
    - url

fetch:
