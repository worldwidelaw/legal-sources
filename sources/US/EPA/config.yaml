auth: none
country: US
data_types:
- case_law
- doctrine
fetch:
  api_base: https://echodata.epa.gov/echo
  case_detail: case_rest_services.get_case_report
  case_search: case_rest_services.get_cases
  delay: 1.5
  states:
  - AL - AK - AZ - AR - CA - CO - CT - DE - FL - GA
  - HI - ID - IL - IN - IA - KS - KY - LA - ME - MD
  - MA - MI - MN - MS - MO - MT - NE - NV - NH - NJ
  - NM - NY - NC - ND - OH - OK - OR - PA - RI - SC
  - SD - TN - TX - UT - VT - VA - WA - WV - WI - WY
  - DC - PR - VI - GU - AS - MP
name: US Environmental Protection Agency Enforcement Actions
schema:
  key_fields:
  - name: _id
    required: true
    type: string
  - name: title
    required: true
    type: string
  - name: date
    required: false
    type: date
  - name: text
    required: true
    type: string
  - name: case_number
    required: false
    type: string
  - name: primary_law
    required: false
    type: string
  - name: federal_penalty
    required: false
    type: string
  - name: url
    required: true
    type: string
source_id: US/EPA
url: https://echo.epa.gov/
