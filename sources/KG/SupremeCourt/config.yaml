fetcher:
  pagination: page_based
  rate_limit: 1.5
  requires_pdf_extraction: false
  type: rest_api
notes: 'Kyrgyzstan Digital Justice Portal (GRSA) - State Registry of Judicial Acts.

  - REST API at portal.sot.kg/api/v1/ with no auth required

  - 209,000+ total cases across all courts

  - Supreme Court (court_id=87) has ~5,000+ cases with judicial acts

  - Full text available as inline HTML via file_html field in case_act

  - Also covers all 73 Kyrgyz courts (not just Supreme Court)

  - Supports filtering by court, date range, chamber, instance, etc.

  '
schema:
  date_fields:
  - date
  - _fetched_at
  key_fields:
  - name: _id
    required: true
    type: string
  - name: case_number
    required: false
    type: string
  text_fields:
  - text
  - title
source:
  api_url: https://portal.sot.kg/api/v1/cc_court_case/
  country: KG
  data_types:
  - case_law
  id: KG/SupremeCourt
  language: ky
  license: Public Domain
  name: Kyrgyzstan Supreme Court Decisions (portal.sot.kg)
  url: https://portal.sot.kg
