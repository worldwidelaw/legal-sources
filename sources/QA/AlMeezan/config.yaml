description: >
  Qatari legislation from the official Al Meezan legal portal, operated by
  the Ministry of Justice. Covers laws, decrees, amiri decisions, ministerial
  orders, and cabinet resolutions from 1954 to present. Arabic full text with
  some English translations. IDs enumerated from 2284 to ~6500.
