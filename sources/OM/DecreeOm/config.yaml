rate_limit:
  burst: 3
  requests_per_second: 1
schema:
  key_fields:
  - name: _id
    required: true
    type: string
  - name: title
    required: true
    type: string
  - name: text
    required: true
    type: string
  - name: date
    required: false
    type: date
  - name: url
    required: true
    type: string
  - name: _type
    required: false
    type: string
  - name: _source
    required: false
    type: string
  - name: _fetched_at
    required: false
    type: string
  - name: category
    required: false
    type: string
  - name: wp_id
    required: false
    type: string
source:
  auth: none
  country: OM
  data_types:
  - legislation
  description: 'Comprehensive database of English translated Omani laws. Includes Royal Decrees, Ministerial Decisions, Consolidated Laws, and Treaties. Full text via WordPress REST API.

    '
  id: OM/DecreeOm
  language: en
  license: Decree Tech LLC (information purposes, translations of official legislation)
  name: Oman Decrees Portal (decree.om)
  url: https://decree.om/
