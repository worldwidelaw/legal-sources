api:
  base_url: https://qanoon.om/wp-json/wp/v2
  endpoints:
    categories: /categories
    posts: /posts
  pagination:
    per_page: 100
    type: page
  rate_limit: 1.5
  type: wordpress_rest
auth: none
country: OM
data_types:
- legislation
language: ar
method: api
name: Oman Legal Database (qanoon.om)
schema:
  key_fields:
  - name: _id
    required: true
    type: string
  - name: title
    required: true
    type: string
  - name: text
    required: true
    type: string
  - name: date
    required: false
    type: date
  - name: url
    required: true
    type: string
  - name: legislation_type
    required: false
    type: string
  - name: legislation_year
    required: false
    type: string
source_id: OM/Legislation
url: https://qanoon.om/
