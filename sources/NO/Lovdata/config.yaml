api:
  auth: none
  base_url: https://api.lovdata.no
  bulk_files:
    laws: gjeldende-lover.tar.bz2
    regulations: gjeldende-sentrale-forskrifter.tar.bz2
  endpoints:
    download: /v1/publicData/get/{filename}
    list_datasets: /v1/publicData/list
  rate_limit:
    delay_seconds: 2
    requests_per_minute: 30
  type: rest
data:
  encoding: utf-8
  format: xml_html
  language: nob
  license: NLOD 2.0
schema:
  key_fields:
  - name: id
    required: false
    type: string
  - name: type
    required: false
    type: string
  - name: date
    required: false
    type: date
  required_fields:
  - title
  - text
  - date
  - url
source:
  country: 'NO'
  id: NO/Lovdata
  name: Lovdata - Norwegian Legislation
  url: https://lovdata.no
