api:
  auth: none
  base_url: https://lovdata.no
  endpoints:
    document: /dokument/{base}/avgjorelse/{case_id}
    registry: /register/avgjørelser?verdict=HRA&year={year}&offset={offset}
    rss_feed: /feed?data=newJudgements&type=RSS
  rate_limit:
    delay_seconds: 1.5
    requests_per_minute: 30
  type: html_paginated
data:
  coverage:
    courts:
    - Høyesterett (Supreme Court)
    estimated_records: 7000
    from_year: 2008
    to_year: present
  encoding: utf-8
  format: html
  language: nob
  license: NLOD 2.0 (Norwegian License for Open Government Data)
  notes: 'Full archive access via registry pagination by year.

    RSS feed provides ~9 recent items only.

    Checkpoint file enables resume across sessions.

    '
schema:
  key_fields:
  - name: case_id
    required: false
    type: string
  - name: year
    required: false
    type: string
  - name: court
    required: false
    type: string
  required_fields:
  - title
  - text
  - date
  - url
  - case_id
source:
  country: 'NO'
  id: NO/Høyesterett
  name: Norwegian Supreme Court (Høyesterett)
  type: caselaw
  url: https://lovdata.no/register/avgjørelser
