# ===================================================================
# MW/MalawiLII -- Malawi Legal Information Institute
# ===================================================================
# Malawian legislation from malawilii.org.
# Akoma Ntoso HTML, no auth required. ~335 acts.
# 5-second crawl delay per robots.txt.
# Note: Judgments blocked by robots.txt; legislation only.
# ===================================================================

source:
  id: "MW/MalawiLII"
  country: "MW"
  name: "Malawi Legal Information Institute (MalawiLII)"
  url: "https://malawilii.org/legislation/"
  description: |
    Malawian legislation from the Malawi Legal Information Institute (MalawiLII),
    powered by Laws.Africa / AfricanLII PeachJam platform. Contains acts and
    subsidiary legislation. Full text in Akoma Ntoso HTML format.
    No authentication required. Judgments blocked by robots.txt.

data_types:
  - legislation

auth:
  type: "none"

rate_limit:
  requests_per_second: 0.2
  burst: 1

data_model:
  type: "legislation"
  primary_key: "doc_id"
  update_strategy: "upsert"
  dedup_key:
    - "doc_id"

schema:
  total_fields: 6
  key_fields:
    - name: "doc_id"
      description: "Document ID derived from AKN path"
      type: "string"
      role: "primary_key"
      required: true
    - name: "title"
      description: "Act title"
      type: "string"
      role: "content"
      required: true
    - name: "text"
      description: "Full text of the legislation"
      type: "string"
      role: "content"
      required: true
    - name: "date"
      description: "Publication/commencement date"
      type: "date"
      role: "temporal_key"
      required: false
    - name: "url"
      description: "URL on malawilii.org"
      type: "string"
      role: "reference"
      required: true

notes: |
  - ~335 acts via malawilii.org paginated listing
  - Full text in Akoma Ntoso HTML (la-akoma-ntoso element)
  - 5-second crawl delay required per robots.txt
  - English language
  - Judgments disallowed by robots.txt; legislation only
