fetcher:
  doc_url: https://lex.uz/docs/{doc_id}
  page_size: 20
  rate_limit: 2.0
  search_url: https://lex.uz/ru/search/nat
  timeout: 30
schema:
  key_fields:
  - name: _id
    required: true
    type: string
  - name: title
    required: true
    type: string
  - name: text
    required: true
    type: string
  - name: date
    required: false
    type: date
  - name: doc_number
    required: false
    type: string
  - name: doc_type
    required: false
    type: string
  - name: url
    required: true
    type: string
source:
  auth: none
  country: UZ
  data_types:
  - legislation
  description: 'Official national legislation database of the Republic of Uzbekistan. Contains 50K+ legislative acts including the Constitution, codes, laws, presidential decrees, and government resolutions.
    Full text available in Uzbek (Cyrillic and Latin) and Russian.

    '
  format: html
  id: UZ/LexUz
  language: ru
  name: Lex.uz - National Database of Legislative Information of Uzbekistan
  url: https://lex.uz/
