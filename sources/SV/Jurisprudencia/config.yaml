source:
  id: SV/Jurisprudencia
  name: El Salvador Judicial Documentation Center
  country: SV
  url: https://www.jurisprudencia.gob.sv/busqueda/busquedalibre.php
  data_types:
    - case_law
  auth: none
  language: es
  description: >
    Court decisions from El Salvador's Centro de Documentacion Judicial.
    Covers Sala Constitucional, Sala Civil, Sala Penal, Sala Contencioso
    Administrativo, appellate chambers, tribunals, and specialized courts.
    Full text extracted from PDFs stored in DocumentosBoveda.

schema:
  key_fields:
    - _id
    - title
    - text
    - date
    - court
    - case_number
    - resolution_type
    - subject_area

fetch:
  method: php_ajax_post
  search_url: https://www.jurisprudencia.gob.sv/busqueda/result.php
  pdf_base: https://www.jurisprudencia.gob.sv/busqueda/
  rate_limit_seconds: 2
