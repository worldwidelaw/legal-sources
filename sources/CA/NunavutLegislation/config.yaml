source:
  id: CA/NunavutLegislation
  name: Nunavut Consolidated Legislation
  country: CA
  url: https://www.nunavutlegislation.ca/en
  description: >
    Consolidated Acts and Regulations of Nunavut territory from
    nunavutlegislation.ca. Drupal glossary view with PDF downloads.

data_model:
  types:
    - legislation
  update_strategy: upsert
  dedup_key:
    - doc_id

auth:
  type: none

rate_limit:
  requests_per_second: 1
  burst: 2

schema:
  required_fields:
    - _id
    - _source
    - _type
    - _fetched_at
    - title
    - text
    - url
  key_fields:
    - name: doc_id
      type: string
      required: true
    - name: doc_type
      type: string
      required: false
    - name: slug
      type: string
      required: false
    - name: download_url
      type: string
      required: false

schedule:
  full_refresh: monthly
  update_check: weekly
