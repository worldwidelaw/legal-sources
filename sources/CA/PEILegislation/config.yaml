source:
  id: CA/PEILegislation
  name: Prince Edward Island Legislation
  country: CA
  url: https://www.princeedwardisland.ca/en/legislation
  description: >
    Consolidated Acts and Regulations of Prince Edward Island.
    PDFs downloaded directly from princeedwardisland.ca; listing
    sourced from Wayback Machine snapshot (site uses Radware WAF
    that blocks automated browsing but not static PDF files).

data_model:
  types:
    - legislation
  update_strategy: upsert
  dedup_key:
    - doc_id

auth:
  type: none

rate_limit:
  requests_per_second: 1
  burst: 2

schema:
  required_fields:
    - _id
    - _source
    - _type
    - _fetched_at
    - title
    - text
    - url
  key_fields:
    - name: doc_id
      type: string
      required: true
    - name: doc_type
      type: string
      required: false
    - name: pdf_url
      type: string
      required: false

schedule:
  full_refresh: monthly
  update_check: weekly
