source:
  id: PL/ConstitutionalCourt
  name: Polish Constitutional Court (Trybunał Konstytucyjny)
  country: PL
  data_types:
    - case_law
  url: https://trybunal.gov.pl
  api_url: https://www.saos.org.pl/api
  license: CC-BY

fetcher:
  type: api
  format: json
  rate_limit: 2.0  # seconds between requests

api:
  search_endpoint: /search/judgments
  detail_endpoint: /judgments/{id}
  court_type: CONSTITUTIONAL_TRIBUNAL
  page_size: 100
  max_pages: 100

schema:
  key_fields:
    - name: case_number
      type: string
      required: true
    - name: date
      type: date
      required: true
    - name: text
      type: string
      required: true
    - name: title
      type: string
      required: true
