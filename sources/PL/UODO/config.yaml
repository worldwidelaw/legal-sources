api:
  base_url: https://orzeczenia.uodo.gov.pl
  csv_export: /search/export/csv?targetUrl=https://orzeczenia.uodo.gov.pl&download=true
  document_content: /document/{urn}/content?query=
  document_meta: /document/{urn}/meta?query=
auth:
  type: none
country: PL
data_model:
  dedup_key:
  - _id
  update_strategy: append_only
data_types:
- doctrine
name: Polish Data Protection Authority (UODO) Decisions
rate_limit:
  burst: 3
  requests_per_second: 1.0
schema:
  key_fields:
  - name: _id
    required: true
    type: string
  - name: _source
    required: false
    type: string
  - name: _type
    required: false
    type: string
  - name: title
    required: true
    type: string
  - name: text
    required: true
    type: string
  - name: date
    required: false
    type: date
  - name: url
    required: true
    type: string
  - name: case_number
    required: false
    type: string
  - name: status
    required: false
    type: string
  - name: publication_date
    required: false
    type: date
source_id: PL/UODO
url: https://orzeczenia.uodo.gov.pl
