source_id: PL/URE
name: Polish Energy Regulatory Office (URE) Decisions
country: PL
url: https://bip.ure.gov.pl
data_types:
  - doctrine
auth:
  type: none
api:
  base_url: https://bip.ure.gov.pl
  sectors:
    - energia-elektryczna
    - paliwa-gazowe
    - cieplo
    - paliwa-ciekle
    - inne-decyzje-informacj
  sector_index: /bip/taryfy-i-inne-decyzje-b/{sector}?page={page}
  pdf_download: /download/3/{id}/{filename}.pdf
rate_limit:
  requests_per_second: 1.0
  burst: 3
data_model:
  update_strategy: append_only
  dedup_key:
    - _id
schema:
  key_fields:
    - _id
    - _source
    - _type
    - title
    - text
    - date
    - url
    - decision_number
    - sector
