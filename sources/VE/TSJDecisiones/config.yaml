source:
  id: VE/TSJDecisiones
  name: "Tribunal Supremo de Justicia - Decisiones (Venezuela)"
  country: VE
  url: https://www.tsj.gob.ve/decisiones
  data_types:
    - case_law
  auth: none
  description: >
    Full text court decisions from all chambers (salas) of Venezuela's Supreme
    Court (TSJ). Uses the Liferay/JSON web service API on tsj.gob.ve to enumerate
    decisions by sala, year, and date, then fetches full text HTML from
    historico.tsj.gob.ve. Covers 2000-present across 7+ chambers.

schema:
  key_fields:
    - name: _id
      type: string
      required: true
    - name: decision_number
      type: string
      required: true
    - name: case_number
      type: string
      required: false
    - name: sala
      type: string
      required: true
    - name: title
      type: string
      required: true
    - name: text
      type: string
      required: true
    - name: date
      type: date
      required: false
    - name: url
      type: string
      required: true

fetch:
  rate_limit_delay: 2
  sample_size: 15
