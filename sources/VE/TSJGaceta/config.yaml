fetch:
  base_url: https://venezuela.justia.com
  categories:
  - leyes
  - decretos
  - reglamentos
  - resoluciones
  - codigos
  delay_seconds: 2
notes: 'TSJ (tsj.gob.ve) has legislation only as PDFs. Justia Venezuela mirrors

  ~553 Venezuelan legal documents with full text in HTML (noframes tags).

  Categories: laws (314), decrees (155), regulations (60), resolutions (13),

  codes (11). Text in Spanish.

  '
schema:
  key_fields:
  - name: _id
    required: true
    type: string
  - name: _source
    required: false
    type: string
  - name: _type
    required: false
    type: string
  - name: title
    required: true
    type: string
  - name: text
    required: true
    type: string
  - name: date
    required: false
    type: date
  - name: url
    required: true
    type: string
  - name: category
    required: false
    type: string
source:
  auth: none
  country: VE
  data_types:
  - legislation
  id: VE/TSJGaceta
  license: Public Venezuelan legislation / Justia
  name: Venezuela Legislation (via Justia)
  url: https://venezuela.justia.com/federales/
