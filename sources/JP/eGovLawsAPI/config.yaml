id: JP/eGovLawsAPI
name: e-Gov Laws API (Version 2)
country: JP
url: https://laws.e-gov.go.jp/api/2/
description: >
  Official Japanese government REST API for all statutes. 9,400+ laws including
  constitution, acts, cabinet orders, ministerial ordinances. JSON responses.
  No authentication required.
data_types:
  - legislation
auth:
  type: none
rate_limit:
  requests_per_second: 2
  burst: 5
data_model:
  update_strategy: upsert
  dedup_key:
    - _id
schema:
  key_fields:
    - name: _id
      type: string
      required: true
    - name: _source
      type: string
      required: true
    - name: _type
      type: string
      required: true
    - name: title
      type: string
      required: true
    - name: text
      type: string
      required: true
    - name: date
      type: date
      required: false
    - name: url
      type: string
      required: true
    - name: law_number
      type: string
      required: false
    - name: law_type
      type: string
      required: false
