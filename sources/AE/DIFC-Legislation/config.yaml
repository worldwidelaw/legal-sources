# ===================================================================
# AE/DIFC-Legislation -- DIFC Legal Database
# ===================================================================
# Direct PDF downloads from assets.difc.com / edge.sitecorecloud.io
# for DIFC Laws, Regulations, and Amendment Laws.
# No authentication required.
# ===================================================================

source:
  id: "AE/DIFC-Legislation"
  country: "AE"
  name: "DIFC Legal Database"
  url: "https://www.difc.com/business/laws-and-regulations/legal-database"
  description: |
    Dubai International Financial Centre (DIFC) legislation — primary laws,
    regulations, and amendment laws. PDFs hosted on assets.difc.com and
    edge.sitecorecloud.io (Sitecore CDN). ~75 documents. Language: English.
    Independent common-law jurisdiction within Dubai.

data_types:
  - legislation

auth:
  type: "none"

rate_limit:
  requests_per_second: 0.5
  burst: 3

api:
  type: "html_ssr"
  pages:
    - "https://www.difc.com/business/laws-and-regulations/legal-database"
  pdf_hosts:
    - "https://assets.difc.com"
    - "https://edge.sitecorecloud.io"

data_model:
  type: "legislation"
  primary_key: "_id"
  update_strategy: "upsert"
  dedup_key:
    - "_id"

schema:
  total_fields: 12
  key_fields:
    - name: "_id"
      description: "Unique ID derived from PDF filename"
      type: "string"
      role: "primary_key"
      required: true
    - name: "title"
      description: "Document title from legal database page"
      type: "string"
      role: "content"
      required: true
    - name: "text"
      description: "Full text extracted from PDF"
      type: "string"
      role: "content"
      required: true
    - name: "url"
      description: "PDF download URL"
      type: "string"
      role: "reference"
      required: true
    - name: "category"
      description: "Category (difc_law, regulation, amendment_law)"
      type: "string"
      role: "classification"
      required: false

notes: |
  - ~29 DIFC Laws + ~29 Regulations + ~17 Amendment Laws
  - PDFs on assets.difc.com and edge.sitecorecloud.io CDN
  - English common-law jurisdiction within Dubai
  - Covers Companies, Contract, Trust, Employment, Data Protection, etc.
