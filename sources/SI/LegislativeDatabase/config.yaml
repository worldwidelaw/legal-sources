api:
  gazette_base: https://www.uradni-list.si/glasilo-uradni-list-rs/vsebina
  metadata_url: https://fotogalerija.dz-rs.si/datoteke/opendata/SZ.XML
  pisrs_base: https://www.pisrs.si
  rate_limit: 2
schema:
  fields:
    abbreviation:
      description: Law abbreviation (e.g., ZOsn-A)
      type: string
    date:
      description: Date of adoption (ISO 8601)
      type: date
    keywords:
      description: Subject keywords
      type: array
    procedure:
      description: Legislative procedure type
      type: string
    proposer:
      description: Who proposed the law
      type: string
    publication:
      description: Official Gazette reference
      type: string
    sop_number:
      description: Official Publication Number (e.g., 1997-01-1842)
      type: string
    text:
      description: Full text of the law (MANDATORY)
      type: string
    title:
      description: Law title in Slovenian
      type: string
  key_fields:
  - name: sop_number
    required: false
    type: string
  - name: title
    required: true
    type: string
  - name: date
    required: false
    type: date
source:
  country: SI
  description: 'Official Slovenian legislation database, fetching laws passed by the

    National Assembly (Državni zbor) since independence in 1991.


    Data sources:

    - Metadata: Parliament open data XML (fotogalerija.dz-rs.si)

    - Full text: Official Gazette (uradni-list.si)

    '
  id: SI/LegislativeDatabase
  license: CC BY 4.0
  license_url: https://creativecommons.org/licenses/by/4.0/
  name: Slovenian Legislation Database (PISRS)
  type: legislation
  url: https://www.pisrs.si
