auth:
  type: none
country: LU
data_model:
  dedup_key:
  - _id
  update_strategy: append_only
data_types:
- doctrine
license: Open Data (Luxembourg public data)
name: Luxembourg Data Protection Authority (CNPD)
rate_limit:
  burst: 3
  max_workers: 3
  requests_per_second: 1
schema:
  key_fields:
  - name: reference
    required: false
    type: string
  - name: doc_type
    required: false
    type: string
  - name: date
    required: false
    type: date
  - name: text
    required: true
    type: string
source_id: LU/CNPD
url: https://cnpd.public.lu
