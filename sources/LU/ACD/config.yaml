auth:
  type: none
country: LU
data_model:
  dedup_key:
  - _id
  update_strategy: append_only
data_types:
- doctrine
license: Open Data (Luxembourg public data)
name: Luxembourg Tax Administration (ACD)
rate_limit:
  burst: 3
  max_workers: 3
  requests_per_second: 1
schema:
  key_fields:
  - name: circular_number
    required: false
    type: string
  - name: category
    required: false
    type: string
  - name: date
    required: false
    type: date
  - name: text
    required: true
    type: string
source_id: LU/ACD
url: https://impotsdirects.public.lu
