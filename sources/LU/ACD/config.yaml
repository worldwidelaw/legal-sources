# LU/ACD - Luxembourg Tax Administration (Administration des Contributions Directes)
# Source: https://impotsdirects.public.lu
# Data: Tax circulars (circulaires fiscales) - doctrine

name: Luxembourg Tax Administration (ACD)
country: LU
source_id: LU/ACD
url: https://impotsdirects.public.lu

data_types:
  - doctrine

license: Open Data (Luxembourg public data)

auth:
  type: none

rate_limit:
  requests_per_second: 1
  burst: 3
  max_workers: 3

data_model:
  update_strategy: append_only
  dedup_key:
    - _id

schema:
  key_fields:
    - circular_number
    - category
    - date
    - text
