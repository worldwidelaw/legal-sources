auth: none
country: LU
coverage:
  end_date: null
  start_date: null
data_types:
- case_law
id: LU/Courts
license: Open Government License
name: Luxembourg Courts Decisions (justice.public.lu)
notes: 'All Luxembourg court decisions from justice.public.lu. ~46,435 judicial court decisions (anon.public.lu PDFs) and ~31,779 administrative court decisions (ja.public.lu PDFs). Full text extracted
  from PDFs using pdfplumber.

  '
priority: 2
schema:
  fields:
  - description: Unique identifier based on PDF filename or case number
    name: _id
  - description: Court name and chamber
    name: court
  - description: Case registry number
    name: case_number
  - description: European Case Law Identifier (admin courts)
    name: ecli
  - description: Decision date in ISO format
    name: date
  - description: Case title extracted from text
    name: title
  - description: Full text of the decision
    name: text
  - description: URL to original PDF
    name: url
  - description: judicial or administrative
    name: court_type
  - description: Chamber number
    name: chamber
  - description: Type of case (Administratif, Fiscal, Civil, Penal, etc.)
    name: content_type
  key_fields:
  - name: case_number
    required: false
    type: string
  - name: court
    required: false
    type: string
source:
  admin_pdf_host: https://ja.public.lu
  admin_url: https://justice.public.lu/fr/jurisprudence/juridictions-administratives.html
  judicial_pdf_host: https://anon.public.lu
  judicial_url: https://justice.public.lu/fr/jurisprudence/juridictions-judiciaires.html
  page_size: 20
  type: html_scrape_with_pdf
update_frequency: weekly
url: https://justice.public.lu
