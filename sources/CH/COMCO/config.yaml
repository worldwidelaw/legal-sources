source_id: CH/COMCO
name: Swiss Competition Commission (COMCO/WEKO)
country: CH
url: https://www.weko.admin.ch
description: |
  Wettbewerbskommission (WEKO) / Competition Commission (COMCO)
  Swiss competition authority decisions including:
  - Competition cases (antitrust, cartels, abuse of dominance)
  - Merger control decisions
  - Market investigations
  - Advisory opinions
  Published in German, French, and Italian.

data_types:
  - doctrine

auth:
  type: none

rate_limit:
  requests_per_second: 0.5
  burst: 2

schema:
  key_fields:
    - _id
    - title
    - date
    - decision_type
  required_fields:
    - _id
    - _source
    - _type
    - _fetched_at
    - title
    - text
    - date
    - url
