fetcher:
  rate_limit: 1.5
  requires:
  - pdfplumber
  - requests
  schedule: weekly
  type: api
notes: 'Data sourced from the official CAS Jurisprudence Database API.

  Full award texts are extracted from PDFs available at jurisprudence.tas-cas.org.

  The database contains approximately 2,600 non-confidential awards.

  Categories include Appeal, Ordinary, Ad Hoc Division, and Anti-Doping procedures.

  '
schema:
  date_field: date
  key_fields:
  - name: _id
    required: true
    type: string
  - name: case_number
    required: false
    type: string
  - name: date
    required: false
    type: date
  - name: sport
    required: false
    type: string
  - name: procedure_type
    required: false
    type: string
  text_field: text
source:
  country: CH
  data_types:
  - caselaw
  description: 'Arbitration awards from the Court of Arbitration for Sport (CAS),

    headquartered in Lausanne, Switzerland. The CAS is the supreme court

    for international sports disputes and publishes non-confidential

    arbitration awards since 1986.

    '
  id: CH/CAS
  language:
  - en
  - fr
  name: Court of Arbitration for Sport (CAS / TAS)
  url: https://www.tas-cas.org
