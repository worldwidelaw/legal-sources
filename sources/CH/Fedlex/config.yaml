auth:
  type: none
data:
  api_type: sparql
  format: rdf
  types:
  - legislation
  update_frequency: daily
license:
  name: Open Government Data
  url: https://www.admin.ch/gov/en/start/terms-and-conditions.html
notes: 'Swiss Federal Legislation via Fedlex SPARQL endpoint.

  Uses JOLux ontology (FRBR-based) with ELI URIs.

  Available formats: HTML, XML, PDF, DOCX.

  Coverage: Official Compilation (OC), Official Federal Gazette (FGA),

  Classified Compilation (CC).

  Languages: DE, FR, IT, RM (Romansh).

  '
rate_limit:
  delay_between_requests: 0.5
  requests_per_second: 2
schema:
  key_fields:
  - name: eli_uri
    required: false
    type: string
  - name: title
    required: true
    type: string
  - name: date_document
    required: false
    type: string
  - name: language
    required: false
    type: string
  - name: file_url
    required: false
    type: string
  - name: text
    required: true
    type: string
source:
  country: CH
  id: CH/Fedlex
  name: Fedlex - Swiss Federal Legislation
  url: https://fedlex.data.admin.ch
