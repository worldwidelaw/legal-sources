id: LI/StGH
name: Liechtenstein Constitutional Court (Staatsgerichtshof)
country: LI
language: deu
data_types:
  - caselaw
license: Open Government Data
url: https://www.stgh.li/urteile
fetch_method: html_scrape
auth: none
rate_limit: 1.5s

schema:
  key_fields:
    - _id
    - case_number
    - date
  required_fields:
    - _id
    - _source
    - _type
    - _fetched_at
    - title
    - text
    - date
    - url
  optional_fields:
    - court
    - case_number
    - decision_type
    - country
    - language

notes: |
  The Liechtenstein Constitutional Court (Staatsgerichtshof) publishes its
  decisions on stgh.li with full text available via gerichtsentscheidungen.li.

  Decisions are published in German and include judgments (Urteile),
  orders (Beschlüsse), and other decisions.
