auth:
  type: none
base_url: https://juris.trf2.jus.br/
country: BR
data_types:
- case_law
description: 'Court decisions from the Tribunal Regional Federal da 2ª Região via the juris.trf2.jus.br Solr-backed jurisprudence portal. TRF-2 covers Rio de Janeiro and Espírito Santo. Full text fetched
  from documento.php endpoint. Over 1M decisions available.

  '
language: pt
name: TRF-2 Federal Regional Court (2nd Region - RJ/ES)
rate_limit:
  burst: 2
  requests_per_second: 0.5
schema:
  key_fields:
  - name: _id
    required: true
    type: string
  - name: process_number
    required: false
    type: string
source_id: BR/TRF2
