source_id: BR/TJAM
name: "Amazonas State Court (TJAM) Jurisprudence"
description: >
  Court decisions (acordãos) from the Tribunal de Justiça do Estado do Amazonas
  via the eSAJ jurisprudence search system. Returns ementas (legal summaries with
  holdings and reasoning) plus metadata.
base_url: "https://consultasaj.tjam.jus.br/cjsg/resultadoCompleta.do"
data_types:
  - case_law
country: BR
language: pt
auth:
  type: none
rate_limit:
  requests_per_second: 0.5
  burst: 2
schema:
  key_fields:
    - _id
    - process_number
    - cd_acordao
