auth:
  type: none
base_url: https://consultasaj.tjam.jus.br/cjsg/resultadoCompleta.do
country: BR
data_types:
- case_law
description: 'Court decisions (acordãos) from the Tribunal de Justiça do Estado do Amazonas via the eSAJ jurisprudence search system. Returns ementas (legal summaries with holdings and reasoning) plus metadata.

  '
language: pt
name: Amazonas State Court (TJAM) Jurisprudence
rate_limit:
  burst: 2
  requests_per_second: 0.5
schema:
  key_fields:
  - name: _id
    required: true
    type: string
  - name: process_number
    required: false
    type: string
  - name: cd_acordao
    required: false
    type: string
source_id: BR/TJAM
