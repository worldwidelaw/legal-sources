fetch:
  batch_size: 100
  config: default
  dataset: joelniklaus/brazilian_court_decisions
  method: huggingface_rows_api
  rate_limit_seconds: 1
  split: train
  total_rows: 3234
schema:
  key_fields:
  - name: _id
    required: true
    type: string
  - name: process_number
    required: false
    type: string
  - name: orgao_julgador
    required: false
    type: string
  - name: publish_date
    required: false
    type: string
  - name: judge_relator
    required: false
    type: string
  - name: title
    required: true
    type: string
  - name: text
    required: true
    type: string
  - name: judgment_label
    required: false
    type: string
  - name: unanimity_label
    required: false
    type: string
source:
  auth: none
  country: BR
  data_types:
  - case_law
  description: 'TJAL (Tribunal de Justiça de Alagoas) court decisions with full text ementas and decision descriptions. Academic labeled dataset (~3,234 documents). From joelniklaus/brazilian_court_decisions
    on HuggingFace.

    '
  id: BR/BrazilianCourtDecisionsHF
  language: pt
  name: Brazilian Court Decisions (HuggingFace)
  url: https://huggingface.co/datasets/joelniklaus/brazilian_court_decisions
