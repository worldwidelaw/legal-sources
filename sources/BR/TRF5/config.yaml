source_id: BR/TRF5
name: "TRF-5 Federal Regional Court (5th Region - NE)"
description: >
  Court decisions from the Tribunal Regional Federal da 5ª Região via the
  Julia Pesquisa REST API. TRF-5 covers Northeastern states (AL, CE, PB,
  PE, RN, SE). Full text returned directly in JSON responses.
base_url: "https://juliapesquisa.trf5.jus.br/julia-pesquisa/"
data_types:
  - case_law
country: BR
language: pt
auth:
  type: none
rate_limit:
  requests_per_second: 0.5
  burst: 2
schema:
  key_fields:
    - _id
    - process_number
