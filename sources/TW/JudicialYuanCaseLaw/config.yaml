source:
  id: TW/JudicialYuanCaseLaw
  name: Taiwan Judicial Yuan Judgment Search
  country: TW
  url: https://judgment.judicial.gov.tw/
  data_types:
    - case_law
  method: html_scrape
  auth: none
  license: Taiwan Government Open Data
  description: >
    Full-text court judgments from Taiwan's Judicial Yuan.
    Covers all court levels: Supreme Court, High Courts, District Courts,
    Administrative Courts, Constitutional Court.
    Civil and Criminal cases. Public access, no authentication.

schema:
  key_fields:
    - _id
    - title
    - text
    - date
    - court
    - case_type
    - case_number
    - cause

fetch:
  rate_limit_seconds: 2
  results_per_page: 20
  search_method: asp_net_viewstate
