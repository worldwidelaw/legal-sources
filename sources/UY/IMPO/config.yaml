fetch:
  parlamento_delay: 2
  rate_limit_delay: 10
  sample_size: 15
schema:
  key_fields:
  - name: _id
    required: true
    type: string
  - name: law_number
    required: false
    type: string
  - name: title
    required: true
    type: string
  - name: text
    required: true
    type: string
  - name: date
    required: false
    type: date
  - name: url
    required: true
    type: string
source:
  auth: none
  country: UY
  data_types:
  - legislation
  description: 'Uruguayan legislation from Parlamento del Uruguay. Enumerates laws via the Parlamento JSON API (date-range search) and fetches full text from the embedded infolegislativa.parlamento.gub.uy
    HTM documents. Covers laws 9500 (1935) to present (~11,000 laws). Free public access.

    '
  id: UY/IMPO
  name: IMPO - Centro de Información Oficial (via Parlamento)
  url: https://parlamento.gub.uy/documentosyleyes/leyes
