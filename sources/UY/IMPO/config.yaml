source:
  id: UY/IMPO
  name: "IMPO - Centro de Información Oficial (via Parlamento)"
  country: UY
  url: https://parlamento.gub.uy/documentosyleyes/leyes
  data_types:
    - legislation
  auth: none
  description: >
    Uruguayan legislation from Parlamento del Uruguay. Enumerates laws via the
    Parlamento JSON API (date-range search) and fetches full text from the
    embedded infolegislativa.parlamento.gub.uy HTM documents. Covers laws
    9500 (1935) to present (~11,000 laws). Free public access.

schema:
  key_fields:
    - _id
    - law_number
    - title
    - text
    - date
    - url

fetch:
  rate_limit_delay: 10  # robots.txt Crawl-Delay for impo.com.uy
  parlamento_delay: 2   # conservative delay for parlamento.gub.uy
  sample_size: 15
