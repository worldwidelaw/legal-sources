fetch:
  rate_limit_delay: 3
  sample_size: 15
schema:
  key_fields:
  - name: _id
    required: true
    type: string
  - name: decision_number
    required: false
    type: string
  - name: court
    required: false
    type: string
  - name: title
    required: true
    type: string
  - name: text
    required: true
    type: string
  - name: date
    required: false
    type: date
  - name: url
    required: true
    type: string
source:
  auth: none
  country: UY
  data_types:
  - case_law
  description: 'Uruguay''s national case law database. Supreme Court and appellate court decisions with full text. Session-based JSF/Seam web application scraped via AJAX requests. ~31,000+ decisions.

    '
  id: UY/PoderJudicial
  name: Base de Jurisprudencia Nacional - Poder Judicial de Uruguay
  url: https://bjn.poderjudicial.gub.uy/
