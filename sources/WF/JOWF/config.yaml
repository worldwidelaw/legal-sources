# WF/JOWF -- Journal Officiel de Wallis-et-Futuna
source:
  id: "WF/JOWF"
  name: "Journal Officiel de Wallis-et-Futuna"
  url: "https://www.wallis-et-futuna.gouv.fr/Publications/Publications-administratives/Journal-Officiel-de-Wallis-et-Futuna-JOWF"
  country: "WF"
  data_types:
    - legislation
  auth:
    type: none
  license: "Open Government Data"

rate_limit:
  requests_per_second: 0.5
  burst: 2

schema:
  key_fields:
    - name: _id
      type: string
      required: true
    - name: title
      type: string
      required: true
    - name: text
      type: string
      required: true
    - name: date
      type: string
      required: false
    - name: url
      type: string
      required: true

data_model:
  update_strategy: upsert
  dedup_key:
    - _id
