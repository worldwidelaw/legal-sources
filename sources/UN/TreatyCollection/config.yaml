source_id: UN/TreatyCollection
name: UN Treaty Collection (UNTS)
country: INTL
url: https://treaties.un.org/
description: |
  United Nations Treaty Collection — multilateral treaties deposited with
  the Secretary-General. Covers ~419 treaties across 29 chapters including
  human rights, environment, trade, disarmament, and more.

data_types:
  - legislation

license: UN public domain
language: en

auth:
  type: none

rate_limit:
  requests_per_second: 0.5
  burst: 2

update_frequency: quarterly

schema:
  key_fields:
    - name: mtdsg_no
      required: true
      type: string
    - name: title
      required: true
      type: string
  date_field: date
  text_field: text
  title_field: title
  url_field: url
