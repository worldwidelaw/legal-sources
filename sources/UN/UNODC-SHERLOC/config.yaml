fetch:
  base_url: https://www.unodc.org
  case_law_endpoint: /cld/v3/sherloc/cldb/data.json
  case_law_page_size: 10
  delay_seconds: 2
  legislation_endpoint: /cld/v3/sherloc/legdb/data.json
  legislation_page_size: 100
notes: 'SHERLOC covers 6 databases on organized crime, terrorism, trafficking,

  smuggling, cybercrime, and firearms. Case law (3,373 records) includes

  fact summaries in the search API. Legislation (13,926 records) requires

  fetching individual HTML pages for the "Original Text" section.

  '
schema:
  key_fields:
  - name: _id
    required: true
    type: string
  - name: _source
    required: false
    type: string
  - name: _type
    required: false
    type: string
  - name: title
    required: true
    type: string
  - name: text
    required: true
    type: string
  - name: date
    required: false
    type: date
  - name: url
    required: true
    type: string
  - name: country
    required: false
    type: string
  - name: crime_types
    required: false
    type: string
source:
  auth: none
  country: UN
  data_types:
  - case_law
  - legislation
  id: UN/UNODC-SHERLOC
  license: United Nations / UNODC
  name: UNODC SHERLOC - Sharing Electronic Resources and Laws on Crime
  url: https://sherloc.unodc.org/
