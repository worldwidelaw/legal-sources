source:
  id: UN/OHCHR-Juris
  name: OHCHR Treaty Body Jurisprudence Database
  country: UN
  url: https://juris.ohchr.org/
  data_types:
    - case_law
  auth: none
  license: "United Nations / OHCHR"
  rate_limit: 2  # seconds between requests

schema:
  key_fields:
    - _id
    - title
    - symbol
    - communication_number
    - treaty_body
    - country
    - decision_type
    - date
    - text
    - url
