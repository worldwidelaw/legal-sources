# ===================================================================
# ZM/ZambiaLII -- Zambia Legal Information Institute
# ===================================================================
# Zambian legislation from zambialii.org.
# Akoma Ntoso HTML, no auth required. ~723 acts.
# 5-second crawl delay per robots.txt.
# Note: Judgments blocked by robots.txt; legislation only.
# ===================================================================

source:
  id: "ZM/ZambiaLII"
  country: "ZM"
  name: "Zambia Legal Information Institute (ZambiaLII)"
  url: "https://zambialii.org/legislation/"
  description: |
    Zambian legislation from the Zambia Legal Information Institute (ZambiaLII),
    powered by Laws.Africa / AfricanLII PeachJam platform. Contains acts and
    subsidiary legislation. Full text in Akoma Ntoso HTML format.
    No authentication required. Judgments blocked by robots.txt.

data_types:
  - legislation

auth:
  type: "none"

rate_limit:
  requests_per_second: 0.2
  burst: 1

data_model:
  type: "legislation"
  primary_key: "doc_id"
  update_strategy: "upsert"
  dedup_key:
    - "doc_id"

schema:
  total_fields: 6
  key_fields:
    - name: "_id"
      description: "Document ID derived from AKN path"
      type: "string"
      role: "primary_key"
      required: true
    - name: "title"
      description: "Act title"
      type: "string"
      role: "content"
      required: true
    - name: "text"
      description: "Full text of the legislation"
      type: "string"
      role: "content"
      required: true
    - name: "date"
      description: "Publication/commencement date"
      type: "date"
      role: "temporal_key"
      required: false
    - name: "url"
      description: "URL on zambialii.org"
      type: "string"
      role: "reference"
      required: true

notes: |
  - ~723 acts via zambialii.org paginated listing
  - Full text in Akoma Ntoso HTML (la-akoma-ntoso element)
  - 5-second crawl delay required per robots.txt
  - English language
  - Judgments disallowed by robots.txt; legislation only
