id: NI/Legislacion
name: Nicaragua National Assembly Legislation
country: NI
url: http://legislacion.asamblea.gob.ni/
description: >
  Full Nicaraguan legislation database (26,000+ documents from 1808-2026) maintained
  by the National Assembly. IBM Domino/Notes platform with JSON listing views and
  full text HTML pages. Covers laws, decrees, resolutions, constitutions, codes.
data_types:
  - legislation
auth:
  type: none
rate_limit:
  requests_per_second: 1
  burst: 1
data_model:
  update_strategy: upsert
  dedup_key:
    - _id
schema:
  key_fields:
    - name: _id
      type: string
      required: true
    - name: _source
      type: string
      required: true
    - name: _type
      type: string
      required: true
    - name: title
      type: string
      required: true
    - name: text
      type: string
      required: true
    - name: date
      type: date
      required: false
    - name: url
      type: string
      required: true
