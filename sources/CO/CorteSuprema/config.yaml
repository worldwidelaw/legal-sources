source:
  id: CO/CorteSuprema
  name: Colombian Supreme Court Jurisprudence
  country: CO
  url: https://consultaprovidencias.cortesuprema.gov.co/
  data_types:
    - case_law
  auth: none
  license: open_access
  description: >
    Decisions from Colombia's Supreme Court of Justice (Corte Suprema de Justicia),
    covering Civil, Labor, Criminal, and Tutela chambers. Full text extracted from
    .docx files via GraphQL API at consultaprovidenciasbk.cortesuprema.gov.co.
    Nearly 1 million documents dating back to 1886.

schema:
  key_fields:
    - _id
    - _source
    - _type
    - title
    - text
    - date
    - url
    - sala
    - magistrate
    - year
    - auto_sentencia

fetch:
  strategy: graphql_api
  api_base: https://consultaprovidenciasbk.cortesuprema.gov.co
  endpoints:
    search: /api (GraphQL getSearchResult)
    content: /api (GraphQL getContentSearch)
    download: /downloadFile (POST with JSON path)
    filters: /filters
  rooms:
    - Civil
    - Laboral
    - Penal
    - Tutelas
  page_size: 10
  rate_limit: 1.5s between requests
