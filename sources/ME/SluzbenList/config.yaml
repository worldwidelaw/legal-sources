data:
  coverage: 1991-present
  estimated_records: ~5000
  format: PDF (with text extraction)
  language: me (Montenegrin - Cyrillic and Latin)
  rate_limit: 1 request/second
endpoints:
  base_url: https://www.sluzbenilist.me
  propis_detail: /propisi/{uuid}
  propis_download: /propisi/{uuid}/download
  propisi_list: /propisi?type=0&page={page}
  search: /propisi?searchTerm={query}&type=0
schema:
  key_fields:
  - name: uuid
    required: false
    type: string
  - name: year
    required: false
    type: string
  - name: issue_number
    required: false
    type: string
  required_fields:
  - title
  - text
  - date
  - url
source:
  auth: none
  country: ME
  data_types:
  - legislation
  id: ME/SluzbenList
  name: Službeni list Crne Gore (Official Gazette of Montenegro)
  priority: 1
  status: complete
  url: https://www.sluzbenilist.me
