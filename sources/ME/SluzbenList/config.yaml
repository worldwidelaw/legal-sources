# ME/SluzbenList — Montenegrin Official Gazette Data Source
# Službeni list Crne Gore

source:
  id: ME/SluzbenList
  country: ME
  name: Službeni list Crne Gore (Official Gazette of Montenegro)
  data_types:
    - legislation
  auth: none
  status: complete
  priority: 1
  url: https://www.sluzbenilist.me

endpoints:
  base_url: https://www.sluzbenilist.me
  # Propisi listing with pagination
  # /propisi?type=0&page=1 - National legislation
  # /propisi?type=1&page=1 - Municipal legislation
  propisi_list: /propisi?type=0&page={page}
  # Individual propis page
  propis_detail: /propisi/{uuid}
  # PDF download
  propis_download: /propisi/{uuid}/download
  # Search endpoint
  search: /propisi?searchTerm={query}&type=0

data:
  format: PDF (with text extraction)
  language: me (Montenegrin - Cyrillic and Latin)
  coverage: 1991-present
  estimated_records: ~5000
  rate_limit: 1 request/second

schema:
  key_fields:
    - uuid
    - year
    - issue_number
  required_fields:
    - title
    - text
    - date
    - url
