api:
  base_url: https://sudovi.me/api
  court_code: vrhs
  endpoints:
    courts: GET /decisions/courts
    departments: GET /decisions/departments
    detail: GET /decision/{id}
    search: POST /search/decisions
  rate_limit: 2
schema:
  date_fields:
  - datum_vijecanja
  - _fetched_at
  key_fields:
  - name: dbid
    required: false
    type: string
  text_fields:
  - tekst
source:
  country: ME
  data_types:
  - caselaw
  id: ME/SupremeCourt
  language: me
  license: Public Domain
  name: Montenegro Supreme Court (Vrhovni sud)
  update_frequency: daily
  url: https://sudovi.me/vrhs/odluke/
